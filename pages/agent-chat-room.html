<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agent IM</title>
    <link href="assets/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --success: #10b981;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh; /* 移动端动态高度 */
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 移动端：单栏切换 */
        .app {
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }

        /* ===== 列表页 ===== */
        .list-page {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .list-page.hidden {
            transform: translateX(-100%);
        }

        .list-header {
            padding: 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .list-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .list-header .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .list-header .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .list-header .status .dot.http {
            background: #f59e0b;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .chat-item {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            background: var(--bg-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.15s;
        }

        .chat-item:active {
            background: var(--bg-tertiary);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            position: relative;
        }

        .chat-avatar .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
            border: 2px solid var(--bg-secondary);
        }

        .chat-avatar .online-dot.offline {
            background: #6b7280;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .section-title {
            padding: 12px 16px 8px;
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-primary);
            position: sticky;
            top: 0;
        }

        /* ===== 会话页 ===== */
        .chat-page {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            z-index: 20;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .chat-page.visible {
            transform: translateX(0);
        }

        .chat-header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            border-radius: 8px;
        }

        .back-btn:active {
            background: var(--bg-tertiary);
        }

        .chat-header-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chat-header-info .info h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .chat-header-info .info .status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 消息区域 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
        }

        .message.human {
            align-self: flex-end;
            background: var(--primary);
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--bg-tertiary);
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: rgba(59, 130, 246, 0.15);
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 12px;
        }

        .message .sender {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: block;
        }

        .message.human .sender {
            color: rgba(255,255,255,0.7);
            text-align: right;
        }

        .message .text {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 14px;
        }

        .message .text .mention {
            background: rgba(59, 130, 246, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            color: #60a5fa;
        }

        .message .time {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        /* 输入区域 */
        .input-area {
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            position: relative;
        }

        .message-input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 40px;
            max-height: 100px;
        }

        .message-input:focus {
            border-color: var(--primary);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* @ 提及选择器 */
        .mention-picker {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 50px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            margin-bottom: 8px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }

        .mention-picker.show {
            display: block;
        }

        .mention-item {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mention-item:active {
            background: var(--bg-tertiary);
        }

        .mention-item .mini-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ===== 桌面端：双栏布局 ===== */
        @media (min-width: 769px) {
            .app {
                display: flex;
            }

            .list-page {
                position: relative;
                width: 320px;
                flex-shrink: 0;
                transform: none;
            }

            .list-page.hidden {
                transform: none;
            }

            .chat-page {
                position: relative;
                flex: 1;
                transform: none;
            }

            .chat-page.visible {
                transform: none;
            }

            .back-btn {
                display: none;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 2px;
        }

        /* ===== 新用户引导弹窗 ===== */
        .guide-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .guide-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .guide-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 28px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .guide-modal.show .guide-content {
            transform: scale(1);
        }

        .guide-emoji {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .guide-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .guide-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .guide-tips {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: left;
        }

        .guide-tip {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .guide-tip:last-child {
            margin-bottom: 0;
        }

        .guide-tip i {
            font-size: 18px;
            color: var(--primary);
        }

        .guide-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .guide-btn:active {
            background: #2563eb;
        }

        .guide-checkbox {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .guide-checkbox input {
            width: 14px;
            height: 14px;
            accent-color: var(--primary);
        }

        /* ===== 离线提示 ===== */
        .offline-banner {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .offline-banner i {
            font-size: 20px;
            color: #f59e0b;
        }

        .offline-info {
            flex: 1;
        }

        .offline-title {
            font-size: 13px;
            font-weight: 500;
            color: #f59e0b;
        }

        .offline-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .offline-actions {
            display: flex;
            gap: 8px;
        }

        .offline-btn {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }

        .offline-btn.primary {
            background: var(--primary);
            color: white;
        }

        .offline-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* ===== 消息状态反馈 ===== */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            max-width: 200px;
        }

        .typing-emoji {
            font-size: 18px;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .typing-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 离线 Agent 列表项扩展信息 */
        .chat-item .offline-detail {
            font-size: 11px;
            color: #f59e0b;
            margin-top: 2px;
        }

        .chat-item .online-dot.waiting {
            background: var(--warning);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
  <script src="js/auth-guard.js"></script>
<script src="js/field-tips.js"></script></head>
<body>
    <div class="app">
        <!-- 新用户引导弹窗 -->
        <div class="guide-modal" id="guideModal">
            <div class="guide-content">
                <div class="guide-emoji">👋</div>
                <h2 class="guide-title">欢迎使用 Agent IM</h2>
                <p class="guide-desc">
                    这是 Agent 联邦通讯系统，你可以与各个 Agent 进行对话协作。
                </p>
                <div class="guide-tips">
                    <div class="guide-tip">
                        <i class="ri-at-line"></i>
                        <span>输入 <strong>@</strong> 提及特定 Agent</span>
                    </div>
                    <div class="guide-tip">
                        <i class="ri-team-line"></i>
                        <span>全员群聊可同时通知所有 Agent</span>
                    </div>
                    <div class="guide-tip">
                        <i class="ri-chat-smile-2-line"></i>
                        <span>私聊 Agent 获得更专注的回复</span>
                    </div>
                    <div class="guide-tip">
                        <i class="ri-circle-line"></i>
                        <span>绿点 = 在线，灰点 = 离线</span>
                    </div>
                </div>
                <button class="guide-btn" onclick="closeGuide()">
                    开始使用
                </button>
                <label class="guide-checkbox">
                    <input type="checkbox" id="dontShowAgain">
                    <span>不再显示此引导</span>
                </label>
            </div>
        </div>

        <!-- 列表页 -->
        <div class="list-page" id="listPage">
            <div class="list-header">
                <h1>💬 Agent IM</h1>
                <div class="status">
                    <span class="dot" id="statusDot"></span>
                    <span id="statusText">连接中</span>
                </div>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- 会话页 -->
        <div class="chat-page" id="chatPage">
            <div class="chat-header">
                <button class="back-btn" onclick="showList()">
                    <i class="ri-arrow-left-s-line"></i>
                </button>
                <div class="chat-header-info">
                    <div class="avatar" id="headerAvatar">👥</div>
                    <div class="info">
                        <h2 id="headerTitle">全员群聊</h2>
                        <div class="status" id="headerStatus">在线</div>
                    </div>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="empty-state">
                    <i class="ri-chat-3-line"></i>
                    <p>选择对话开始聊天</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <div class="mention-picker" id="mentionPicker"></div>
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="💬 输入 @Agent名称 开始对话..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="ri-send-plane-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const WS_URL = `ws://${location.hostname}:8766`;
        const HTTP_API = `${location.origin}/api/chat`;
        
        let ws = null;
        let connected = false;
        let httpMode = false;
        let httpPollingInterval = null;
        let lastMessageId = 0;
        let currentChat = 'all';
        let chatMessages = {};

        // Agent 配置（从联邦通信 API 动态加载）
        let AGENTS = [
            { id: 'main', name: 'Main Agent', emoji: '🎯', color: '#3b82f6', desc: '协调分配任务' },
            { id: 'coder', name: 'Coder Agent', emoji: '💻', color: '#10b981', desc: '代码开发调试' },
            { id: 'deep', name: 'Deep Agent', emoji: '🤔', color: '#8b5cf6', desc: '深度思考分析' },
            { id: 'fast', name: 'Fast Agent', emoji: '⚡', color: '#f59e0b', desc: '快速执行任务' },
            { id: 'chat', name: 'Chat Agent', emoji: '💬', color: '#ec4899', desc: '对话交流' },
            { id: 'test', name: 'Test Agent', emoji: '🔍', color: '#06b6d4', desc: '测试验证' },
            { id: 'office', name: 'Office Agent', emoji: '📊', color: '#84cc16', desc: '文档报表' }
        ];

        const agentStatus = {};
        const agentLastOnline = {};  // Agent 最后在线时间
        let mentionStartPos = -1;
        let typingAgent = null;  // 当前正在输入的 Agent
        let typingTimeout = null;

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAgentsFromFederation();
            initChatList();
            connectWebSocket();
            setupInputHandlers();
            checkFirstVisit();
        });

        // ========== 从联邦通信加载 Agent ==========
        async function loadAgentsFromFederation() {
            try {
                const res = await fetch('/api/federation/agents');
                const data = await res.json();
                
                if (data.success && data.agents) {
                    // 只更新本地 Agent
                    const localAgents = data.agents.filter(a => a.instance === 'local');
                    
                    // 更新 AGENTS 列表
                    AGENTS = localAgents
                        .filter(a => a.enabled)
                        .map(a => ({
                            id: a.id,
                            name: a.name,
                            emoji: a.icon,
                            color: getAgentColor(a.id),
                            desc: a.role,
                            enabled: a.enabled
                        }));
                    
                    // 更新状态（enabled = true 就是在线）
                    localAgents.forEach(a => {
                        agentStatus[a.id] = a.enabled;
                    });
                    
                    console.log('[Federation] 加载 Agent:', AGENTS.length, '个');
                }
            } catch (err) {
                console.warn('[Federation] 加载 Agent 失败:', err);
            }
        }
        
        // Agent 颜色
        function getAgentColor(id) {
            const colors = {
                'main': '#3b82f6',
                'coder': '#10b981',
                'deep': '#8b5cf6',
                'fast': '#f59e0b',
                'chat': '#ec4899',
                'test': '#06b6d4',
                'office': '#84cc16'
            };
            return colors[id] || '#6b7280';
        }

        // ========== 新用户引导 ==========
        function checkFirstVisit() {
            const hideGuide = localStorage.getItem('agent-im-hide-guide');
            if (!hideGuide) {
                setTimeout(() => {
                    document.getElementById('guideModal').classList.add('show');
                }, 500);
            }
        }

        function closeGuide() {
            const dontShowAgain = document.getElementById('dontShowAgain').checked;
            if (dontShowAgain) {
                localStorage.setItem('agent-im-hide-guide', 'true');
            }
            document.getElementById('guideModal').classList.remove('show');
        }

        // ========== 页面切换 ==========
        function showChat(chatId) {
            currentChat = chatId;
            
            // 更新头部
            let chat;
            if (chatId === 'all') {
                chat = { name: '全员群聊', emoji: '👥', color: '#10b981' };
            } else {
                chat = AGENTS.find(a => a.id === chatId) || { name: chatId, emoji: '🤖', color: '#6b7280' };
            }

            document.getElementById('headerAvatar').textContent = chat.emoji;
            document.getElementById('headerAvatar').style.background = chat.color;
            document.getElementById('headerTitle').textContent = chat.name;

            // 更新状态显示（含离线提示）
            const isOnline = agentStatus[chatId] || chatId === 'all';
            document.getElementById('headerStatus').textContent = isOnline ? '在线' : '离线';

            // 高亮选中项
            document.querySelectorAll('.chat-item').forEach(el => {
                el.style.background = el.dataset.id === chatId ? 'var(--bg-tertiary)' : '';
            });

            // 加载消息
            loadMessages(chatId);

            // 更新输入框占位符
            updatePlaceholder(chatId);

            // 移动端：切换到会话页
            if (window.innerWidth <= 768) {
                document.getElementById('chatPage').classList.add('visible');
            }
        }

        // ========== 动态占位符 ==========
        function updatePlaceholder(chatId) {
            const input = document.getElementById('messageInput');
            if (chatId === 'all') {
                input.placeholder = '💬 输入 @Agent名称 开始对话...';
            } else {
                const agent = AGENTS.find(a => a.id === chatId);
                if (agent) {
                    const isOnline = agentStatus[chatId];
                    if (isOnline) {
                        input.placeholder = `💬 发送消息给 ${agent.name}...`;
                    } else {
                        input.placeholder = `💤 ${agent.name} 离线中，消息会在上线后送达`;
                    }
                } else {
                    input.placeholder = '💬 输入消息...';
                }
            }
        }

        function showList() {
            document.getElementById('chatPage').classList.remove('visible');
        }

        // ========== 对话列表 ==========
        function initChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';

            // 全员群聊
            const groupChat = createChatItem({
                id: 'all',
                name: '全员群聊',
                emoji: '👥',
                color: '#10b981',
                preview: '所有 Agent 都在这里',
                online: true
            });
            list.appendChild(groupChat);

            // 分隔线
            const divider = document.createElement('div');
            divider.className = 'section-title';
            divider.textContent = 'Agent 列表';
            list.appendChild(divider);

            // Agent 列表
            AGENTS.forEach(agent => {
                const item = createChatItem({
                    id: agent.id,
                    name: agent.name,
                    emoji: agent.emoji,
                    color: agent.color,
                    preview: agent.desc,
                    online: agentStatus[agent.id] || true  // 从状态获取，默认在线
                });
                list.appendChild(item);
            });
        }

        function createChatItem(chat) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.dataset.id = chat.id;
            div.onclick = () => showChat(chat.id);

            div.innerHTML = `
                <div class="chat-avatar" style="background:${chat.color}">
                    ${chat.emoji}
                    <span class="online-dot ${chat.online ? '' : 'offline'}" id="dot-${chat.id}"></span>
                </div>
                <div class="chat-info">
                    <div class="chat-name">${chat.name}</div>
                    <div class="chat-preview" id="preview-${chat.id}">${chat.preview}</div>
                </div>
                <div class="chat-meta">
                    <div class="chat-time" id="time-${chat.id}"></div>
                </div>
            `;

            return div;
        }

        function loadMessages(chatId) {
            const area = document.getElementById('messagesArea');
            const messages = chatMessages[chatId] || [];

            // 清除之前的离线提示
            hideOfflineBanner();

            if (messages.length === 0) {
                area.innerHTML = `
                    <div class="empty-state">
                        <i class="ri-chat-3-line"></i>
                        <p>${chatId === 'all' ? '群聊消息会显示在这里' : `与 ${chatId} 的对话`}</p>
                    </div>
                `;
            } else {
                area.innerHTML = messages.map(msg => renderMessage(msg)).join('');
                area.scrollTop = area.scrollHeight;
            }

            // 如果是私聊且 Agent 离线，显示离线提示
            if (chatId !== 'all') {
                const agent = AGENTS.find(a => a.id === chatId);
                if (agent && !agentStatus[chatId]) {
                    showOfflineBanner(chatId, agent);
                }
            }
        }

        function renderMessage(msg) {
            const isHuman = msg.senderType === 'human';
            const agent = AGENTS.find(a => a.id === msg.sender) || { name: msg.sender, emoji: '🤖' };
            
            let text = escapeHtml(msg.text);
            text = text.replace(/@(\w+)/g, '<span class="mention">@$1</span>');
            
            const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            return `
                <div class="message ${isHuman ? 'human' : 'agent'}">
                    <span class="sender">${isHuman ? '你' : agent.emoji + ' ' + agent.name}</span>
                    <div class="text">${text}</div>
                    <div class="time">${time}</div>
                </div>
            `;
        }

        // ========== WebSocket ==========
        function connectWebSocket() {
            updateStatus('connecting');

            try {
                ws = new WebSocket(`${WS_URL}/human-demo`);

                ws.onopen = () => {
                    connected = true;
                    httpMode = false;
                    updateStatus('connected');
                    stopHttpPolling();
                };

                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    handleWebSocketMessage(msg);
                };

                ws.onclose = () => {
                    connected = false;
                    if (!httpMode) startHttpPolling();
                };

                ws.onerror = () => {
                    connected = false;
                };

            } catch (e) {
                startHttpPolling();
            }
        }

        function handleWebSocketMessage(msg) {
            switch (msg.type) {
                case 'welcome':
                    if (msg.agents) {
                        msg.agents.forEach(id => {
                            agentStatus[id] = true;
                            updateAgentDot(id, true);
                        });
                    }
                    break;

                case 'status':
                    if (msg.agents) {
                        Object.entries(msg.agents).forEach(([id, s]) => {
                            agentStatus[id] = s.status === 'online';
                            updateAgentDot(id, agentStatus[id]);
                        });
                    }
                    break;

                case 'message':
                case 'broadcast':
                case 'agent_message':
                    // 解析 sender：local:main -> main, human:demo -> demo_user
                    const senderId = msg.from?.includes(':') ? msg.from.split(':')[1] : msg.from;
                    const isHuman = msg.from?.startsWith('human:');
                    addMessage({
                        sender: senderId,
                        senderType: isHuman ? 'human' : 'agent',
                        text: msg.content,
                        timestamp: msg.timestamp || Date.now()
                    });
                    // 隐藏正在思考提示
                    hideTypingIndicator();
                    break;

                case 'agent_online':
                    // agentId 格式: local:main -> main
                    const onlineId = msg.agentId?.includes(':') ? msg.agentId.split(':')[1] : msg.agentId;
                    agentStatus[onlineId] = true;
                    updateAgentDot(onlineId, true);
                    break;

                case 'agent_offline':
                    // agentId 格式: local:main -> main
                    const offlineId = msg.agentId?.includes(':') ? msg.agentId.split(':')[1] : msg.agentId;
                    agentStatus[offlineId] = false;
                    updateAgentDot(offlineId, false);
                    break;
            }
        }

        function updateAgentDot(agentId, online) {
            const dot = document.getElementById(`dot-${agentId}`);
            const preview = document.getElementById(`preview-${agentId}`);
            const agent = AGENTS.find(a => a.id === agentId);

            if (online) {
                agentLastOnline[agentId] = Date.now();
                if (dot) dot.className = 'online-dot';
                if (preview && agent) {
                    preview.innerHTML = '在线';
                }
            } else {
                if (dot) dot.className = 'online-dot offline';
                if (preview && agent) {
                    const lastTime = agentLastOnline[agentId];
                    let timeText = '离线';
                    if (lastTime) {
                        timeText = `离线 · ${formatLastOnline(lastTime)}`;
                    }
                    preview.innerHTML = `<span class="offline-detail">${timeText}</span>`;
                }
            }

            // 更新当前对话头部状态
            if (currentChat === agentId) {
                const headerStatus = document.getElementById('headerStatus');
                headerStatus.textContent = online ? '在线' : '离线';
                updatePlaceholder(agentId);
                
                // 如果离线，显示离线提示 Banner
                if (!online && agent) {
                    showOfflineBanner(agentId, agent);
                } else {
                    hideOfflineBanner();
                }
            }
        }

        // ========== 离线提示 Banner ==========
        function showOfflineBanner(agentId, agent) {
            const area = document.getElementById('messagesArea');
            const existing = area.querySelector('.offline-banner');
            if (existing) existing.remove();

            const lastTime = agentLastOnline[agentId];
            const timeText = lastTime ? formatLastOnline(lastTime) : '未知';

            const banner = document.createElement('div');
            banner.className = 'offline-banner';
            banner.id = 'offlineBanner';
            banner.innerHTML = `
                <i class="ri-time-line"></i>
                <div class="offline-info">
                    <div class="offline-title">${agent.name} 当前离线</div>
                    <div class="offline-time">最后在线：${timeText}</div>
                </div>
                <div class="offline-actions">
                    <button class="offline-btn primary" onclick="sendOfflineMessage('${agentId}')">发送消息</button>
                    <button class="offline-btn secondary" onclick="switchToAllChat()">切换群聊</button>
                </div>
            `;
            
            // 插入到消息区域顶部
            area.insertBefore(banner, area.firstChild);
        }

        function hideOfflineBanner() {
            const banner = document.getElementById('offlineBanner');
            if (banner) banner.remove();
        }

        function sendOfflineMessage(agentId) {
            const input = document.getElementById('messageInput');
            input.focus();
            input.placeholder = `💤 消息将在 ${agentId} 上线后送达...`;
        }

        function switchToAllChat() {
            showChat('all');
        }

        // 格式化最后在线时间
        function formatLastOnline(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            
            if (diff < 60000) {
                return '刚刚';
            } else if (diff < 3600000) {
                const mins = Math.floor(diff / 60000);
                return `${mins} 分钟前`;
            } else if (diff < 86400000) {
                const hours = Math.floor(diff / 3600000);
                return `${hours} 小时前`;
            } else {
                const days = Math.floor(diff / 86400000);
                return `${days} 天前`;
            }
        }

        // ========== HTTP 轮询 ==========
        function startHttpPolling() {
            if (httpPollingInterval) return;
            
            httpMode = true;
            updateStatus('http');

            fetchMessages();
            fetchAgentStatus();

            httpPollingInterval = setInterval(fetchMessages, 3000);
        }

        function stopHttpPolling() {
            if (httpPollingInterval) {
                clearInterval(httpPollingInterval);
                httpPollingInterval = null;
            }
        }

        async function fetchMessages() {
            try {
                const res = await fetch(`${HTTP_API}/messages`);
                const data = await res.json();

                if (data.success && data.messages) {
                    const newMessages = data.messages.filter(m => m.id > lastMessageId);
                    newMessages.forEach(msg => {
                        addMessage({
                            sender: msg.sender,
                            senderType: msg.senderType,
                            text: msg.text,
                            timestamp: new Date(msg.timestamp).getTime()
                        }, msg.id);
                    });
                }
            } catch (e) {}
        }

        async function fetchAgentStatus() {
            try {
                const res = await fetch(`${HTTP_API}/agents`);
                const data = await res.json();

                if (data.success && data.agents) {
                    data.agents.forEach(id => {
                        agentStatus[id] = true;
                        updateAgentDot(id, true);
                    });
                }
            } catch (e) {}
        }

        async function sendMessageHttp(text) {
            try {
                await fetch(`${HTTP_API}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sender: 'demo_user',
                        senderType: 'human',
                        text: text,
                        targetAgent: currentChat === 'all' ? null : currentChat
                    })
                });
                setTimeout(fetchMessages, 500);
            } catch (e) {}
        }

        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            switch (status) {
                case 'connected':
                    dot.className = 'dot';
                    text.textContent = '在线';
                    break;
                case 'http':
                    dot.className = 'dot http';
                    text.textContent = 'HTTP';
                    break;
                case 'connecting':
                    dot.className = 'dot';
                    dot.style.background = '#6b7280';
                    text.textContent = '连接中';
                    break;
            }
        }

        // ========== 消息 ==========
        function addMessage(msg, id = null) {
            if (id && id <= lastMessageId) return;
            if (id) lastMessageId = id;

            // 如果收到 Agent 回复，隐藏思考提示
            if (msg.senderType === 'agent') {
                hideTypingIndicator();
            }

            let targetChat = 'all';
            if (msg.senderType === 'agent') {
                targetChat = msg.sender;
            } else if (msg.sender === 'user') {
                targetChat = currentChat;
            }

            if (!chatMessages[targetChat]) chatMessages[targetChat] = [];
            chatMessages[targetChat].push(msg);

            // 更新预览
            const preview = document.getElementById(`preview-${targetChat}`);
            if (preview) {
                preview.textContent = msg.text.substring(0, 25) + (msg.text.length > 25 ? '...' : '');
            }

            // 更新时间
            const timeEl = document.getElementById(`time-${targetChat}`);
            if (timeEl) {
                timeEl.textContent = new Date(msg.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }

            // 如果是当前对话，显示消息
            if (targetChat === currentChat) {
                const area = document.getElementById('messagesArea');
                const empty = area.querySelector('.empty-state');
                if (empty) empty.remove();

                // 移除思考指示器后添加消息
                const indicator = document.getElementById('typingIndicator');
                if (indicator) {
                    indicator.insertAdjacentHTML('beforebegin', renderMessage(msg));
                } else {
                    area.insertAdjacentHTML('beforeend', renderMessage(msg));
                }
                area.scrollTop = area.scrollHeight;
            }
        }

        // ========== 输入 ==========
        function setupInputHandlers() {
            const input = document.getElementById('messageInput');

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            input.addEventListener('input', (e) => {
                const value = input.value;
                const pos = input.selectionStart;
                const lastAt = value.lastIndexOf('@', pos - 1);
                
                if (lastAt !== -1) {
                    const afterAt = value.substring(lastAt + 1, pos);
                    if (!afterAt.includes(' ') && afterAt.length <= 20) {
                        mentionStartPos = lastAt;
                        showMentionPicker(afterAt);
                        return;
                    }
                }
                hideMentionPicker();
            });

            input.addEventListener('blur', () => setTimeout(hideMentionPicker, 200));
        }

        function showMentionPicker(filter = '') {
            const picker = document.getElementById('mentionPicker');
            
            // 全员选项（始终显示在最前面）
            const allOption = {
                id: 'all',
                name: '全员',
                emoji: '📢',
                color: '#10b981',
                desc: '通知所有在线 Agent'
            };
            
            // 过滤 Agent
            const filtered = AGENTS.filter(a => 
                a.name.toLowerCase().includes(filter.toLowerCase()) ||
                a.id.toLowerCase().includes(filter.toLowerCase())
            );
            
            // 如果搜索 "all" 或 "全员" 或没有过滤条件，显示全员选项
            const showAll = !filter || 'all'.includes(filter.toLowerCase()) || '全员'.includes(filter);

            if (filtered.length === 0 && !showAll) {
                hideMentionPicker();
                return;
            }

            let html = '';
            
            // 全员选项
            if (showAll) {
                html += `
                    <div class="mention-item" onclick="insertMention('all')" style="background:rgba(16,185,129,0.1)">
                        <div class="mini-avatar" style="background:${allOption.color}">${allOption.emoji}</div>
                        <span><strong>${allOption.name}</strong> <span style="color:var(--text-secondary)">通知所有 Agent</span></span>
                    </div>
                `;
            }
            
            // Agent 列表
            html += filtered.map(a => `
                <div class="mention-item" onclick="insertMention('${a.id}')">
                    <div class="mini-avatar" style="background:${a.color}">${a.emoji}</div>
                    <span>${a.name} <span style="color:var(--text-secondary)">@${a.id}</span></span>
                </div>
            `).join('');

            picker.innerHTML = html;
            picker.classList.add('show');
        }

        function hideMentionPicker() {
            document.getElementById('mentionPicker').classList.remove('show');
        }

        function insertMention(agentId) {
            const input = document.getElementById('messageInput');
            const value = input.value;
            const before = value.substring(0, mentionStartPos);
            const after = value.substring(input.selectionStart);

            input.value = before + `@${agentId} ` + after;
            input.focus();
            hideMentionPicker();
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage({
                sender: 'demo_user',
                senderType: 'human',
                text: text,
                timestamp: Date.now()
            });

            if (connected && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: currentChat === 'all' ? 'broadcast' : 'message',
                    from: 'human:demo_user',  // 格式: human:{userId}
                    to: currentChat === 'all' ? null : `local:${currentChat}`,  // 格式: local:{agentId}
                    content: text,
                    timestamp: Date.now()
                }));
                
                // 显示 Agent 正在思考提示
                if (currentChat !== 'all') {
                    showTypingIndicator(currentChat);
                } else {
                    // 群聊中提及了某个 Agent
                    const mention = text.match(/@(\w+)/);
                    if (mention) {
                        const mentionedId = mention[1];
                        if (AGENTS.find(a => a.id === mentionedId) || mentionedId === 'all') {
                            showTypingIndicator(mentionedId);
                        }
                    }
                }
            } else if (httpMode) {
                sendMessageHttp(text);
            }

            input.value = '';
            hideMentionPicker();
        }

        // ========== 消息状态反馈（正在思考） ==========
        function showTypingIndicator(agentId) {
            const agent = AGENTS.find(a => a.id === agentId);
            if (!agent) return;

            // 清除之前的超时
            if (typingTimeout) {
                clearTimeout(typingTimeout);
            }

            const area = document.getElementById('messagesArea');
            let indicator = document.getElementById('typingIndicator');
            
            if (!indicator) {
                indicator = document.createElement('div');
                indicator.id = 'typingIndicator';
                indicator.className = 'typing-indicator';
            }

            indicator.innerHTML = `
                <span class="typing-emoji">${agent.emoji}</span>
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span class="typing-text">${agent.name} 正在思考...</span>
            `;

            // 如果还没添加到 DOM
            if (!indicator.parentElement) {
                area.appendChild(indicator);
            }
            
            area.scrollTop = area.scrollHeight;
            typingAgent = agentId;

            // 30 秒后自动隐藏
            typingTimeout = setTimeout(() => {
                hideTypingIndicator();
            }, 30000);
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
            typingAgent = null;
            if (typingTimeout) {
                clearTimeout(typingTimeout);
                typingTimeout = null;
            }
        }

        function escapeHtml(text) {
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
<script>FieldTips.init({pageType:"agent"});</script></body>
