<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四象限任务面板 - Morning Task System V2</title>
    
            <link rel="stylesheet" href="styles/navigation.css">
    <link rel="stylesheet" href="styles/components/sidebar-nav.css">
    
    <style>
        /* ===================================
           四象限页面专用样式 - Deep Dark
           =================================== */
        .quadrant-page {
            min-height: 100vh;
            background: var(--theme-bg);
            padding-top: 56px;
        }
        
        .layout-container {
            display: flex;
            min-height: 100vh;
        }
        
        .layout-main {
            flex: 1;
            margin-left: 240px;
            padding: 24px;
            overflow-y: auto;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .layout-main.sidebar-collapsed {
            margin-left: 64px;
        }
        
        .page-header { margin-bottom: 48px; }
        
        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--theme-text);
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .page-description {
            font-size: 14px;
            color: var(--theme-text-secondary);
            margin: 0;
        }
        
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .action-input {
            flex: 1;
            min-width: 200px;
            background: var(--theme-card-bg);
            border: 1px solid var(--theme-border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--theme-text);
            font-size: 14px;
        }
        
        .action-input:focus { outline: none; border-color: var(--theme-primary); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 48px;
        }
        
        .stat-card {
            background: var(--theme-card-bg);
            border: 1px solid var(--theme-border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            border-color: var(--theme-primary);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--theme-primary);
            display: block;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--theme-text-secondary);
            display: block;
        }
        
        .stat-icon {
            font-size: 20px;
            margin-bottom: 12px;
            display: block;
        }
        
        .quadrant-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 48px;
        }
        
        .quadrant-card {
            background: var(--theme-card-bg);
            border: 1px solid var(--theme-border);
            border-radius: 12px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }
        
        .quadrant-card:hover { border-color: var(--theme-primary); }
        
        .quadrant.q1 { border-top: 4px solid var(--theme-danger); }
        .quadrant.q2 { border-top: 4px solid var(--theme-primary); }
        .quadrant.q3 { border-top: 4px solid var(--theme-warning); }
        .quadrant.q4 { border-top: 4px solid var(--theme-success); }
        
        .quadrant-header {
            padding: 20px;
            border-bottom: 1px solid var(--theme-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .quadrant-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--theme-text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .quadrant-badge {
            background: var(--theme-primary-light);
            color: var(--theme-primary);
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .quadrant-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            min-height: 200px;
        }
        
        .quadrant-content.drag-over {
            background: var(--theme-primary-lighter);
            border-radius: 0 0 12px 12px;
        }
        
        .task-card {
            background: var(--theme-card-bg);
            border: 1px solid var(--theme-border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: grab;
            transition: all 0.2s;
            position: relative;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
            border-color: var(--theme-primary);
        }
        
        .task-card:active { cursor: grabbing; }
        
        .task-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.4);
        }
        
        .task-card.completed { opacity: 0.6; border-left: 4px solid var(--theme-success); }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        
        .task-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--theme-text);
            line-height: 1.5;
            flex: 1;
        }
        
        .task-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 12px;
        }
        
        .priority-badge {
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .priority-high { background: rgba(239, 68, 68, 0.15); color: var(--theme-danger); }
        .priority-medium { background: rgba(245, 158, 11, 0.15); color: var(--theme-warning); }
        .priority-low { background: rgba(59, 130, 246, 0.15); color: var(--theme-primary); }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 500;
        }
        
        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .status-pending .status-badge::before { background: var(--theme-warning); }
        .status-doing .status-badge::before { background: var(--theme-success); }
        .status-completed .status-badge::before { background: var(--theme-text-muted); }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .status-pending .status-indicator { background: var(--theme-warning); }
        .status-doing .status-indicator { background: var(--theme-success); }
        .status-completed .status-indicator { background: var(--theme-text-muted); }
        
        .task-time {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--theme-text-secondary);
            font-size: 12px;
        }
        
        .task-time.due-soon {
            color: var(--theme-danger);
            font-weight: 600;
        }
        
        .task-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--theme-border);
        }
        
        .task-btn {
            background: transparent;
            border: none;
            color: var(--theme-text-secondary);
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .task-btn:hover { background: var(--theme-primary-light); color: var(--theme-primary); }
        
        .empty-quadrant {
            text-align: center;
            padding: 48px 20px;
            color: var(--theme-text-secondary);
        }
        
        .empty-quadrant-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        .empty-quadrant-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--theme-text);
            margin-bottom: 8px;
        }
        
        .trash-tip {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .trash-tip-btn {
            background: var(--theme-danger);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            background: var(--theme-card-bg);
            border: 1px solid var(--theme-border);
            border-radius: 8px;
            padding: 8px 16px;
            color: var(--theme-text);
            font-size: 14px;
            cursor: pointer;
        }
        
        .filter-select:focus { outline: none; border-color: var(--theme-primary); }
        
        .fab-create {
            position: fixed;
            bottom: 48px;
            right: 48px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--theme-gradient-primary);
            color: white;
            border: none;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
            z-index: 999;
        }
        
        .fab-create:hover { transform: scale(1.1) rotate(90deg); }
        
        .toast {
            position: fixed;
            bottom: 48px;
            right: 48px;
            background: var(--theme-card-bg);
            border-left: 4px solid var(--theme-primary);
            border-radius: 8px;
            padding: 16px 24px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 1001;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .toast.active { transform: translateX(0); }
        
        .toast-icon { font-size: 24px; }
        .toast-title { font-size: 16px; font-weight: 600; color: var(--theme-text); }
        .toast-message { font-size: 14px; color: var(--theme-text-secondary); }
        
        .quadrant-content::-webkit-scrollbar { width: 6px; }
        .quadrant-content::-webkit-scrollbar-track { background: var(--theme-bg); border-radius: 9999px; }
        .quadrant-content::-webkit-scrollbar-thumb { background: var(--theme-border); border-radius: 9999px; }
        
        .drag-placeholder {
            height: 40px;
            border: 2px dashed var(--theme-border);
            border-radius: 8px;
            background: var(--theme-primary-lighter);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--theme-primary);
            font-size: 14px;
        }
        
        @media (max-width: 1023px) {
            .layout-main { margin-left: 0; }
        }
        
        @media (max-width: 767px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .quadrant-grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, auto); }
            .quick-actions { flex-direction: column; }
        }
    </style>

<body>

    <div class="quadrant-page">
        <div class="layout-container">
            <main class="layout-main" id="mainContent">
                <div class="page-header">
                    <h1 class="page-title">
                        <span>📊</span>
                        四象限任务面板
                    </h1>
                    <p class="page-description">基于时间管理四象限法则的任务管理系统</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="stat-icon ri-file-list-3-line"></i>
                        <span class="stat-value" id="total-count" data-testid="stat-value-total">0</span>
                        <span class="stat-label" data-testid="stat-label-total">全部任务</span>
                    </div>
                    <div class="stat-card">
                        <i class="stat-icon ri-checkbox-blank-circle-fill"></i>
                        <span class="stat-value" id="q1-count" data-testid="stat-value-q1">0</span>
                        <span class="stat-label" data-testid="stat-label-q1">Q1 紧急且重要</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon" data-testid="stat-icon-q2">🔵</span>
                        <span class="stat-value" id="q2-count" data-testid="stat-value-q2">0</span>
                        <span class="stat-label" data-testid="stat-label-q2">Q2 重要不紧急</span>
                    </div>
                    <div class="stat-card">
                        <i class="stat-icon ri-checkbox-blank-circle-fill"></i>
                        <span class="stat-value" id="q3-count" data-testid="stat-value-q3">0</span>
                        <span class="stat-label" data-testid="stat-label-q3">Q3 紧急不重要</span>
                    </div>
                </div>
                
                <div class="quick-actions">
                    <input
                        type="text"

                        class="action-input"

                    />
                    <button
                        class="btn-primary"
                        id="quick-add-btn"
                        data-testid="quick-add-btn"
                    >➕ 添加</button>
                    <button
                        class="btn-secondary"
                        id="view-trash-btn"
                        data-testid="view-trash-btn"
                    >🗑️ 回收站</button>
                </div>
                
                <div class="trash-tip" id="trash-tip" data-testid="trash-tip" hidden>
                    <div class="trash-title">

                        <span>回收站中有 <span id="trash-count">0</span> 个任务</span>
                    </div>
                    <button class="trash-tip-btn" data-testid="trash-restore-btn">查看并恢复</button>
                </div>
                
                <div class="toolbar">
                    <input
                        type="text"
                        id="search-input"
                        class="action-input"
                        placeholder="🔍 搜索任务..."
                        data-testid="search-input"
                    />
                    <select
                        id="filter-priority"
                        class="filter-select"
                        data-testid="filter-priority"
                    >
                        <option value="all">优先级：全部</option>
                        <option value="high">高优先级</option>
                        <option value="medium">中优先级</option>
                        <option value="low">低优先级</option>
                    </select>
                    <select
                        id="filter-status"
                        class="filter-select"
                        data-testid="filter-status"
                    >
                        <option value="all">状态：全部</option>
                        <option value="pending">待处理</option>
                        <option value="doing">进行中</option>
                        <option value="completed">已完成</option>

                    </div>
                    <div class="quadrant q2" data-quadrant="2" data-testid="quadrant-q2">
                        <div class="quadrant-header">
                            <div class="quadrant-title">
                                <span>🔵</span>
                                <span>Q2 重要不紧急</span>
                            </div>
                            <div class="quadrant-actions">
                                <span class="quadrant-badge" data-testid="q2-badge">0</span>
                            </div>
                        </div>
                        <div class="quadrant-content" data-quadrant="2" data-testid="q2-list" data-drop-zone="true">
                            <div class="empty-quadrant" data-testid="q2-empty">

                    <div class="quadrant q3" data-quadrant="3" data-testid="quadrant-q3">
                        <div class="quadrant-header">
                            <div class="quadrant-title">

                                <span>Q3 紧急不重要</span>
                            </div>
                            <div class="quadrant-actions">
                                <span class="quadrant-badge" data-testid="q3-badge">0</span>
                            </div>
                        </div>
                        <div class="quadrant-content" data-quadrant="3" data-testid="q3-list" data-drop-zone="true">
                            <div class="empty-quadrant" data-testid="q3-empty">
                                <div class="empty-quadrant-icon">_empty_</div>
                                <div class="empty-quadrant-title">暂无任务</div>

                        </div>
                    </div>
                    <div class="quadrant q4" data-quadrant="4" data-testid="quadrant-q4">
                        <div class="quadrant-header">
                            <div class="quadrant-title">

                                <span>Q4 不重要不紧急</span>

                                <span class="quadrant-badge" data-testid="q4-badge">0</span>
                            </div>

                            <div class="empty-quadrant" data-testid="q4-empty">

        <button class="fab-create" id="fab-create" data-testid="fab-create">➕</button>

            <div class="toast-content">
                <span class="toast-title" id="toast-title">操作成功</span>
                <span class="toast-message" id="toast-message">任务已创建</span>
            </div>
        </div>

    <script>
        const TaskManager = {
            tasks: [],
            apiBase: '/api',
            
            async loadTasks() {
                try {
                    const res = await fetch(`${this.apiBase}/tasks?showCompleted=true`);
                    const data = await res.json();
                    if (data.success) {
                        this.tasks = data.tasks || [];
                        return true;
                    }
                } catch (e) { console.error('加载失败:', e); }
                return false;
            },
            
            showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                const icon = document.getElementById('toast-icon');
                const title = document.getElementById('toast-title');
                const msg = document.getElementById('toast-message');
                
                msg.textContent = message;
                icon.textContent = type === 'error' ? '❌' : '✅';
                title.textContent = type === 'error' ? '操作失败' : '操作成功';
                
                toast.classList.add('active');
                setTimeout(() => toast.classList.remove('active'), 3000);
            },
            
            getStats(tasks) {
                const stats = { total: 0, q1: 0, q2: 0, q3: 0, q4: 0 };
                tasks.forEach(t => {
                    if (t.status === 'deleted' || t.status === 'archived') return;
                    stats.total++;
                    const q = t.quadrant || 1;
                    stats['q' + q] = (stats['q' + q] || 0) + 1;
                });
                return stats;
            }
        };
        
        const QuadrantRenderer = {
            renderAll(tasks) {
                this.renderStats(tasks);
                this.renderQuadrant(1, tasks);
                this.renderQuadrant(2, tasks);
                this.renderQuadrant(3, tasks);
                this.renderQuadrant(4, tasks);
                this.updateTrashTip(tasks);
                this.bindDragEvents();
            },
            
            renderStats(tasks) {
                const stats = TaskManager.getStats(tasks);
                
                document.getElementById('total-count').textContent = stats.total;
                document.getElementById('q1-count').textContent = stats.q1;
                document.getElementById('q2-count').textContent = stats.q2;
                document.getElementById('q3-count').textContent = stats.q3;
                
                document.getElementById('q1-badge').textContent = stats.q1;
                document.getElementById('q2-badge').textContent = stats.q2;
                document.getElementById('q3-badge').textContent = stats.q3;
                document.getElementById('q4-badge').textContent = stats.q4;
            },
            
            renderQuadrant(q, tasks) {
                const list = document.getElementById('q' + q + '-list');
                const empty = document.getElementById('q' + q + '-empty');
                
                const filtered = tasks.filter(t => (t.quadrant || t.quadrant_id || 1) === q);
                
                if (filtered.length === 0) {
                    list.innerHTML = '<div class="empty-quadrant" data-testid="q' + q + '-empty"><div class="empty-quadrant-icon">_empty_</div><div class="empty-quadrant-title">暂无任务</div></div>';
                } else {
                    list.innerHTML = filtered.map(t => this.createTaskCard(t)).join('');
                }
            },
            
            createTaskCard(task) {
                const priority = task.priority || 'medium';
                const status = task.status || 'pending';
                
                return '<div class="task-card ' + (status === 'completed' ? 'completed' : '') + '" draggable="true" data-task-id="' + task.id + '" data-quadrant="' + (task.quadrant || 1) + '" data-testid="task-card-' + task.id + '">' +
                    '<div class="task-header"><div class="task-title">' + this.escape(task.title) + '</div></div>' +
                    '<div class="task-meta">' +
                        '<span class="priority-badge priority-' + priority + '" data-testid="task-priority-' + priority + '">' + priority.toUpperCase() + '</span>' +
                        '<span class="status-badge status-' + status + '" data-testid="task-status-' + status + '"><span class="status-indicator"></span>' + this.getStatusText(status) + '</span>' +
                    '</div>' +
                    (task.dueDate ? '<div class="task-time">⏱️ ' + this.formatDueDate(task.dueDate) + '</div>' : '') +
                    '<div class="task-actions">' +
                        '<button class="task-btn" data-testid="task-edit-' + task.id + '">✏️</button>' +
                        '<button class="task-btn" data-testid="task-delete-' + task.id + '">🗑️</button>' +
                    '</div>' +
                '</div>';
            },
            
            getStatusText(s) {
                return { pending: '待处理', doing: '进行中', completed: '已完成' }[s] || '待处理';
            },
            
            formatDueDate(date) {
                if (!date) return '';
                const d = new Date(date);
                const now = new Date();
                const diff = d - now;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                
                if (days < 0) return ' overdue ' + Math.abs(days) + '天';
                if (days === 0) return 'today';
                if (days === 1) return 'tomorrow';
                if (days <= 7) return days + '天';
                return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
            },
            
            escape(text) {
                if (!text) return '';
                return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            },
            
            bindDragEvents() {
                const cards = document.querySelectorAll('.task-card');
                
                cards.forEach(card => {
                    card.addEventListener('dragstart', e => {
                        e.target.classList.add('dragging');
                        e.dataTransfer.setData('text/plain', e.target.dataset.taskId);
                    });
                    
                    card.addEventListener('dragend', e => e.target.classList.remove('dragging'));
                    
                    card.addEventListener('click', e => {
                        if (!e.target.classList.contains('task-btn') && !e.target.closest('.task-btn')) {
                            window.open('task-detail-v2-final.html?id=' + card.dataset.taskId, '_blank');
                        }
                    });
                    
                    card.addEventListener('click', e => {
                        if (e.target.closest('.task-delete')) {
                            e.stopPropagation();
                            if (confirm('确定要删除这个任务吗?')) {
                                this.deleteTask(card.dataset.taskId);
                            }
                        }
                    });
                });
                
                const zones = document.querySelectorAll('[data-drop-zone="true"]');
                zones.forEach(zone => {
                    zone.addEventListener('dragover', e => {
                        e.preventDefault();
                        zone.classList.add('drag-over');
                    });
                    
                    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
                    
                    zone.addEventListener('drop', e => {
                        e.preventDefault();
                        zone.classList.remove('drag-over');
                        const taskId = e.dataTransfer.getData('text/plain');
                        const oldQ = e.dataTransfer.getData('quadrant') || 1;
                        const newQ = zone.dataset.quadrant;
                        
                        if (taskId && oldQ !== newQ) {
                            this.moveTask(taskId, parseInt(newQ));
                        }
                    });
                });
            },
            
            async moveTask(taskId, newQ) {
                const res = await fetch('/api/tasks/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId, quadrant: newQ })
                });
                const data = await res.json();
                if (data.success) {
                    TaskManager.showToast('任务已移动');
                    await TaskManager.loadTasks();
                    QuadrantRenderer.renderAll(TaskManager.tasks);
                }
            },
            
            async deleteTask(taskId) {
                const res = await fetch('/api/tasks/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId })
                });
                const data = await res.json();
                if (data.success) {
                    TaskManager.showToast('任务已移动到回收站');
                    await TaskManager.loadTasks();
                    QuadrantRenderer.renderAll(TaskManager.tasks);
                }
            },
            
            updateTrashTip(tasks) {
                const count = tasks.filter(t => t.status === 'deleted' || t.status === 'archived').length;
                document.getElementById('trash-count').textContent = count;
                document.getElementById('trash-tip').hidden = count === 0;
            }
        };
        
        document.addEventListener('DOMContentLoaded', async () => {
            await TaskManager.loadTasks();
            QuadrantRenderer.renderAll(TaskManager.tasks);
            
            setInterval(async () => {
                await TaskManager.loadTasks();
                QuadrantRenderer.renderAll(TaskManager.tasks);
            }, 10000);
            
            //快速添加
            document.getElementById('quick-add-btn').addEventListener('click', async () => {
                const input = document.getElementById('quick-task-input');
                const title = input.value.trim();
                if (title) {
                    const res = await fetch('/api/tasks/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, quadrant: 1, priority: 'medium', status: 'pending' })
                    });
                    const data = await res.json();
                    if (data.success) {
                        TaskManager.showToast('任务已添加');
                        input.value = '';
                        await TaskManager.loadTasks();
                        QuadrantRenderer.renderAll(TaskManager.tasks);
                    }
                }
            });
            
            //浮动创建按钮
            document.getElementById('fab-create').addEventListener('click', () => {
                TaskManager.showToast('点击创建按钮');
            });
        });
    </script>

  <script src="js/sidebar.js"></script>
  <script>Sidebar.init({ activePage: 'quadrant' });</script>
<script>FieldTips.init({pageType:"general"});</script></body>
