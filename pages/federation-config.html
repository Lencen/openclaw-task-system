<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="assets/fonts/remixicon.css" rel="stylesheet">
  <title>联邦通信配置 - 任务系统</title>
  
  <!-- 统一框架样式 -->
  <link rel="stylesheet" href="css/frame.css">
  <link rel="stylesheet" href="css/sidebar.css">
  
  <style>
    /* ========== 页面专用样式 ========== */
    
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    
    .page-title {
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-primary);
      transition: all 0.2s;
    }
    
    .back-btn:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    
    .tab {
      padding: 10px 20px;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 14px;
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    
    .tab:hover {
      background: var(--bg-tertiary);
    }
    
    .tab.active {
      background: var(--bg-secondary);
      border-color: var(--border);
      color: var(--text-primary);
      font-weight: 500;
    }
    
    .section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .agent-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      transition: all 0.2s;
    }
    
    .agent-card:hover {
      border-color: var(--primary);
    }
    
    .agent-card.disabled {
      opacity: 0.5;
    }
    
    .agent-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .agent-icon {
      width: 40px;
      height: 40px;
      background: var(--bg-secondary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .agent-info {
      flex: 1;
    }
    
    .agent-name {
      font-size: 14px;
      font-weight: 600;
    }
    
    .agent-role {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .agent-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .toggle-switch.active {
      background: var(--success);
    }
    
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: all 0.3s;
    }
    
    .toggle-switch.active::after {
      left: 23px;
    }
    
    .agent-config {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    
    .config-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .config-label {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .config-value {
      font-size: 12px;
      font-family: monospace;
      background: var(--bg-secondary);
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    .model-select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--text-primary);
      font-size: 12px;
      min-width: 150px;
    }
    
    .instance-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .instance-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    
    .instance-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    
    .instance-name {
      font-size: 14px;
      font-weight: 600;
    }
    
    .instance-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .status-dot.online {
      background: var(--success);
    }
    
    .status-dot.offline {
      background: var(--danger);
    }
    
    .instance-agents {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .agent-tag {
      background: var(--bg-secondary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }
    
    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    
    .btn-secondary {
      background: var(--bg-tertiary);
      border-color: var(--border);
      color: var(--text-primary);
    }
    
    .btn-secondary:hover {
      background: var(--bg-quaternary);
    }
    
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
  </style>
<script src="js/field-tips.js"></script></head>
<body>
  <!-- 统一框架结构 -->
  <div class="layout">
    <div id="sidebar-container"></div>
    <main class="main">
      <header class="header">
        <h1 class="header-title">🌐 联邦通信配置</h1>
        <button class="back-btn" onclick="window.location.href='channels.html'">
          <i class="ri-arrow-left-line"></i> 返回渠道
        </button>
      </header>
      
      <div class="content">
        <div class="tabs">
          <div class="tab active" data-tab="agents" onclick="switchTab('agents')">
            <i class="ri-robot-line"></i> Agent 配置
          </div>
          <div class="tab" data-tab="instances" onclick="switchTab('instances')">
            <i class="ri-global-line"></i> 远程实例
          </div>
          <div class="tab" data-tab="settings" onclick="switchTab('settings')">
            <i class="ri-settings-3-line"></i> 设置
          </div>
        </div>
        
        <!-- Agent 配置 -->
        <div id="tab-agents" class="tab-content">
          <div class="section">
            <div class="section-title">
              <i class="ri-robot-line"></i> 本地 Agent
            </div>
            <div id="agents-grid" class="agent-grid">
              <!-- Agent 卡片将在这里动态生成 -->
            </div>
          </div>
        </div>
        
        <!-- 远程实例 -->
        <div id="tab-instances" class="tab-content" style="display: none;">
          <div class="section">
            <div class="section-title">
              <i class="ri-global-line"></i> 已注册实例
              <button class="btn btn-primary" style="margin-left: auto;" onclick="showAddInstance()">
                <i class="ri-add-line"></i> 添加实例
              </button>
            </div>
            <div id="instances-list" class="instance-list">
              <!-- 实例列表将在这里动态生成 -->
            </div>
          </div>
        </div>
        
        <!-- 设置 -->
        <div id="tab-settings" class="tab-content" style="display: none;">
          <div class="section">
            <div class="section-title">
              <i class="ri-settings-3-line"></i> 联邦通信设置
            </div>
            <div id="settings-form">
              <!-- 设置表单将在这里动态生成 -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <!-- 统一侧边栏脚本 -->
  <script src="js/sidebar.js"></script>
  <script>
    // 初始化侧边栏
    Sidebar.init({ activePage: 'channels' });
  </script>
  
  <script>
    // 切换 Tab
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.dataset.tab === tabName) {
          tab.classList.add('active');
        }
      });
      
      document.querySelectorAll('.tab-content').forEach(content => {
        content.style.display = 'none';
      });
      document.getElementById(`tab-${tabName}`).style.display = 'block';
      
      if (tabName === 'instances' && window.location.hash === '#instances') {
        window.location.hash = '';
      }
    }
    
    // 加载 Agent 列表
    async function loadAgents() {
      const res = await fetch('/api/federation/agents');
      const data = await res.json();
      
      const grid = document.getElementById('agents-grid');
      grid.innerHTML = data.agents
        .filter(a => a.instance === 'local')
        .map(agent => `
          <div class="agent-card ${agent.enabled ? '' : 'disabled'}">
            <div class="agent-header">
              <div class="agent-icon">${agent.icon}</div>
              <div class="agent-info">
                <div class="agent-name">${agent.name}</div>
                <div class="agent-role">${agent.role}</div>
              </div>
              <div class="agent-toggle">
                <span style="font-size: 12px; color: var(--text-secondary);">${agent.enabled ? '启用' : '禁用'}</span>
                <div class="toggle-switch ${agent.enabled ? 'active' : ''}" onclick="toggleAgent('${agent.id}', ${!agent.enabled})"></div>
              </div>
            </div>
            <div class="agent-config">
              <div class="config-row">
                <span class="config-label">模型</span>
                <select class="model-select" onchange="updateAgentModel('${agent.id}', this.value)">
                  <option value="default" ${!agent.model || agent.model === 'default' ? 'selected' : ''}>默认模型</option>
                  <option value="qwencoding/glm-5" ${agent.model === 'qwencoding/glm-5' ? 'selected' : ''}>GLM-5</option>
                  <option value="qwencoding/qwen3-coder-next" ${agent.model === 'qwencoding/qwen3-coder-next' ? 'selected' : ''}>Qwen3 Coder</option>
                  <option value="nvidia-1/qwen/qwen3-coder-480b-a35b-instruct" ${agent.model === 'nvidia-1/qwen/qwen3-coder-480b-a35b-instruct' ? 'selected' : ''}>Qwen3 Coder (NVIDIA)</option>
                  <option value="qwencoding/glm-4.7" ${agent.model === 'qwencoding/glm-4.7' ? 'selected' : ''}>GLM-4.7</option>
                </select>
              </div>
              <div class="config-row">
                <span class="config-label">ID</span>
                <span class="config-value">${agent.id}</span>
              </div>
            </div>
          </div>
        `).join('');
    }
    
    // 切换 Agent 启用状态
    async function toggleAgent(agentId, enabled) {
      const res = await fetch(`/api/federation/agents/${agentId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled })
      });
      
      if (res.ok) {
        loadAgents();
      }
    }
    
    // 更新 Agent 模型
    async function updateAgentModel(agentId, model) {
      const res = await fetch(`/api/federation/agents/${agentId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: model === 'default' ? 'qwencoding/glm-5' : model })
      });
      
      if (res.ok) {
        console.log('模型已更新:', agentId, model);
      }
    }
    
    // 加载实例列表
    async function loadInstances() {
      const res = await fetch('/api/federation/status');
      const data = await res.json();
      
      const list = document.getElementById('instances-list');
      const instances = data.data?.remoteInstances || [];
      
      if (instances.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <i class="ri-global-line"></i>
            <p>暂无远程实例</p>
            <p style="font-size: 12px; margin-top: 8px;">其他 OpenClaw 实例注册后将显示在这里</p>
          </div>
        `;
        return;
      }
      
      list.innerHTML = instances.map(instance => `
        <div class="instance-card">
          <div class="instance-header">
            <span class="instance-name">${instance.name}</span>
            <div class="instance-status">
              <span class="status-dot ${instance.status}"></span>
              ${instance.status === 'online' ? '在线' : '离线'}
            </div>
          </div>
          <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
            <i class="ri-link"></i> ${instance.url}
          </div>
          <div class="instance-agents">
            ${(instance.agents || []).map(a => `
              <span class="agent-tag">${a.icon} ${a.name}</span>
            `).join('')}
          </div>
          <div style="margin-top: 12px; display: flex; gap: 8px;">
            <button class="btn btn-secondary" onclick="testInstance('${instance.id}')">
              <i class="ri-ping-line"></i> 测试连接
            </button>
            <button class="btn btn-danger" onclick="removeInstance('${instance.id}')">
              <i class="ri-delete-bin-line"></i> 移除
            </button>
          </div>
        </div>
      `).join('');
    }
    
    // 加载设置
    async function loadSettings() {
      const res = await fetch('/api/federation/status');
      const data = await res.json();
      const settings = data.data?.settings || {};
      
      const form = document.getElementById('settings-form');
      form.innerHTML = `
        <div class="config-row">
          <span class="config-label">允许远程访问</span>
          <div class="toggle-switch ${settings.allowRemoteAccess ? 'active' : ''}" onclick="updateSetting('allowRemoteAccess', ${!settings.allowRemoteAccess})"></div>
        </div>
        <div class="config-row">
          <span class="config-label">需要认证</span>
          <div class="toggle-switch ${settings.requireAuth ? 'active' : ''}" onclick="updateSetting('requireAuth', ${!settings.requireAuth})"></div>
        </div>
        <div class="config-row">
          <span class="config-label">消息超时 (ms)</span>
          <input type="number" value="${settings.messageTimeout || 30000}" style="width: 100px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; color: var(--text-primary);" onchange="updateSetting('messageTimeout', parseInt(this.value))">
        </div>
        <div class="config-row">
          <span class="config-label">最大并发会话</span>
          <input type="number" value="${settings.maxConcurrentSessions || 10}" style="width: 100px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; color: var(--text-primary);" onchange="updateSetting('maxConcurrentSessions', parseInt(this.value))">
        </div>
      `;
    }
    
    // 更新设置
    async function updateSetting(key, value) {
      await fetch('/api/federation/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [key]: value })
      });
      loadSettings();
    }
    
    // 添加实例
    function showAddInstance() {
      const id = prompt('实例 ID:');
      if (!id) return;
      
      const name = prompt('实例名称:');
      if (!name) return;
      
      const url = prompt('实例 URL (如 https://xxx.openclaw.ai):');
      if (!url) return;
      
      fetch('/api/federation/instances', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, name, url, agents: [] })
      }).then(() => loadInstances());
    }
    
    // 测试实例
    async function testInstance(instanceId) {
      alert(`测试实例: ${instanceId}\n\n功能开发中...`);
    }
    
    // 移除实例
    async function removeInstance(instanceId) {
      if (confirm('确定要移除这个实例吗？')) {
        await fetch(`/api/federation/instances/${instanceId}`, { method: 'DELETE' });
        loadInstances();
      }
    }
    
    // 初始化
    loadAgents();
    loadInstances();
    loadSettings();
    
    // 检查 URL hash
    if (window.location.hash === '#instances') {
      switchTab('instances');
    }
  </script>
<script>FieldTips.init({pageType:"general"});</script></body>
</html>
