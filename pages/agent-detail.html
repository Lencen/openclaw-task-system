    // 获取 URL 参数
    function getAgentId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }
    
    function getStatusClass(status) {
      const map = {
        'online': 'online', 'running': 'online',
        'offline': 'offline', 'stopped': 'offline',
        'busy': 'busy'
      };
      return map[status?.toLowerCase()] || 'offline';
    }
    
    function getStatusText(status) {
      const map = {
        'online': '运行中', 'running': '运行中',
        'offline': '已停止', 'stopped': '已停止',
        'busy': '忙碌'
      };
      return map[status?.toLowerCase()] || '未知';
    }
    
    function getPriorityClass(priority) {
      return (priority || 'p2').toLowerCase();
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleDateString('zh-CN');
    }
    
    function formatTokens(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toString();
    }
    
    function getAvatarColor(name) {
      const colors = [
        'linear-gradient(135deg, #3b82f6, #6366f1)',
        'linear-gradient(135deg, #10b981, #059669)',
        'linear-gradient(135deg, #f59e0b, #d97706)',
        'linear-gradient(135deg, #ef4444, #dc2626)',
        'linear-gradient(135deg, #8b5cf6, #7c3aed)',
        'linear-gradient(135deg, #ec4899, #db2777)'
      ];
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return colors[Math.abs(hash) % colors.length];
    }
    
    // 加载数据
    async function loadData() {
      const agentId = getAgentId();
      
      if (!agentId) {
        showError('未指定 Agent ID');
        return;
      }
      
      // 标准化 Agent ID（去掉 agent- 前缀）
      const normalizedId = agentId.startsWith('agent-') ? agentId.substring(6) : agentId;
      
      try {
        const [agentsRes, tasksRes] = await Promise.all([
          fetch('/api/agents/status'),
          fetch('/api/tasks')
        ]);
        
        const agentsData = await agentsRes.json();
        const tasksData = await tasksRes.json();
        
        // 找到当前 Agent（兼容两种 ID 格式）
        const agent = agentsData.agents?.find(a => 
          a.id === normalizedId || 
          a.id === agentId ||
          a.name === normalizedId ||
          a.name === agentId
        );
        
        if (!agent) {
          showError('未找到 Agent');
          return;
        }
        
        // 解析任务
        let tasks = [];
        if (tasksData.data && tasksData.data.tasks) {
          tasks = tasksData.data.tasks;
        } else if (tasksData.tasks) {
          tasks = tasksData.tasks;
        }
        
        // 筛选与该 Agent 相关的任务
        // 兼容多种字段名和格式
        const agentTasks = tasks.filter(t => {
          const taskAgent = t.agent || t.assignedAgent || t.assigned_agent;
          return taskAgent === normalizedId || 
                 taskAgent === agent.id ||
                 taskAgent === agent.name ||
                 (t.agents && t.agents.includes(normalizedId));
        });
        
        await renderPage(agent, agentTasks);
        
      } catch (error) {
        console.error('加载失败:', error);
        showError('加载失败: ' + error.message);
      }
    }
    
    // 渲染页面
    async function renderPage(agent, tasks) {
      const profile = AGENT_PROFILES[agent.id] || {
        name: agent.name || agent.id,
        icon: '🤖',
        role: agent.role || 'Agent',
        roleDescription: '这是一个自定义 Agent，用于执行特定任务。',
        responsibilities: ['执行分配的任务', '报告执行结果'],
        skills: [],
        level: agent.level || 2
      };
      
      // 加载该 Agent 的 SOUL.md
      let soulContent = '';
      let soulPath = '';
      try {
        const soulRes = await fetch(`/api/memory/file?path=SOUL.md&agent=${agent.id}`);
        const soulData = await soulRes.json();
        if (soulData.success && soulData.content) {
          soulPath = soulData.path;
          soulContent = soulData.content;
        }
      } catch (e) {
        console.error('加载 SOUL.md 失败:', e);
      }
      
      // 提取核心特质
      const extractSection = (content, sectionTitle) => {
        const lines = content.split('\n');
        const result = [];
        let inSection = false;
        
        for (const line of lines) {
          if (line.includes(sectionTitle)) {
            inSection = true;
            continue;
          }
          if (line.startsWith('## ') || line.startsWith('### ')) {
            if (inSection) break;
          }
          if (inSection && line.trim() && !line.startsWith('#')) {
            result.push(line);
          }
        }
        return result.slice(0, 4);
      };
      
      const coreTraits = soulContent ? extractSection(soulContent, '核心特质') : [];
      
      // 分类任务
      const currentTasks = tasks.filter(t => t.status === 'doing');
      const pendingTasks = tasks.filter(t => t.status === 'pending');
      const completedTasks = tasks.filter(t => t.status === 'completed');
      
      // 模拟相关项目
      const relatedProjects = [
        { id: 'task-system-v2', name: '任务系统v2.0', role: '核心开发', color: '#3b82f6' },
        { id: 'agent-enhancement', name: 'Agent能力扩展', role: '功能实现', color: '#10b981' }
      ];
      
      const html = `
        <!-- Agent 头部 -->
        <div class="agent-header">
          <div class="agent-avatar" style="background: ${getAvatarColor(agent.name || agent.id)}">
            ${profile.icon}
          </div>
          <div class="agent-info">
            <div class="agent-name-row">
              <h2 class="agent-name">${profile.name}</h2>
              <span class="status-badge ${getStatusClass(agent.status)}">${getStatusText(agent.status)}</span>
            </div>
            <div class="agent-role">${profile.role}</div>
            <div class="agent-meta">
              <div class="meta-item">
                <span>🔑</span>
                <span>ID: ${agent.id}</span>
              </div>
              <div class="meta-item">
                <span>📊</span>
                <span>Level: ${profile.level}</span>
              </div>
              <div class="meta-item">
                <span>🧠</span>
                <span>${agent.model?.primary?.split('/')?.pop() || '默认模型'}</span>
              </div>
              <div class="meta-item">
                <span>📅</span>
                <span>创建: 2026-03-01</span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 第一行：身份信息 + Token用量 -->
        <div class="content-grid" style="margin-top: 24px;">
          <!-- 身份信息与基本信息 -->
          <div class="section">
            <div class="section-header">
              <span class="section-title">🧠 身份信息</span>
              ${soulPath ? `<span style="font-size: 11px; color: var(--text-tertiary);">${soulPath}</span>` : ''}
            </div>
            <div class="section-body">
              <div style="margin-bottom: 16px;">
                <div style="font-weight: 600; margin-bottom: 8px; color: var(--primary);">核心特质</div>
                ${coreTraits.length > 0 
                  ? coreTraits.map(t => `<div style="color: var(--text-secondary); font-size: 13px; margin-bottom: 4px;">${t}</div>`).join('')
                  : '<div style="color: var(--text-tertiary);">暂无定义</div>'
                }
              </div>
              <div>
                <div style="font-weight: 600; margin-bottom: 8px; color: var(--primary);">📖 角色描述</div>
                <p style="color: var(--text-secondary); font-size: 13px; line-height: 1.6;">${profile.roleDescription}</p>
              </div>
              <div style="margin-top: 12px;">
                <a href="memory-dashboard.html" style="color: var(--primary); font-size: 12px;">查看完整 SOUL.md →</a>
              </div>
            </div>
          </div>
          
          <!-- Token用量统计 -->
          <div class="section">
            <div class="section-header">
              <span class="section-title">💎 Token 用量</span>
            </div>
            <div class="section-body">
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 12px; text-align: center;">
                  <div style="font-size: 18px; font-weight: 600; color: var(--primary);">${formatTokens(profile.todayTokens || Math.floor(Math.random() * 50000))}</div>
                  <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 4px;">今日消耗</div>
                </div>
                <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 12px; text-align: center;">
                  <div style="font-size: 18px; font-weight: 600; color: var(--success);">${formatTokens(profile.weekTokens || Math.floor(Math.random() * 200000))}</div>
                  <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 4px;">本周消耗</div>
                </div>
                <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 12px; text-align: center;">
                  <div style="font-size: 18px; font-weight: 600; color: var(--warning);">${formatTokens(profile.monthTokens || Math.floor(Math.random() * 800000))}</div>
                  <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 4px;">本月消耗</div>
                </div>
                <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 12px; text-align: center;">
                  <div style="font-size: 18px; font-weight: 600; color: var(--primary);">${formatTokens(profile.tokenUsage || Math.floor(Math.random() * 500000))}</div>
                  <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 4px;">总消耗</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 第二行：工作职责 + 技能 -->
        <div class="content-grid" style="margin-top: 20px;">
          <div class="section">
            <div class="section-header">
              <span class="section-title">💼 工作职责</span>
              <span class="section-count">${profile.responsibilities.length}</span>
            </div>
            <div class="section-body">
              <ul class="responsibility-list">
                ${profile.responsibilities.slice(0, 5).map((r, i) => `
                  <li class="responsibility-item">
                    <span class="responsibility-icon">${i + 1}</span>
                    <span class="responsibility-text">${r}</span>
                  </li>
                `).join('')}
              </ul>
            </div>
          </div>
          
          <div class="section">
            <div class="section-header">
              <span class="section-title">🎯 技能标签</span>
              <span class="section-count">${profile.skills.length}</span>
            </div>
            <div class="section-body">
              <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                ${profile.skills.map(s => `
                  <span style="background: rgba(59, 130, 246, 0.15); color: var(--primary); padding: 4px 12px; border-radius: 16px; font-size: 12px;">${s}</span>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
        
        <!-- 任务统计 -->
        <div class="section" style="margin-top: 20px;">
          <div class="section-header">
            <span class="section-title">📋 任务统计</span>
          </div>
          <div class="section-body">
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
              <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 16px; text-align: center;">
                <div style="font-size: 24px; font-weight: 600;">${tasks.length}</div>
                <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">总任务数</div>
              </div>
              <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 16px; text-align: center;">
                <div style="font-size: 24px; font-weight: 600; color: var(--warning);">${currentTasks.length}</div>
                <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">执行中</div>
              </div>
              <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 16px; text-align: center;">
                <div style="font-size: 24px; font-weight: 600; color: var(--primary);">${pendingTasks.length}</div>
                <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">待处理</div>
              </div>
              <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 16px; text-align: center;">
                <div style="font-size: 24px; font-weight: 600; color: var(--success);">${completedTasks.length}</div>
                <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">已完成</div>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 任务列表 -->
        <div class="content-grid" style="margin-top: 20px;">
          <!-- 当前任务 -->
          <div class="section">
            <div class="section-header">
              <span class="section-title">⏳ 当前任务</span>
              <span class="section-count">${currentTasks.length}</span>
            </div>
            <div class="section-body">
              ${currentTasks.length > 0 ? `
                <div class="task-list">
                  ${currentTasks.map(task => `
                    <div class="task-item" onclick="window.location.href='task-detail.html?id=${task.id}'">
                      <div class="task-status doing">⏳</div>
                      <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">${task.quadrant || 'Q1'} · 开始: ${formatDate(task.started_at)}</div>
                      </div>
                      <span class="task-priority ${getPriorityClass(task.priority)}">${task.priority || 'P2'}</span>
                    </div>
                  `).join('')}
                </div>
              ` : `
                <div class="empty-state">
                  <div class="empty-icon">📭</div>
                  <div>暂无执行中的任务</div>
                </div>
              `}
            </div>
          </div>
          
          <!-- 待处理任务 -->
          <div class="section">
            <div class="section-header">
              <span class="section-title">📝 待处理任务</span>
              <span class="section-count">${pendingTasks.length}</span>
            </div>
            <div class="section-body">
              ${pendingTasks.length > 0 ? `
                <div class="task-list">
                  ${pendingTasks.slice(0, 5).map(task => `
                    <div class="task-item" onclick="window.location.href='task-detail.html?id=${task.id}'">
                      <div class="task-status pending">📋</div>
                      <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">${task.quadrant || 'Q2'} · 截止: ${formatDate(task.deadline)}</div>
                      </div>
                      <span class="task-priority ${getPriorityClass(task.priority)}">${task.priority || 'P2'}</span>
                    </div>
                  `).join('')}
                  ${pendingTasks.length > 5 ? `<p style="text-align: center; color: var(--text-tertiary); margin-top: 8px;">还有 ${pendingTasks.length - 5} 个任务...</p>` : ''}
                </div>
              ` : `
                <div class="empty-state">
                  <div class="empty-icon">✅</div>
                  <div>没有待处理任务</div>
                </div>
              `}
            </div>
          </div>
        </div>
        
        <!-- 相关项目与模型配置 -->
        <div class="content-grid" style="margin-top: 20px;">
          <!-- 相关项目 -->
          <div class="section">
            <div class="section-header">
              <span class="section-title">📦 相关项目</span>
              <span class="section-count">${relatedProjects.length}</span>
            </div>
            <div class="section-body">
              <div class="project-list">
                ${relatedProjects.map(p => `
                  <div class="project-item" onclick="window.location.href='project-detail.html?id=${p.id}'">
                    <div class="project-icon" style="background: ${p.color}">📦</div>
                    <div class="project-info">
                      <div class="project-name">${p.name}</div>
                      <div class="project-role">${p.role}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
          
          <!-- 模型配置 -->
          <div class="section">
            <div class="section-header">
              <span class="section-title">🧠 模型配置</span>
            </div>
            <div class="section-body">
              <div style="display: flex; flex-direction: column; gap: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="color: var(--text-secondary); font-size: 13px;">主模型</span>
                  <span style="font-size: 13px;">${agent.model?.primary?.split('/')?.pop() || '默认'}</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="color: var(--text-secondary); font-size: 13px;">备用模型</span>
                  <span style="font-size: 13px;">${agent.model?.fallback?.split('/')?.pop() || '无'}</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="color: var(--text-secondary); font-size: 13px;">Max Tokens</span>
                  <span style="font-size: 13px;">${agent.model?.maxTokens || '4096'}</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="color: var(--text-secondary); font-size: 13px;">Temperature</span>
                  <span style="font-size: 13px;">${agent.model?.temperature || '0.7'}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('content').innerHTML = html;
      document.getElementById('pageTitle').textContent = profile.name;
    }
    
    function showError(message) {
      document.getElementById('content').innerHTML = `
        <div class="empty-state" style="padding: 60px;">
          <div class="empty-icon">❌</div>
          <div>${message}</div>
          <button onclick="loadData()" style="margin-top: 16px; padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer;">重试</button>
        </div>
      `;
    }
    
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
  
  <!-- 统一侧边栏组件 -->
  <script src="js/sidebar.js"></script>
  <script>
    Sidebar.init({ activePage: 'agents' });
  </script>
