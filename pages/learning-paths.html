<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习路径 - 任务管理系统</title>
    <link rel="stylesheet" href="/pages/css/common.css">
    <style>
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 28px; color: #1a1a1a; margin-bottom: 10px; }
        .header p { color: #666; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card h3 { font-size: 14px; color: #666; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #1a1a1a; }
        .paths-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .path-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .path-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .path-card h3 { font-size: 18px; margin-bottom: 8px; color: #1a1a1a; }
        .path-card .category { display: inline-block; padding: 4px 12px; background: #e8f4fd; color: #0366d6; border-radius: 16px; font-size: 12px; margin-bottom: 12px; }
        .path-card .description { color: #666; font-size: 14px; margin-bottom: 16px; line-height: 1.6; }
        .progress-bar { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d26a, #00a854); border-radius: 4px; transition: width 0.3s; }
        .path-meta { display: flex; justify-content: space-between; font-size: 13px; color: #666; }
        .loading { text-align: center; padding: 60px; color: #666; }
        .error { background: #ffeef0; border: 1px solid #fdcccc; color: #d93025; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 学习路径</h1>
            <p>系统化的学习计划和进度跟踪</p>
        </div>
        
        <div id="stats" class="stats-grid"></div>
        <div id="error" class="error" style="display:none;"></div>
        <div id="loading" class="loading">加载中...</div>
        <div id="paths" class="paths-grid"></div>
    </div>

    <script>
        async function loadLearningPaths() {
            try {
                const res = await fetch('/api/learning-paths/list');
                const result = await res.json();
                if (!result.success) throw new Error(result.error);
                
                const { data: paths, stats } = result;
                renderStats(stats);
                renderPaths(paths);
            } catch (error) {
                document.getElementById('error').textContent = '加载失败：' + error.message;
                document.getElementById('error').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderStats(stats) {
            const container = document.getElementById('stats');
            container.innerHTML = `
                <div class="stat-card">
                    <h3>总路径数</h3>
                    <div class="value">${stats?.total || 0}</div>
                </div>
                <div class="stat-card">
                    <h3>进行中</h3>
                    <div class="value">${stats?.inProgress || 0}</div>
                </div>
                <div class="stat-card">
                    <h3>已完成</h3>
                    <div class="value">${stats?.completed || 0}</div>
                </div>
                <div class="stat-card">
                    <h3>总学时</h3>
                    <div class="value">${stats?.totalHours || 0}h</div>
                </div>
            `;
        }

        function renderPaths(paths) {
            const container = document.getElementById('paths');
            container.innerHTML = paths.map(path => `
                <div class="path-card">
                    <span class="category">${path.category}</span>
                    <h3>${path.name}</h3>
                    <p class="description">${path.description || ''}</p>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${path.progress}%"></div>
                    </div>
                    <div class="path-meta">
                        <span>进度：${path.progress}%</span>
                        <span>预计：${path.estimatedHours || 0}h</span>
                        <span>已用：${path.spentHours || 0}h</span>
                    </div>
                </div>
            `).join('');
        }

        loadLearningPaths();
    </script>
</body>
</html>
