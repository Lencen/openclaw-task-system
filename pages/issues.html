<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问题管理 - 任务管理系统</title>
    <!-- 统一框架样式 -->
    <link rel="stylesheet" href="css/frame.css">
    <!-- 侧边栏组件 -->
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        /* 页面特定样式，不覆盖框架样式 */
        .status-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .status-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .status-card.open { border-top: 4px solid var(--danger); }
        .status-card.in_progress { border-top: 4px solid var(--warning); }
        .status-card.resolved { border-top: 4px solid var(--success); }
        .status-card.closed { border-top: 4px solid var(--text-secondary); }
        .status-card.total { border-top: 4px solid var(--primary); }
        
        .status-card .number {
            font-size: 36px;
            font-weight: bold;
            color: var(--text-primary);
        }
        .status-card.open .number { color: var(--danger); }
        .status-card.in_progress .number { color: var(--warning); }
        .status-card.resolved .number { color: var(--success); }
        .status-card.closed .number { color: var(--text-secondary); }
        .status-card.total .number { color: var(--primary); }
        
        .status-card .label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        /* Tab 切换 */
        .tab-container {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .tab-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg-tertiary);
        }
        .tab-btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn:hover { color: var(--text-primary); background: var(--bg-secondary); }
        .tab-btn.active { 
            color: var(--primary); 
            background: var(--bg-secondary);
            border-bottom-color: var(--primary);
        }
        .tab-btn .count {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            background: var(--bg-tertiary);
        }
        .tab-btn.active .count { background: var(--primary); color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 筛选栏 */
        .filter-bar {
            background: var(--bg-tertiary);
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar label { color: var(--text-secondary); font-size: 13px; }
        .filter-bar select, .filter-bar input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
        }
        .filter-bar input { flex: 1; min-width: 200px; }
        .filter-bar button {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .filter-bar button:hover { opacity: 0.9; }
        .filter-bar button.secondary { background: var(--text-secondary); }
        
        /* 问题列表 */
        .issues-list {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .issues-list-header {
            background: var(--bg-tertiary);
            padding: 15px 20px;
            font-weight: bold;
            display: grid;
            grid-template-columns: 80px 1fr 100px 100px 150px 100px;
            gap: 10px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .issue-row {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 80px 1fr 100px 100px 150px 100px;
            gap: 10px;
            align-items: center;
            color: var(--text-primary);
        }
        .issue-row:hover { background: var(--bg-tertiary); }
        .issue-row:last-child { border-bottom: none; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.open { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .status-badge.in_progress { background: rgba(245,158,11,0.2); color: #fcd34d; }
        .status-badge.resolved { background: rgba(16,185,129,0.2); color: #6ee7b7; }
        .status-badge.closed { background: rgba(107,114,128,0.2); color: #9ca3af; }
        
        .severity-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .severity-badge.critical { background: rgba(239,68,68,0.3); color: #fca5a5; }
        .severity-badge.high { background: rgba(249,115,22,0.3); color: #fdba74; }
        .severity-badge.medium { background: rgba(234,179,8,0.3); color: #fde047; }
        .severity-badge.low { background: rgba(59,130,246,0.3); color: #93c5fd; }
        
        .category-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }
        
        .issue-title {
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
        }
        .issue-title:hover { color: var(--primary); }
        .issue-title small {
            display: block;
            font-weight: normal;
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 2px;
        }
        
        .time-info {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .action-btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
        }
        .action-btn:hover { opacity: 0.9; }
        .action-btn.primary { background: var(--primary); color: white; border-color: var(--primary); }
        .action-btn.danger { background: var(--danger); color: white; border-color: var(--danger); }
        
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .modal-header h2 { margin: 0; font-size: 20px; color: var(--text-primary); }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .modal-body { padding: 20px; }
        
        .detail-section { margin-bottom: 20px; }
        .detail-section h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0 0 8px 0;
            text-transform: uppercase;
        }
        .detail-section .content {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            white-space: pre-wrap;
            color: var(--text-primary);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
    </style>
  <link rel="stylesheet" href="css/page-tips.css">
<script src="js/field-tips.js"></script></head>
<body>
    <div class="layout">
        <div id="sidebar-container"></div>
        <main class="main">
            <header class="header">
                <h1>🔴 问题管理</h1>
                <div id="tipsContainer"></div>
            </header>
            <div class="content">
                <!-- 状态卡片 -->
                <div class="status-cards">
                    <div class="status-card total">
                        <div class="number" id="total-count">0</div>
                        <div class="label">总计</div>
                    </div>
                    <div class="status-card open">
                        <div class="number" id="open-count">0</div>
                        <div class="label">待处理</div>
                    </div>
                    <div class="status-card in_progress">
                        <div class="number" id="progress-count">0</div>
                        <div class="label">处理中</div>
                    </div>
                    <div class="status-card resolved">
                        <div class="number" id="resolved-count">0</div>
                        <div class="label">已处理</div>
                    </div>
                    <div class="status-card closed">
                        <div class="number" id="closed-count">0</div>
                        <div class="label">已关闭</div>
                    </div>
                </div>
                
                <!-- Tab 切换 -->
                <div class="tab-container">
                    <div class="tab-header">
                        <button class="tab-btn active" data-tab="in_progress">
                            🔄 处理中 <span class="count" id="tab-progress-count">0</span>
                        </button>
                        <button class="tab-btn" data-tab="resolved">
                            ✅ 已处理 <span class="count" id="tab-resolved-count">0</span>
                        </button>
                        <button class="tab-btn" data-tab="closed">
                            📁 已关闭 <span class="count" id="tab-closed-count">0</span>
                        </button>
                        <button class="tab-btn" data-tab="open">
                            🔴 待处理 <span class="count" id="tab-open-count">0</span>
                        </button>
                    </div>
                    
                    <!-- 筛选栏 -->
                    <div class="filter-bar">
                        <input type="text" id="search-input" placeholder="搜索问题标题或描述...">
                        
                        <label>严重程度:</label>
                        <select id="filter-severity">
                            <option value="">全部</option>
                            <option value="critical">严重</option>
                            <option value="high">高</option>
                            <option value="medium">中</option>
                            <option value="low">低</option>
                        </select>
                        
                        <label>类型:</label>
                        <select id="filter-category">
                            <option value="">全部</option>
                            <option value="bug">缺陷</option>
                            <option value="config">配置</option>
                            <option value="performance">性能</option>
                            <option value="process">流程</option>
                            <option value="integration">集成</option>
                            <option value="security">安全</option>
                            <option value="ui">界面</option>
                            <option value="data">数据</option>
                            <option value="automation">自动化</option>
                        </select>
                        
                        <button onclick="applyFilters()">筛选</button>
                        <button class="secondary" onclick="resetFilters()">重置</button>
                        <button class="action-btn primary" onclick="showCreateModal()">+ 新建</button>
                    </div>
                    
                    <!-- Tab 内容 -->
                    <div id="tab-in_progress" class="tab-content active">
                        <div class="issues-list">
                            <div class="issues-list-header">
                                <div>ID</div>
                                <div>问题标题</div>
                                <div>严重程度</div>
                                <div>类型</div>
                                <div>更新时间</div>
                                <div>操作</div>
                            </div>
                            <div id="issues-in_progress"></div>
                        </div>
                    </div>
                    
                    <div id="tab-resolved" class="tab-content">
                        <div class="issues-list">
                            <div class="issues-list-header">
                                <div>ID</div>
                                <div>问题标题</div>
                                <div>严重程度</div>
                                <div>类型</div>
                                <div>解决时间</div>
                                <div>操作</div>
                            </div>
                            <div id="issues-resolved"></div>
                        </div>
                    </div>
                    
                    <div id="tab-closed" class="tab-content">
                        <div class="issues-list">
                            <div class="issues-list-header">
                                <div>ID</div>
                                <div>问题标题</div>
                                <div>严重程度</div>
                                <div>类型</div>
                                <div>关闭时间</div>
                                <div>操作</div>
                            </div>
                            <div id="issues-closed"></div>
                        </div>
                    </div>
                    
                    <div id="tab-open" class="tab-content">
                        <div class="issues-list">
                            <div class="issues-list-header">
                                <div>ID</div>
                                <div>问题标题</div>
                                <div>严重程度</div>
                                <div>类型</div>
                                <div>创建时间</div>
                                <div>操作</div>
                            </div>
                            <div id="issues-open"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 修复队列信息 -->
                <div style="background: var(--bg-secondary); border-radius: 12px; padding: 15px 20px; border: 1px solid var(--border); margin-top: 20px;">
                    <h3 style="margin: 0 0 10px 0; font-size: 15px; color: var(--text-primary);">📊 修复队列状态</h3>
                    <div id="fix-queue-status" style="display: flex; gap: 20px; color: var(--text-secondary); font-size: 13px;"></div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 问题详情弹窗 -->
    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">问题详情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>
    
    <!-- 侧边栏组件 -->
    <script src="js/sidebar.js"></script>
    <script>
        // 初始化侧边栏
        Sidebar.init({ activePage: 'issues' });
        
        let allIssues = [];
        let currentTab = 'in_progress';
        let searchKeyword = '';
        let filterSeverity = '';
        let filterCategory = '';
        
        // Tab 切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                currentTab = tab;
                document.getElementById('tab-' + tab).classList.add('active');
            });
        });
        
        // 搜索输入框回车触发筛选
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') applyFilters();
        });
        
        async function loadIssues() {
            try {
                const res = await fetch('/api/issues-v2');
                const data = await res.json();
                if (data.success) {
                    // 按创建时间倒序排序
                    allIssues = (data.data.issues || []).sort((a, b) => {
                        const tA = new Date(a.created_at || a.createdAt || 0).getTime();
                        const tB = new Date(b.created_at || b.created_at || 0).getTime();
                        return tB - tA;
                    });
                    renderAll();
                }
            } catch (e) {
                console.error('加载问题失败:', e);
            }
        }
        
        async function loadFixQueueStatus() {
            try {
                const res = await fetch('/api/issues/fix-queue/status');
                const data = await res.json();
                if (data.success && data.queue) {
                    const q = data.queue;
                    document.getElementById('fix-queue-status').innerHTML = `
                        <span>总计: <strong>${q.total}</strong></span>
                        <span>等待中: <strong style="color: var(--warning);">${q.pending}</strong></span>
                        <span>执行中: <strong style="color: var(--primary);">${q.running}</strong></span>
                        <span>已完成: <strong style="color: var(--success);">${q.completed}</strong></span>
                        <span>失败: <strong style="color: var(--danger);">${q.failed}</strong></span>
                    `;
                }
            } catch (e) {
                console.error('加载修复队列状态失败:', e);
            }
        }
        
        function renderAll() {
            // 应用筛选
            let filtered = allIssues.filter(issue => {
                if (searchKeyword) {
                    const kw = searchKeyword.toLowerCase();
                    const matchTitle = (issue.title || '').toLowerCase().includes(kw);
                    const matchDesc = (issue.description || '').toLowerCase().includes(kw);
                    if (!matchTitle && !matchDesc) return false;
                }
                if (filterSeverity && issue.severity !== filterSeverity) return false;
                if (filterCategory && issue.category !== filterCategory) return false;
                return true;
            });
            
            // 按状态分组
            const byStatus = {
                open: filtered.filter(i => i.status === 'open'),
                in_progress: filtered.filter(i => i.status === 'in_progress'),
                resolved: filtered.filter(i => i.status === 'resolved'),
                closed: filtered.filter(i => i.status === 'closed')
            };
            
            // 更新状态卡片
            document.getElementById('total-count').textContent = allIssues.length;
            document.getElementById('open-count').textContent = byStatus.open.length;
            document.getElementById('progress-count').textContent = byStatus.in_progress.length;
            document.getElementById('resolved-count').textContent = byStatus.resolved.length;
            document.getElementById('closed-count').textContent = byStatus.closed.length;
            
            // 更新 Tab 计数
            document.getElementById('tab-open-count').textContent = byStatus.open.length;
            document.getElementById('tab-progress-count').textContent = byStatus.in_progress.length;
            document.getElementById('tab-resolved-count').textContent = byStatus.resolved.length;
            document.getElementById('tab-closed-count').textContent = byStatus.closed.length;
            
            // 渲染各 Tab 列表
            renderIssueList('issues-open', byStatus.open);
            renderIssueList('issues-in_progress', byStatus.in_progress);
            renderIssueList('issues-resolved', byStatus.resolved);
            renderIssueList('issues-closed', byStatus.closed);
        }
        
        function renderIssueList(containerId, issues) {
            const container = document.getElementById(containerId);
            
            if (issues.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <div>暂无问题</div>
                    </div>
                `;
                return;
            }
            
            const categoryLabels = { 
                bug: '缺陷', config: '配置', performance: '性能', process: '流程', 
                integration: '集成', security: '安全', ui: '界面', data: '数据',
                automation: '自动化'
            };
            
            container.innerHTML = issues.map(issue => `
                <div class="issue-row">
                    <div style="font-size: 12px; color: var(--text-secondary);">${issue.id.slice(0, 10)}</div>
                    <div>
                        <div class="issue-title" onclick="showDetail('${issue.id}')">${issue.title}</div>
                        <small>${(issue.description || '').slice(0, 60)}${issue.description && issue.description.length > 60 ? '...' : ''}</small>
                    </div>
                    <div><span class="severity-badge ${issue.severity}">${getSeverityLabel(issue.severity)}</span></div>
                    <div><span class="category-badge">${categoryLabels[issue.category] || issue.category || '-'}</span></div>
                    <div class="time-info">${formatTime(issue.updated_at || issue.created_at || issue.createdAt)}</div>
                    <div>
                        <button class="action-btn" onclick="showDetail('${issue.id}')">详情</button>
                    </div>
                </div>
            `).join('');
        }
        
        function formatTime(timeStr) {
            if (!timeStr) return '-';
            const d = new Date(timeStr);
            const now = new Date();
            const diff = now - d;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            
            return d.toLocaleDateString();
        }
        
        function getSeverityLabel(severity) {
            const labels = { critical: '严重', high: '高', medium: '中', low: '低' };
            return labels[severity] || severity || '-';
        }
        
        function getCategoryLabel(category) {
            const labels = { 
                bug: '缺陷', config: '配置', performance: '性能', process: '流程', 
                integration: '集成', security: '安全', ui: '界面', data: '数据',
                automation: '自动化'
            };
            return labels[category] || category || '-';
        }
        
        function applyFilters() {
            searchKeyword = document.getElementById('search-input').value;
            filterSeverity = document.getElementById('filter-severity').value;
            filterCategory = document.getElementById('filter-category').value;
            renderAll();
        }
        
        function resetFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('filter-severity').value = '';
            document.getElementById('filter-category').value = '';
            searchKeyword = '';
            filterSeverity = '';
            filterCategory = '';
            renderAll();
        }
        
        function showDetail(id) {
            const issue = allIssues.find(i => i.id === id);
            if (!issue) return;
            
            document.getElementById('modal-title').textContent = issue.title;
            document.getElementById('modal-body').innerHTML = `
                <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
                    <span class="severity-badge ${issue.severity}">${getSeverityLabel(issue.severity)}</span>
                    <span class="category-badge">${getCategoryLabel(issue.category)}</span>
                    <span class="status-badge ${issue.status}">${getStatusLabel(issue.status)}</span>
                </div>
                <div class="detail-section"><h3>问题描述</h3><div class="content">${issue.description || '无'}</div></div>
                <div class="detail-section"><h3>根因分析</h3><div class="content">${issue.root_cause || '无'}</div></div>
                <div class="detail-section"><h3>解决方案</h3><div class="content">${issue.solution || '无'}</div></div>
                ${issue.closeReason ? `<div class="detail-section" style="background:var(--bg-tertiary);padding:15px;border-radius:8px;"><h3>关闭原因</h3><div class="content"><strong>${issue.closeReason}</strong>${issue.closeComment ? '<br><small>' + issue.closeComment + '</small>' : ''}</div></div>` : ''}
                <div style="display:flex;gap:20px;margin-top:20px;color:var(--text-secondary);font-size:13px;flex-wrap:wrap;">
                    <div>创建: ${issue.created_at ? new Date(issue.created_at).toLocaleString() : '-'}</div>
                    <div>更新: ${issue.updated_at ? new Date(issue.updated_at).toLocaleString() : '-'}</div>
                    ${issue.resolved_at ? `<div>解决: ${new Date(issue.resolved_at).toLocaleString()}</div>` : ''}
                    ${issue.closed_at ? `<div>关闭: ${new Date(issue.closed_at).toLocaleString()}</div>` : ''}
                </div>
                <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;">
                    ${issue.status === 'open' ? `<button class="action-btn primary" onclick="updateStatus('${issue.id}', 'in_progress')">开始处理</button>` : ''}
                    ${issue.status === 'in_progress' ? `<button class="action-btn primary" onclick="updateStatus('${issue.id}', 'resolved')">标记已解决</button>` : ''}
                    ${issue.status !== 'closed' ? `<button class="action-btn" style="background:var(--warning);color:#000;" onclick="showCloseDialog('${issue.id}')">关闭问题</button>` : ''}
                    ${issue.status === 'closed' ? `<button class="action-btn" onclick="updateStatus('${issue.id}', 'open')">重新打开</button>` : ''}
                </div>
            `;
            document.getElementById('detail-modal').classList.add('active');
        }
        
        async function showCloseDialog(id) {
            // 先获取原因列表
            let reasons = [];
            try {
                const res = await fetch('/api/issues-v2/meta/close-reasons');
                const data = await res.json();
                if (data.success) reasons = data.reasons;
            } catch (e) {
                console.error('获取原因列表失败:', e);
                reasons = [
                    { id: 'not_needed', label: '不再需要' },
                    { id: 'legacy', label: '历史遗留' },
                    { id: 'cannot_reproduce', label: '无法复现' },
                    { id: 'duplicate', label: '重复问题' },
                    { id: 'low_priority', label: '优先级低' },
                    { id: 'transferred', label: '已转移' }
                ];
            }
            
            const reasonOptions = reasons.map(r => `<option value="${r.id}">${r.label} - ${r.desc || ''}</option>`).join('');
            
            document.getElementById('modal-title').textContent = '关闭问题';
            document.getElementById('modal-body').innerHTML = `
                <form onsubmit="closeIssue(event, '${id}')">
                    <div class="detail-section">
                        <h3>关闭原因 *</h3>
                        <select id="close-reason" style="width:100%;padding:8px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:6px;" required>
                            <option value="">请选择原因</option>
                            ${reasonOptions}
                        </select>
                    </div>
                    <div class="detail-section">
                        <h3>备注（可选）</h3>
                        <textarea id="close-comment" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;min-height:60px;background:var(--bg-tertiary);color:var(--text-primary);" placeholder="补充说明为什么关闭此问题"></textarea>
                    </div>
                    <div style="margin-top:20px;display:flex;gap:10px;">
                        <button type="submit" class="action-btn primary">确认关闭</button>
                        <button type="button" class="action-btn" onclick="showDetail('${id}')">取消</button>
                    </div>
                </form>
            `;
        }
        
        async function closeIssue(e, id) {
            e.preventDefault();
            const reason = document.getElementById('close-reason').value;
            const comment = document.getElementById('close-comment').value;
            
            if (!reason) {
                alert('请选择关闭原因');
                return;
            }
            
            try {
                const res = await fetch(`/api/issues-v2/${id}/close`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason, comment })
                });
                const data = await res.json();
                if (data.success) {
                    closeModal();
                    loadIssues();
                } else {
                    alert('关闭失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                console.error('关闭问题失败:', e);
                alert('关闭失败');
            }
        }
        
        function getStatusLabel(status) {
            const labels = { open: '待处理', in_progress: '处理中', resolved: '已处理', closed: '已关闭' };
            return labels[status] || status;
        }
        
        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }
        
        async function updateStatus(id, status) {
            try {
                const res = await fetch(`/api/issues-v2/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                const data = await res.json();
                if (data.success) {
                    closeModal();
                    loadIssues();
                } else {
                    alert('更新失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                console.error('更新状态失败:', e);
                alert('更新失败');
            }
        }
        
        function showCreateModal() {
            document.getElementById('modal-title').textContent = '新建问题';
            document.getElementById('modal-body').innerHTML = `
                <form onsubmit="createIssue(event)">
                    <div class="detail-section">
                        <h3>问题标题 *</h3>
                        <input type="text" id="new-title" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--bg-tertiary);color:var(--text-primary);" required>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                        <div class="detail-section">
                            <h3>严重程度</h3>
                            <select id="new-severity" style="width:100%;padding:8px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);">
                                <option value="medium">中</option>
                                <option value="low">低</option>
                                <option value="high">高</option>
                                <option value="critical">严重</option>
                            </select>
                        </div>
                        <div class="detail-section">
                            <h3>问题类型</h3>
                            <select id="new-category" style="width:100%;padding:8px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);">
                                <option value="bug">缺陷</option>
                                <option value="process">流程</option>
                                <option value="config">配置</option>
                                <option value="performance">性能</option>
                                <option value="integration">集成</option>
                                <option value="ui">界面</option>
                            </select>
                        </div>
                    </div>
                    <div class="detail-section">
                        <h3>问题描述</h3>
                        <textarea id="new-description" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;min-height:80px;background:var(--bg-tertiary);color:var(--text-primary);"></textarea>
                    </div>
                    <div style="margin-top:20px;">
                        <button type="submit" class="action-btn primary">创建问题</button>
                    </div>
                </form>
            `;
            document.getElementById('detail-modal').classList.add('active');
        }
        
        async function createIssue(e) {
            e.preventDefault();
            const issue = {
                title: document.getElementById('new-title').value,
                severity: document.getElementById('new-severity').value,
                category: document.getElementById('new-category').value,
                description: document.getElementById('new-description').value
            };
            try {
                const res = await fetch('/api/issues-v2', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(issue)
                });
                const data = await res.json();
                if (data.success) {
                    closeModal();
                    loadIssues();
                } else {
                    alert('创建失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                console.error('创建问题失败:', e);
                alert('创建失败');
            }
        }
        
        // 初始化
        loadIssues();
        loadFixQueueStatus();
    </script>
  <script src="js/page-tips.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tipsContainer = document.getElementById('tipsContainer');
      if (tipsContainer && PageTips) {
        PageTips.init('issues', tipsContainer);
      }
    });
  </script>
<script>FieldTips.init({pageType:"issue"});</script></body>
</html>
