<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知中心 v2.0 - Agent 即时通信</title>
  <link href="assets/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --border: #334155;
      --primary: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --purple: #8b5cf6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); font-size: 14px; line-height: 1.5; }
    .layout { display: flex; min-height: 100vh; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .content { flex: 1; padding: 20px; overflow-y: auto; }
    .header { height: 64px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .page-title { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 8px; }
    .unread-badge { background: var(--danger); color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .stat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 12px; }
    .stat-icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(59, 130, 246, 0.15); color: var(--primary); }
    .stat-info h3 { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-info span { font-size: 12px; color: var(--text-secondary); }
    .notification-list { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .notification-item { display: flex; align-items: flex-start; gap: 12px; padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
    .notification-item:last-child { border-bottom: none; }
    .notification-item:hover { background: var(--bg-tertiary); }
    .notification-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .notification-content { flex: 1; min-width: 0; }
    .notification-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .notification-text { font-size: 13px; color: var(--text-secondary); }
    .notification-time { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
    .empty-state i { font-size: 48px; margin-bottom: 16px; }
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
  </style>
  <script src="js/auth-guard.js"></script>
<script src="js/field-tips.js"></script></head>
<body>
  <div class="layout">
    <main class="main">
      <header class="header">
        <div class="header-left">
          <h1 class="page-title"><i class="ri-notification-3-line"></i>通知中心 v2.0</h1>
          <span class="unread-badge" id="unreadCount">0</span>
        </div>
      </header>
      <div class="content">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon"><i class="ri-mail-line"></i></div><div class="stat-info"><h3 id="totalCount">0</h3><span>总通知</span></div></div>
          <div class="stat-card"><div class="stat-icon"><i class="ri-mail-unread-line"></i></div><div class="stat-info"><h3 id="unreadStat">0</h3><span>未读</span></div></div>
          <div class="stat-card"><div class="stat-icon"><i class="ri-mail-open-line"></i></div><div class="stat-info"><h3 id="readStat">0</h3><span>已读</span></div></div>
          <div class="stat-card"><div class="stat-icon"><i class="ri-broadcast-line"></i></div><div class="stat-info"><h3 id="broadcastCount">0</h3><span>广播</span></div></div>
        </div>
        <div class="notification-list" id="notificationList"><div class="loading"><i class="ri-loader-4-line"></i>加载中...</div></div>
      </div>
    </main>
  </div>
  <script>
    const API_BASE = '';
    async function loadNotifications() {
      try {
        const res = await fetch(`${API_BASE}/api/notifications?limit=50`);
        const data = await res.json();
        if (data.success) { renderNotifications(data.notifications); updateStats(data.pagination); }
      } catch (e) {
        document.getElementById('notificationList').innerHTML = '<div class="empty-state"><i class="ri-error-warning-line"></i><h3>加载失败</h3></div>';
      }
    }
    function renderNotifications(notifications) {
      const container = document.getElementById('notificationList');
      if (!notifications || notifications.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="ri-inbox-line"></i><h3>暂无通知</h3></div>';
        return;
      }
      const iconMap = { 'TASK_ASSIGNED': 'ri-task-line', 'TASK_COMPLETED': 'ri-check-double-line', 'BROADCAST': 'ri-broadcast-line', 'COMMUNICATION': 'ri-chat-3-line', 'ISSUE_FOUND': 'ri-error-warning-line' };
      container.innerHTML = notifications.map(n => `<div class="notification-item ${n.read ? '' : 'unread'}"><div class="notification-icon"><i class="${iconMap[n.type] || 'ri-notification-3-line'}"></i></div><div class="notification-content"><div class="notification-title">${n.title}</div><div class="notification-text">${n.content?.text || ''}</div><div class="notification-time">${new Date(n.timestamp).toLocaleString('zh-CN')}</div></div></div>`).join('');
    }
    function updateStats(pagination) {
      document.getElementById('totalCount').textContent = pagination?.total || 0;
      document.getElementById('unreadCount').textContent = pagination?.unreadCount || 0;
      document.getElementById('unreadStat').textContent = pagination?.unreadCount || 0;
      document.getElementById('readStat').textContent = (pagination?.total || 0) - (pagination?.unreadCount || 0);
    }
    loadNotifications();
    setInterval(loadNotifications, 10000);
  </script>
<script>FieldTips.init({pageType:"general"});</script></body>
</html>
