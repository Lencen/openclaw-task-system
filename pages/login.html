<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Morning 任务管理系统</title>
  
  <!-- 图标库 -->
  <link href="assets/fonts/remixicon.css" rel="stylesheet">
  
  <!-- 统一框架样式 -->
  <link rel="stylesheet" href="css/frame.css">
  
  <!-- 登录页专用样式 -->
  <style>
    /* 登录页特殊布局 - 全屏居中 */
    body.login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
    }
    
    body.login-page .layout,
    body.login-page .sidebar-container {
      display: none;
    }
    
    /* 登录容器 */
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    
    /* 登录卡片 */
    .login-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border);
    }
    
    /* Logo 区域 */
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-logo-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    
    .login-logo-text {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .login-logo-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
    }
    
    /* 表单样式 */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    
    .form-input::placeholder {
      color: var(--text-tertiary);
    }
    
    .form-input-icon {
      position: relative;
    }
    
    .form-input-icon .form-input {
      padding-left: 44px;
    }
    
    .form-input-icon i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 18px;
    }
    
    /* 记住登录 */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .checkbox-wrapper input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    
    .checkbox-label {
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    
    /* 登录按钮 */
    .btn-login {
      width: 100%;
      padding: 14px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-login:hover {
      background: #2563eb;
    }
    
    .btn-login:active {
      transform: scale(0.98);
    }
    
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* 分割线 */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-tertiary);
      font-size: 13px;
    }
    
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    
    /* 飞书登录按钮 */
    .btn-feishu {
      width: 100%;
      padding: 14px 24px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-feishu:hover {
      background: var(--bg-tertiary);
      border-color: var(--text-tertiary);
    }
    
    /* 错误提示 */
    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    
    .login-error.show {
      display: block;
    }
    
    /* 加载动画 */
    .btn-login .spin-icon {
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* 页脚 */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-tertiary);
    }
    
    .login-footer a {
      color: var(--primary);
      text-decoration: none;
    }
    
    .login-footer a:hover {
      text-decoration: underline;
    }
  </style>
<script src="js/field-tips.js"></script></head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <!-- Logo 区域 -->
      <div class="login-logo">
        <div class="login-logo-icon">📋</div>
        <div class="login-logo-text">Morning 任务管理系统</div>
        <div class="login-logo-subtitle">请登录您的账号</div>
      </div>
      
      <!-- 错误提示 -->
      <div class="login-error" id="loginError"></div>
      
      <!-- 登录表单 -->
      <form class="login-form" id="loginForm">
        <!-- 邮箱 -->
        <div class="form-group">
          <label class="form-label" for="email">邮箱地址</label>
          <div class="form-input-icon">
            <i class="ri-mail-line"></i>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="请输入邮箱地址"
              required
              autocomplete="email"
            >
          </div>
        </div>
        
        <!-- 密码 -->
        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <div class="form-input-icon">
            <i class="ri-lock-line"></i>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="请输入密码"
              required
              autocomplete="current-password"
            >
          </div>
        </div>
        
        <!-- 记住登录 -->
        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="rememberMe">
            <span class="checkbox-label">记住登录 (30天)</span>
          </label>
        </div>
        
        <!-- 登录按钮 -->
        <button type="submit" class="btn-login" id="loginBtn">
          <i class="ri-login-circle-line"></i>
          登录
        </button>
      </form>
      
      <!-- 分割线 -->
      <div class="login-divider">或</div>
      
      <!-- 飞书登录 -->
      <button class="btn-feishu" id="feishuLoginBtn">
        <i class="ri-chat-smile-2-line"></i>
        使用飞书账号登录
      </button>
      
      <!-- 页脚 -->
      <div class="login-footer">
        <a href="index.html">返回首页</a>
      </div>
    </div>
  </div>
  
  <!-- 密码加密工具 -->
  <script src="js/crypto-utils.js?v=20260327b"></script>
  
  <!-- 登录逻辑 -->
  <script>
    // 登录页面逻辑
    (function() {
      const API_BASE = window.location.origin;
      const TOKEN_KEY = 'auth_token';
      const USER_KEY = 'auth_user';
      const REMEMBER_ME_KEY = 'remember_me';
      
      // DOM 元素
      const loginForm = document.getElementById('loginForm');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const rememberMeCheckbox = document.getElementById('rememberMe');
      const feishuLoginBtn = document.getElementById('feishuLoginBtn');
      
      // 页面加载时检查登录状态
      document.addEventListener('DOMContentLoaded', function() {
        checkLoginStatus();
      });
      
      // 检查登录状态
      async function checkLoginStatus() {
        const token = localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(TOKEN_KEY);
        
        if (token) {
          // 验证 Token 有效性
          try {
            const response = await fetch(`${API_BASE}/api/auth/verify`, {
              headers: {
                'Authorization': `Bearer ${token}`
              }
            });
            
            if (response.ok) {
              // 已登录，跳转到首页或 redirect 指定的页面
              const urlParams = new URLSearchParams(window.location.search);
              const redirect = urlParams.get('redirect') || 'dashboard-new.html';
              window.location.href = redirect;
              return;
            }
          } catch (error) {
            console.log('Token 验证失败，需要重新登录');
          }
        }
        
        // 检查记住登录状态
        const rememberMe = localStorage.getItem(REMEMBER_ME_KEY);
        if (rememberMe === 'true') {
          rememberMeCheckbox.checked = true;
        }
      }
      
      // 显示错误信息
      function showError(message) {
        loginError.textContent = message;
        loginError.classList.add('show');
        
        // 3秒后自动隐藏
        setTimeout(() => {
          loginError.classList.remove('show');
        }, 5000);
      }
      
      // 隐藏错误信息
      function hideError() {
        loginError.classList.remove('show');
      }
      
      // 设置按钮加载状态
      function setLoading(loading) {
        loginBtn.disabled = loading;
        loginBtn.innerHTML = loading 
          ? '<i class="ri-loader-4-line spin-icon"></i> 登录中...'
          : '<i class="ri-login-circle-line"></i> 登录';
      }
      
      // 表单提交
      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        if (!email || !password) {
          showError('请输入邮箱和密码');
          return;
        }
        
        setLoading(true);
        
        try {
          // 直接发送明文密码，后端计算哈希
          // 这样可以支持非 HTTPS 环境（crypto.subtle 不可用）
          const response = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              email: email,
              password: password,
              rememberMe: rememberMeCheckbox.checked
            })
          });
          
          const result = await response.json();
          
          if (result.success) {
            // 登录成功
            const { token, user, expiresIn } = result.data;
            
            // 存储 Token
            const storage = rememberMeCheckbox.checked ? localStorage : sessionStorage;
            storage.setItem(TOKEN_KEY, token);
            storage.setItem(USER_KEY, JSON.stringify(user));
            
            // 记住登录状态
            if (rememberMeCheckbox.checked) {
              localStorage.setItem(REMEMBER_ME_KEY, 'true');
            } else {
              localStorage.removeItem(REMEMBER_ME_KEY);
            }
            
            // 跳转到首页或 redirect 指定的页面
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect') || 'dashboard-new.html';
            window.location.href = redirect;
          } else {
            // 登录失败
            showError(result.error?.message || '登录失败，请检查邮箱和密码');
          }
        } catch (error) {
          console.error('登录错误:', error);
          showError('网络错误，请稍后重试');
        } finally {
          setLoading(false);
        }
      });
      
      // 飞书登录
      feishuLoginBtn.addEventListener('click', function() {
        // 跳转到飞书 OAuth
        window.location.href = `${API_BASE}/api/auth/feishu`;
      });
    })();
  </script>
<script>FieldTips.init({pageType:"general"});</script></body>
</html>
