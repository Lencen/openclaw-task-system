<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定时任务 - Morning 任务管理系统</title>
  <link href="assets/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/frame.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <style>
    .page-content { padding: 24px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    
    /* Tabs */
    .tabs-container { margin-bottom: 24px; }
    .tabs-header { display: flex; gap: 4px; background: var(--bg-tertiary); padding: 4px; border-radius: 10px; width: fit-content; }
    .tab-btn { padding: 10px 24px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .tab-btn.active { background: var(--primary); color: white; }
    .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }
    .tab-btn .badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .jobs-grid { display: grid; gap: 16px; }
    .job-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .job-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .job-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .job-status { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    .job-status.active { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .job-status.paused { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .job-info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 16px; }
    .job-info-item { text-align: center; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; }
    .job-info-value { font-size: 18px; font-weight: 600; color: var(--primary); }
    .job-info-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .job-schedule { font-size: 13px; color: var(--text-secondary); }
    .job-actions { display: flex; gap: 8px; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .btn:hover { opacity: 0.9; }
    
    /* 执行日志表格 */
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th, .log-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .log-table th { color: var(--text-secondary); font-weight: 500; font-size: 13px; background: rgba(0,0,0,0.2); }
    .log-table td { color: var(--text-primary); font-size: 14px; }
    .log-table tr:hover td { background: rgba(255,255,255,0.02); }
    .log-status { padding: 4px 10px; border-radius: 12px; font-size: 12px; }
    .log-status.success { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .log-status.failed { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .log-duration { color: var(--text-secondary); }
    .log-detail { color: var(--primary); cursor: pointer; }
    .log-detail:hover { text-decoration: underline; }
  </style>
<script src="js/field-tips.js"></script></head>
<body>
  <div class="layout">
    <div id="sidebar-container"></div>
    <main class="main">
      <header class="header">
        <div class="header-left"><div class="breadcrumb"><span>定时任务</span></div></div>
        <div class="header-right">
          <button class="header-btn" title="刷新" onclick="refresh()"><i class="ri-refresh-line"></i></button>
        </div>
      </header>
      <div class="content">
        <div class="page-content">
          <div class="page-header">
            <h1 class="page-title"><i class="ri-time-line"></i> 定时任务</h1>
            <button class="btn btn-primary" onclick="createJob()">
              <i class="ri-add-line"></i> 新建任务
            </button>
          </div>
          
          <!-- Tabs -->
          <div class="tabs-container">
            <div class="tabs-header">
              <button class="tab-btn active" onclick="switchTab('jobs')">
                <i class="ri-list-check"></i> 任务列表
              </button>
              <button class="tab-btn" onclick="switchTab('logs')">
                <i class="ri-file-list-3-line"></i> 执行日志
                <span class="badge">128</span>
              </button>
            </div>
          </div>
          
          <!-- 任务列表 Tab -->
          <div class="tab-content active" id="tab-jobs">
            <div class="jobs-grid" id="jobsGrid"></div>
          </div>
          
          <!-- 执行日志 Tab -->
          <div class="tab-content" id="tab-logs">
            <div class="card" style="background: var(--bg-secondary); border-radius: 12px; overflow: hidden;">
              <table class="log-table">
                <thead>
                  <tr>
                    <th>执行时间</th>
                    <th>任务名称</th>
                    <th>状态</th>
                    <th>耗时</th>
                    <th>详情</th>
                  </tr>
                </thead>
                <tbody id="logTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Sidebar.init({ activePage: 'cron-jobs' });
      loadJobs();
      loadLogs();
    });
    
    const jobs = [
      { id: 1, name: '系统健康检查', schedule: '*/5 * * * *', status: 'active', lastRun: '2026-03-20 15:50:00', nextRun: '2026-03-20 15:55:00', successRate: '99.8%', runCount: 288 },
      { id: 2, name: '任务超时检测', schedule: '*/1 * * * *', status: 'active', lastRun: '2026-03-20 15:54:00', nextRun: '2026-03-20 15:55:00', successRate: '100%', runCount: 1440 },
      { id: 3, name: 'Agent心跳检查', schedule: '*/30 * * * *', status: 'active', lastRun: '2026-03-20 15:30:00', nextRun: '2026-03-20 16:00:00', successRate: '100%', runCount: 48 },
      { id: 4, name: '数据备份', schedule: '0 2 * * *', status: 'active', lastRun: '2026-03-20 02:00:00', nextRun: '2026-03-21 02:00:00', successRate: '100%', runCount: 30 },
      { id: 5, name: '日志清理', schedule: '0 3 * * 0', status: 'paused', lastRun: '2026-03-17 03:00:00', nextRun: '-', successRate: '100%', runCount: 4 }
    ];
    
    const logs = [
      { time: '2026-03-20 15:54:00', job: '任务超时检测', status: 'success', duration: '1.2s', detail: '检测完成，无超时任务' },
      { time: '2026-03-20 15:50:00', job: '系统健康检查', status: 'success', duration: '3.5s', detail: '所有服务正常运行' },
      { time: '2026-03-20 15:49:00', job: '任务超时检测', status: 'success', duration: '1.1s', detail: '检测完成，无超时任务' },
      { time: '2026-03-20 15:48:00', job: '任务超时检测', status: 'success', duration: '1.0s', detail: '检测完成，无超时任务' },
      { time: '2026-03-20 15:45:00', job: '系统健康检查', status: 'success', duration: '3.2s', detail: '所有服务正常运行' },
      { time: '2026-03-20 15:44:00', job: '任务超时检测', status: 'failed', duration: '0.8s', detail: '数据库连接超时' },
      { time: '2026-03-20 15:43:00', job: '任务超时检测', status: 'success', duration: '1.3s', detail: '检测完成，无超时任务' },
      { time: '2026-03-20 15:40:00', job: '系统健康检查', status: 'success', duration: '3.8s', detail: '所有服务正常运行' },
      { time: '2026-03-20 15:30:00', job: 'Agent心跳检查', status: 'success', duration: '2.1s', detail: '所有 Agent 心跳正常' },
      { time: '2026-03-20 02:00:00', job: '数据备份', status: 'success', duration: '45.2s', detail: '备份完成，大小 128MB' }
    ];
    
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      event.target.closest('.tab-btn').classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }
    
    function loadJobs() {
      const grid = document.getElementById('jobsGrid');
      grid.innerHTML = jobs.map(job => `
        <div class="job-card">
          <div class="job-header">
            <div>
              <div class="job-name">${job.name}</div>
              <div class="job-schedule"><i class="ri-time-line"></i> ${job.schedule}</div>
            </div>
            <div class="job-actions">
              <span class="job-status ${job.status}">${job.status === 'active' ? '运行中' : '已暂停'}</span>
              <button class="btn ${job.status === 'active' ? 'btn-danger' : 'btn-primary'}" onclick="toggleJob(${job.id})">
                ${job.status === 'active' ? '暂停' : '启动'}
              </button>
            </div>
          </div>
          <div class="job-info">
            <div class="job-info-item">
              <div class="job-info-value">${job.successRate}</div>
              <div class="job-info-label">成功率</div>
            </div>
            <div class="job-info-item">
              <div class="job-info-value">${job.runCount}</div>
              <div class="job-info-label">执行次数</div>
            </div>
            <div class="job-info-item">
              <div class="job-info-value">${job.lastRun.split(' ')[1]}</div>
              <div class="job-info-label">上次执行</div>
            </div>
            <div class="job-info-item">
              <div class="job-info-value">${job.nextRun === '-' ? '-' : job.nextRun.split(' ')[1]}</div>
              <div class="job-info-label">下次执行</div>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    function loadLogs() {
      const tbody = document.getElementById('logTableBody');
      tbody.innerHTML = logs.map(log => `
        <tr>
          <td>${log.time}</td>
          <td>${log.job}</td>
          <td><span class="log-status ${log.status}">${log.status === 'success' ? '成功' : '失败'}</span></td>
          <td class="log-duration">${log.duration}</td>
          <td class="log-detail" onclick="alert('${log.detail}')">${log.detail.substring(0, 20)}...</td>
        </tr>
      `).join('');
    }
    
    function toggleJob(id) {
      const job = jobs.find(j => j.id === id);
      if (job) {
        job.status = job.status === 'active' ? 'paused' : 'active';
        loadJobs();
      }
    }
    
    function createJob() { alert('新建定时任务功能开发中...'); }
    function refresh() { loadJobs(); loadLogs(); }
  </script>
<script>FieldTips.init({pageType:"general"});</script></body>
</html>
