<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自动化监控中心</title>
  <link rel="stylesheet" href="css/tips.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { opacity: 0.9; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h3 { color: #333; margin-bottom: 15px; font-size: 16px; border-bottom: 2px solid #667eea; padding-bottom: 8px; }
    .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    .stat:last-child { border-bottom: none; }
    .stat-label { color: #666; }
    .stat-value { font-weight: 600; color: #333; }
    .status-online { color: #10b981; }
    .status-idle { color: #f59e0b; }
    .status-offline { color: #ef4444; }
    .progress-bar { background: #e5e7eb; border-radius: 999px; height: 8px; overflow: hidden; margin-top: 10px; }
    .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; transition: width 0.3s; }
    .log { background: #1f2937; color: #10b981; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; }
    .log-item { margin-bottom: 5px; }
    .log-time { color: #6b7280; }
    .refresh-btn { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .refresh-btn:hover { background: #5a67d8; }
    .last-update { font-size: 12px; color: #666; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔍 自动化监控中心</h1>
    <p>实时监控系统、Agent 和任务状态</p>
  </div>

  <div class="grid">
    <!-- 系统指标 -->
    <div class="card">
      <h3>💻 系统指标</h3>
      <div class="stat">
        <span class="stat-label">CPU 使用率</span>
        <span class="stat-value" id="cpu-usage">--</span>
      </div>
      <div class="stat">
        <span class="stat-label">内存使用率</span>
        <span class="stat-value" id="mem-usage">--</span>
      </div>
      <div class="stat">
        <span class="stat-label">运行时间</span>
        <span class="stat-value" id="uptime">--</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="cpu-bar" style="width: 0%"></div>
      </div>
    </div>

    <!-- Agent 状态 -->
    <div class="card">
      <h3>🤖 Agent 状态</h3>
      <div id="agent-list">
        <p style="color: #666; text-align: center; padding: 20px;">加载中...</p>
      </div>
    </div>

    <!-- 任务统计 -->
    <div class="card">
      <h3>📋 任务统计</h3>
      <div class="stat">
        <span class="stat-label">总任务数</span>
        <span class="stat-value" id="task-total">--</span>
      </div>
      <div class="stat">
        <span class="stat-label">进行中</span>
        <span class="stat-value" style="color: #f59e0b;" id="task-doing">--</span>
      </div>
      <div class="stat">
        <span class="stat-label">已完成</span>
        <span class="stat-value" style="color: #10b981;" id="task-completed">--</span>
      </div>
      <div class="stat">
        <span class="stat-label">阻塞</span>
        <span class="stat-value" style="color: #ef4444;" id="task-blocked">--</span>
      </div>
    </div>

    <!-- 实时日志 -->
    <div class="card">
      <h3>📝 实时日志</h3>
      <div class="log" id="log-container">
        <div class="log-item"><span class="log-time">--:--:--</span> 等待数据...</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h3>📊 最近活动</h3>
      <button class="refresh-btn" onclick="refreshData()">🔄 刷新</button>
    </div>
    <div id="activity-log" style="color: #666;">暂无活动记录</div>
    <p class="last-update">最后更新：<span id="last-update">--:--:--</span></p>
  </div>

  <script src="js/tips.js"></script>
  <script>
    TipsComponent.init('monitor');
    const API_BASE = '/api';
    let logs = [];

    function addLog(message, type = 'info') {
      const now = new Date();
      const time = now.toTimeString().split(' ')[0];
      logs.unshift({ time, message, type });
      if (logs.length > 50) logs.pop();
      renderLogs();
    }

    function renderLogs() {
      const container = document.getElementById('log-container');
      container.innerHTML = logs.map(log => 
        `<div class="log-item"><span class="log-time">[${log.time}]</span> ${log.message}</div>`
      ).join('');
    }

    function formatUptime(seconds) {
      const d = Math.floor(seconds / 86400);
      const h = Math.floor((seconds % 86400) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      return `${d}天 ${h}小时 ${m}分`;
    }

    async function refreshData() {
      try {
        // 获取任务数据
        const taskRes = await fetch(`${API_BASE}/tasks`);
        const taskData = await taskRes.json();
        const tasks = taskData.tasks || [];

        // 统计数据
        const stats = {
          total: tasks.length,
          doing: tasks.filter(t => t.status === 'doing').length,
          completed: tasks.filter(t => t.status === 'completed').length,
          blocked: tasks.filter(t => t.blocked_reason).length
        };

        // 更新 UI
        document.getElementById('task-total').textContent = stats.total;
        document.getElementById('task-doing').textContent = stats.doing;
        document.getElementById('task-completed').textContent = stats.completed;
        document.getElementById('task-blocked').textContent = stats.blocked;

        // 模拟系统和 Agent 数据（真实场景从 API 获取）
        document.getElementById('cpu-usage').textContent = '2.5%';
        document.getElementById('mem-usage').textContent = '45.2%';
        document.getElementById('uptime').textContent = formatUptime(123456);
        document.getElementById('cpu-bar').style.width = '2.5%';

        document.getElementById('agent-list').innerHTML = `
          <div class="stat"><span class="stat-label">main</span><span class="stat-value status-online">🟢 在线</span></div>
          <div class="stat"><span class="stat-label">deep</span><span class="stat-value status-idle">🟡 空闲</span></div>
          <div class="stat"><span class="stat-label">fast</span><span class="stat-value status-offline">🔴 离线</span></div>
        `;

        addLog(`数据刷新成功：${stats.total}个任务，${stats.doing}进行中`);
        document.getElementById('last-update').textContent = new Date().toLocaleTimeString();

      } catch (error) {
        addLog(`获取数据失败：${error.message}`, 'error');
        document.getElementById('last-update').textContent = '失败';
      }
    }

    // 初始加载
    refreshData();
    // 定时刷新
    setInterval(refreshData, 30000);
  </script>
</body>
</html>
