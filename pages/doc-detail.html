<body>
  <div class="layout">
    <!-- 统一侧边栏容器 -->

    <!-- 主内容 -->
    <main class="main">
      <header class="header">

          <div class="breadcrumb">

  <!-- Markdown 解析库 -->
  <script src="assets/js/marked.min.js"></script>
  
  <style>
    /* 代码块基础样式（不依赖 highlight.js） */
    .markdown-body pre {
      background: #1e1e1e;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
    }
    .markdown-body code {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
    }
  </style>
  
  <script>
    // 获取URL参数
    function getDocPath() {
      const params = new URLSearchParams(window.location.search);
      return params.get('path');
    }
    
    function getDocId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }
    
    // 格式化日期
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleDateString('zh-CN');
    }
    
    // 格式化文件大小
    function formatSize(bytes) {
      if (!bytes) return '-';
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0;
      while (bytes >= 1024 && i < units.length - 1) {
        bytes /= 1024;
        i++;
      }
      return bytes.toFixed(1) + ' ' + units[i];
    }
    
    // 加载文档
    async function loadDoc() {
      const docPath = getDocPath();
      const docId = getDocId();
      
      if (!docPath && !docId) {
        showError('未指定文档');
        return;
      }
      
      try {
        let filePath = docPath;
        let docInfo = { name: docId || docPath.split('/').pop() };
        
        // 如果没有路径，尝试从文档列表查找
        if (!filePath && docId) {
          const listRes = await fetch('/api/resources/docs');
          if (listRes.ok) {
            const listData = await listRes.json();
            const docs = listData.data || [];
            const found = docs.find(d => d.id === docId || d.name === docId);
            if (found) {
              filePath = found.path;
              docInfo = found;
            }
          }
        }
        
        // 获取文档内容
        let content = '';
        if (filePath) {
          const contentRes = await fetch(`/api/file/read?path=${encodeURIComponent(filePath)}`);
          if (contentRes.ok) {
            const data = await contentRes.json();
            content = data.content || '';
            // 更新文档信息
            docInfo.size = data.size || docInfo.size;
            docInfo.modified = data.modified || docInfo.modified;
          }
        }
        
        if (content) {
          renderDoc(docInfo, content);
        } else {
          showError('未找到文档内容');
        }
        
      } catch (error) {
        console.error('加载失败:', error);
        showError('加载失败: ' + error.message);
      }
    }
    
    // 渲染文档
    function renderDoc(doc, content) {
      // 配置 marked 选项（v12 不再支持 highlight 选项）
      marked.setOptions({
        breaks: true,        // 支持 GitHub 风格换行
        gfm: true,           // GitHub 风格 Markdown
        headerIds: true      // 为标题生成 ID
      });
      
      // 解析Markdown
      let htmlContent = '';
      if (content) {
        try {
          htmlContent = marked.parse(content);
          // 代码高亮（在解析后处理）
          htmlContent = htmlContent.replace(/<pre><code class="language-(\w+)">/g, (match, lang) => {
            return `<pre><code class="language-${lang} hljs">`;
          });
          // 对没有语言标记的代码块也添加 hljs 类
          htmlContent = htmlContent.replace(/<pre><code>/g, '<pre><code class="hljs">');
        } catch (e) {
          htmlContent = `<pre>${escapeHtml(content)}</pre>`;
        }
      } else {
        htmlContent = '<p style="color: var(--text-tertiary);">暂无内容</p>';
      }
      
      // 生成目录
      const tocHtml = generateTOC(content);
      
      // 模拟扩展数据（实际应从API获取）
      const extendedData = {
        views: doc.views || Math.floor(Math.random() * 500),
        lastViewed: doc.lastViewed || new Date().toISOString().split('T')[0],
        versions: doc.versions || [
          { version: 1, date: doc.modified || doc.updated_at || new Date().toISOString(), author: 'main' }
        ],
        relatedTasks: doc.relatedTasks || [],
        relatedProjects: doc.relatedProjects || []
      };
      
      const html = `
    <div class="doc-layout">
      <div class="doc-main">
        <div class="doc-info-card">
          <h1 class="doc-title">${escapeHtml(doc.name || doc.title || '未命名文档')}</h1>
          <div class="doc-meta">
            <div class="doc-meta-item">
              <span>📄</span>
              <span>${doc.type || 'Markdown'}</span>
            </div>
            <div class="doc-meta-item">
              <span>📊</span>
              <span>${formatSize(doc.size)}</span>
            </div>
            <div class="doc-meta-item">
              <span>📅</span>
              <span>${formatDate(doc.modified || doc.updated_at)}</span>
            </div>
            ${doc.path ? `
            <div class="doc-meta-item">
              <span>📁</span>
              <span title="${escapeHtml(doc.path)}">${escapeHtml(doc.path.split('/').slice(-2).join('/'))}</span>
            </div>
            ` : ''}
          </div>
          ${doc.tags && doc.tags.length > 0 ? `
          <div class="doc-tags">
            ${doc.tags.map(tag => `<span class="doc-tag">${escapeHtml(tag)}</span>`).join('')}
          </div>
          ` : ''}
          ${doc.categories && doc.categories.length > 0 ? `
          <div class="doc-tags">
            ${doc.categories.map(cat => `<span class="doc-tag">${escapeHtml(cat)}</span>`).join('')}
          </div>
          ` : ''}
        </div>
        
        <!-- 使用统计 -->
        <div style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px;">
          <h2 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">📊 使用统计</h2>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px;">
            <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 16px; text-align: center;">
              <div style="font-size: 28px; font-weight: 600; color: var(--primary);">${extendedData.views}</div>
              <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">查看次数</div>
            </div>
            <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 16px; text-align: center;">
              <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${extendedData.lastViewed}</div>
              <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">最后查看</div>
            </div>
            <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 16px; text-align: center;">
              <div style="font-size: 28px; font-weight: 600; color: var(--success);">${extendedData.versions.length}</div>
              <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">版本数</div>
            </div>
          </div>
        </div>
        
        <!-- 版本历史 -->
        <div style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px;">
          <h2 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">📜 版本历史</h2>
          <div style="max-height: 200px; overflow-y: auto;">
            ${extendedData.versions.map((v, i) => `
              <div style="display: flex; padding: 10px 0; border-bottom: 1px solid var(--border); ${i === 0 ? 'background: rgba(59, 130, 246, 0.1); margin: -8px -12px; padding: 10px 12px; border-radius: 6px;' : ''}">
                <div style="width: 60px; font-weight: 600; color: ${i === 0 ? 'var(--primary)' : 'var(--text-secondary)'};">v${v.version}</div>
                <div style="flex: 1;">
                  <div style="font-size: 12px; color: var(--text-tertiary);">${formatDate(v.date)}</div>
                  <div style="font-size: 13px; color: var(--text-secondary);">修改者: ${v.author}</div>
                </div>
                ${i === 0 ? '<span style="color: var(--primary); font-size: 12px;">当前版本</span>' : ''}
              </div>
            `).join('')}
          </div>
        </div>
        
        <!-- 关联信息 -->
        ${(extendedData.relatedTasks.length > 0 || extendedData.relatedProjects.length > 0) ? `
        <div style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px;">
          <h2 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">🔗 关联信息</h2>
          ${extendedData.relatedTasks.length > 0 ? `
          <div style="margin-bottom: 12px;">
            <span style="font-size: 12px; color: var(--text-tertiary);">关联任务:</span>
            <div style="margin-top: 8px;">
              ${extendedData.relatedTasks.map(t => `<a href="task-detail.html?id=${t.id}" style="color: var(--primary); text-decoration: none; margin-right: 12px;">${escapeHtml(t.title || t.id)}</a>`).join('')}
            </div>
          </div>
          ` : ''}
          ${extendedData.relatedProjects.length > 0 ? `
          <div>
            <span style="font-size: 12px; color: var(--text-tertiary);">关联项目:</span>
            <div style="margin-top: 8px;">
              ${extendedData.relatedProjects.map(p => `<a href="project-detail.html?id=${p.id}" style="color: var(--success); text-decoration: none; margin-right: 12px;">${escapeHtml(p.name || p.id)}</a>`).join('')}
            </div>
          </div>
          ` : ''}
        </div>
        ` : ''}
        
        <!-- 文档内容（与标题等宽） -->
        <div class="doc-content" style="margin-top: 24px;">
          <div class="markdown-body">
            ${htmlContent}
          </div>
        </div>
      </div>
      <aside class="toc-sidebar">
        ${tocHtml}
      </aside>
    </div>
  `;
  
  document.getElementById('content').innerHTML = html;
      document.getElementById('pageTitle').textContent = doc.name || doc.title || '文档详情';
      document.title = (doc.name || doc.title || '文档详情') + ' - 任务系统';
    }
    
    // HTML转义
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // 显示错误
    function showError(message) {
      document.getElementById('content').innerHTML = `
        <div class="error-state">
          <div class="error-icon">❌</div>
          <div>${escapeHtml(message)}</div>
          <button onclick="loadDoc()" style="margin-top: 16px; padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer;">重试</button>
        </div>
      `;
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', loadDoc);
    
    // 生成目录
    function generateTOC(content) {
      const headings = content.match(/^#{1,3}\s+.+$/gm);
      if (!headings || headings.length === 0) return '';
      
      const tocItems = headings.map(h => {
        const level = h.match(/^#+/)[0].length;
        const text = h.replace(/^#+\s+/, '').replace(/[*_`]/g, '');
        const id = text.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-');
        return `<a href="#${id}" class="toc-item level-${level}">${text}</a>`;
      }).join('');
      
      return `
        <div class="toc-container">
          <div class="toc-header">
            <span>📑 目录</span>
            <button class="toc-toggle" onclick="toggleTOC()">收起</button>
          </div>
          <div class="toc-content" id="tocContent">
            ${tocItems}
          </div>
        </div>
      `;
    }
    
    // 切换目录显示
    function toggleTOC() {
      const content = document.getElementById('tocContent');
      const btn = document.querySelector('.toc-toggle');
      if (content.style.display === 'none') {
        content.style.display = 'block';
        btn.textContent = '收起';
      } else {
        content.style.display = 'none';
        btn.textContent = '展开';
      }
    }
  </script>
  
  <!-- 统一侧边栏组件 -->
  <script src="js/sidebar.js"></script>
  <script>
    Sidebar.init({ activePage: 'docs' });
  </script>
<script>FieldTips.init({pageType:"general"});</script></body>
