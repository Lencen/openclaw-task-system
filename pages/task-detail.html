    // 构建时间线视图
    function buildExecutionTimeline(logs) {
      let html = '<div class="execution-timeline">';
      
      logs.forEach(function(log, index) {
        const actionClass = getActionClass(log.action);
        const actionIcon = getActionIcon(log.action);
        
        html += '<div class="timeline-item ' + actionClass + '">';
        html += '<div class="timeline-marker"><i class="' + actionIcon + '"></i></div>';
        html += '<div class="timeline-content">';
        html += '<div class="timeline-header">';
        html += '<span class="timeline-action">' + getActionText(log.action) + '</span>';
        html += '<span class="timeline-time">' + (log.time || formatTime(log.timestamp)) + '</span>';
        html += '</div>';
        
        if (log.detail) {
          html += '<div class="timeline-detail">' + escapeHtml(log.detail) + '</div>';
        }
        
        // 显示变更字段（审计增强）
        if (log.changes && log.changes.length > 0) {
          html += '<div class="timeline-changes">';
          log.changes.forEach(function(change) {
            html += '<div class="change-item">';
            html += '<span class="change-field">' + escapeHtml(change.field) + ':</span> ';
            html += '<span class="change-before">' + escapeHtml(change.before || 'null') + '</span>';
            html += ' → ';
            html += '<span class="change-after">' + escapeHtml(change.after || 'null') + '</span>';
            html += '</div>';
          });
          html += '</div>';
        }
        
        if (log.agent) {
          html += '<div class="timeline-meta"><span class="timeline-agent">🤖 ' + escapeHtml(log.agent) + '</span></div>';
        }
        
        // 显示来源信息（审计增强）
        if (log.source || log.sourceDetail) {
          html += '<div class="timeline-meta">';
          html += '<span class="timeline-source">📡 ' + escapeHtml(log.source || 'unknown');
          if (log.sourceDetail) {
            html += ' <code>' + escapeHtml(log.sourceDetail) + '</code>';
          }
          html += '</span></div>';
        }
        
        // 额外信息
        if (log.step_id) {
          html += '<div class="timeline-meta"><span>步骤: ' + escapeHtml(log.step_id) + '</span></div>';
        }
        if (log.duration) {
          html += '<div class="timeline-meta"><span>耗时: ' + escapeHtml(log.duration) + '</span></div>';
        }
        
        html += '</div></div>';
      });
      
      html += '</div>';
      return html;
    }
    
    // 构建表格视图
    function buildExecutionTable(logs) {
      let html = '<div class="table-container"><table class="execution-table">';
      html += '<thead><tr>';
      html += '<th>时间</th><th>事件类型</th><th>详情</th><th>执行者</th>';
      html += '</tr></thead><tbody>';
      
      logs.forEach(function(log) {
        const actionClass = getActionClass(log.action);
        html += '<tr class="' + actionClass + '">';
        html += '<td>' + (log.time || formatTime(log.timestamp)) + '</td>';
        html += '<td><span class="action-badge">' + getActionText(log.action) + '</span></td>';
        html += '<td>' + escapeHtml(log.detail || '-') + '</td>';
        html += '<td>' + escapeHtml(log.agent || '-') + '</td>';
        html += '</tr>';
      });
      
      html += '</tbody></table></div>';
      return html;
    }
    
    // 获取动作对应的CSS类
    function getActionClass(action) {
      const classMap = {
        'TASK_STARTED': 'action-start',
        'TASK_WAITING_START': 'action-wait',
        'TASK_ANALYZING': 'action-analyze',
        'TASK_BREAKDOWN': 'action-breakdown',
        'STEP_STARTED': 'action-step-start',
        'STEP_RUNNING': 'action-step-run',
        'STEP_COMPLETED': 'action-step-done',
        'STEP_FAILED': 'action-step-fail',
        'TASK_COMPLETED': 'action-done',
        'TASK_FAILED': 'action-fail',
        'TASK_ERROR': 'action-error'
      };
      return classMap[action] || 'action-info';
    }
    
    // 获取动作对应的图标
    function getActionIcon(action) {
      const iconMap = {
        'TASK_STARTED': 'ri-play-circle-line',
        'TASK_WAITING_START': 'ri-time-line',
        'TASK_ANALYZING': 'ri-search-eye-line',
        'TASK_BREAKDOWN': 'ri-list-check-2',
        'STEP_STARTED': 'ri-arrow-right-circle-line',
        'STEP_RUNNING': 'ri-loader-4-line',
        'STEP_COMPLETED': 'ri-check-circle-line',
        'STEP_FAILED': 'ri-close-circle-line',
        'TASK_COMPLETED': 'ri-checkbox-circle-line',
        'TASK_FAILED': 'ri-error-warning-line',
        'TASK_ERROR': 'ri-alert-line'
      };
      return iconMap[action] || 'ri-information-line';
    }
    
    function renderIssuesHtml(task) {
      if (!task.issues || (Array.isArray(task.issues) && task.issues.length === 0)) {
        return '<div class="empty-state">暂无问题记录</div>';
      }
      
      const issues = Array.isArray(task.issues) ? task.issues : [task.issues];
      let html = '';
      
      issues.forEach(function(issue, i) {
        const isResolved = issue.status === 'fixed' || issue.status === 'resolved';
        const statusClass = isResolved ? 'resolved' : 'open';
        const statusText = isResolved ? '已解决' : '待处理';
        
        // 分析状态
        const isAnalyzing = issue.analysis_status === 'analyzing';
        const isAnalyzed = issue.analysis_status === 'completed';
        
        html += '<div class="issue-item ' + statusClass + '" onclick="toggleIssue(this)">';
        html += '<div class="issue-header">';
        html += '<div class="issue-title">' + escapeHtml(issue.name || issue.title || ('问题 #' + (i + 1))) + '</div>';
        
        // 状态标签
        html += '<div style="display: flex; gap: 8px;">';
        html += '<span class="issue-status ' + statusClass + '">' + statusText + '</span>';
        
        // 分析状态标签
        if (isAnalyzing) {
          html += '<span style="background: rgba(59,130,246,0.15); color: var(--primary); padding: 2px 8px; border-radius: 4px; font-size: 11px;">🔄 分析中</span>';
        } else if (isAnalyzed) {
          html += '<span style="background: rgba(16,185,129,0.15); color: var(--success); padding: 2px 8px; border-radius: 4px; font-size: 11px;">✅ 已分析</span>';
        }
        
        // 自动修复标签
        if (issue.can_auto_fix && !isResolved) {
          html += '<span style="background: rgba(139,92,246,0.15); color: #8b5cf6; padding: 2px 8px; border-radius: 4px; font-size: 11px;">🤖 可自动修复</span>';
        }
        
        html += '</div></div>';
        
        // 问题基本信息
        html += '<div class="issue-meta">';
        html += '<span><i class="ri-user-line"></i> 发现人: ' + escapeHtml(issue.discoverer || '-') + '</span>';
        html += '<span><i class="ri-calendar-line"></i> 创建时间: ' + formatDateTime(issue.created_at) + '</span>';
        if (issue.resolver) {
          html += '<span><i class="ri-user-check-line"></i> 解决人: ' + escapeHtml(issue.resolver) + '</span>';
        }
        if (issue.resolved_at) {
          html += '<span><i class="ri-check-line"></i> 解决时间: ' + formatDateTime(issue.resolved_at) + '</span>';
        }
        if (issue.analyzer && issue.analyzed_at) {
          html += '<span><i class="ri-robot-line"></i> 分析: ' + escapeHtml(issue.analyzer) + ' (' + formatDateTime(issue.analyzed_at) + ')</span>';
        }
        html += '</div>';
        
        // 详情区
        html += '<div class="issue-detail">';
        if (issue.description) {
          html += '<div class="issue-detail-section"><div class="issue-detail-label">📋 问题描述</div><div class="issue-detail-content">' + escapeHtml(issue.description) + '</div></div>';
        }
        
        // 缺失功能列表（深度分析结果）
        if (issue.missing_features && issue.missing_features.length > 0) {
          html += '<div class="issue-detail-section"><div class="issue-detail-label">🔍 缺失功能</div>';
          html += '<div style="display: flex; flex-wrap: wrap; gap: 8px;">';
          issue.missing_features.forEach(function(f) {
            const priorityColor = f.priority === 'high' ? 'var(--danger)' : (f.priority === 'medium' ? 'var(--warning)' : 'var(--text-secondary)');
            html += '<span style="padding: 4px 12px; background: rgba(239,68,68,0.1); border-left: 3px solid ' + priorityColor + '; border-radius: 4px; font-size: 13px;">' + escapeHtml(f.name) + '</span>';
          });
          html += '</div></div>';
        }
        
        if (issue.root_cause) {
          html += '<div class="issue-detail-section"><div class="issue-detail-label">🔍 根因分析</div><div class="issue-detail-content" style="background: rgba(59,130,246,0.05); padding: 8px; border-radius: 4px;">' + escapeHtml(issue.root_cause) + '</div></div>';
        }
        if (issue.solution) {
          html += '<div class="issue-detail-section"><div class="issue-detail-label">💡 解决方案</div><div class="issue-detail-content" style="background: rgba(16,185,129,0.05); padding: 8px; border-radius: 4px;">' + escapeHtml(issue.solution) + '</div></div>';
        }
        
        // 修复步骤（深度分析结果）
        if (issue.fix_steps && issue.fix_steps.length > 0) {
          html += '<div class="issue-detail-section"><div class="issue-detail-label">📝 修复步骤</div>';
          html += '<ol style="margin: 8px 0; padding-left: 20px;">';
          issue.fix_steps.forEach(function(step) {
            html += '<li style="margin: 4px 0; color: var(--text-secondary);">' + escapeHtml(step) + '</li>';
          });
          html += '</ol></div>';
        }
        
        // 预估工作量
        if (issue.estimated_effort) {
          html += '<div class="issue-detail-section"><div class="issue-detail-label">⏱️ 预估工作量</div><div class="issue-detail-content">' + escapeHtml(issue.estimated_effort) + '</div></div>';
        }
        
        if (issue.fix_detail) {
          html += '<div class="issue-detail-section"><div class="issue-detail-label">📝 修复详情</div><div class="issue-detail-content">' + escapeHtml(issue.fix_detail) + '</div></div>';
        }
        
        // 分析类型标签
        if (issue.analysis_type === 'deep') {
          html += '<div style="margin-top: 8px; padding: 8px; background: rgba(139,92,246,0.1); border-radius: 4px; font-size: 12px; color: #8b5cf6;">';
          html += '<i class="ri-robot-line"></i> 已进行深度分析（对比原始需求和实现情况）';
          html += '</div>';
        }
        
        // 操作按钮（未解决的问题）
        if (!isResolved) {
          html += '<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px;">';
          if (!isAnalyzed && !isAnalyzing) {
            html += '<button onclick="event.stopPropagation(); analyzeIssue(\'' + issue.id + '\')" style="padding: 6px 12px; border-radius: 4px; border: 1px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; font-size: 12px;">🔄 重新分析</button>';
          }
          if (issue.can_auto_fix) {
            html += '<button onclick="event.stopPropagation(); autoFixIssue(\'' + issue.id + '\')" style="padding: 6px 12px; border-radius: 4px; border: 1px solid #8b5cf6; background: rgba(139,92,246,0.1); color: #8b5cf6; cursor: pointer; font-size: 12px;">🤖 自动修复</button>';
          }
          html += '<button onclick="event.stopPropagation(); markIssueFixed(\'' + issue.id + '\')" style="padding: 6px 12px; border-radius: 4px; border: 1px solid var(--success); background: transparent; color: var(--success); cursor: pointer; font-size: 12px;">✅ 标记已解决</button>';
          html += '</div>';
        }
        
        html += '</div>';
        html += '</div>';
      });
      
      return html;
    }
    
    // 手动触发分析
    async function analyzeIssue(issueId) {
      try {
        showToast('正在重新分析...', 'info');
        const response = await fetch(API_BASE + '/api/issues/' + taskId + '/' + issueId + '/analyze', {
          method: 'POST'
        });
        const result = await response.json();
        if (result.success) {
          showToast('分析完成', 'success');
          // 刷新显示
          setTimeout(async function() {
            currentTask = await loadTask(taskId);
            document.getElementById('issue-list').innerHTML = renderIssuesHtml(currentTask);
          }, 1000);
        } else {
          showToast('分析失败: ' + result.error, 'error');
        }
      } catch (err) {
        showToast('分析失败: ' + err.message, 'error');
      }
    }
    
    // 标记问题已解决
    async function markIssueFixed(issueId) {
      try {
        const response = await fetch(API_BASE + '/api/issues/' + taskId + '/' + issueId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'fixed', resolver: 'manual' })
        });
        const result = await response.json();
        if (result.success) {
          showToast('问题已标记为已解决', 'success');
          currentTask = await loadTask(taskId);
          document.getElementById('issue-list').innerHTML = renderIssuesHtml(currentTask);
        }
      } catch (err) {
        showToast('操作失败: ' + err.message, 'error');
      }
    }
    
    // 触发自动修复
    async function autoFixIssue(issueId) {
      try {
        showToast('正在创建修复任务...', 'info');
        
        const response = await fetch(API_BASE + '/api/issues/' + taskId + '/' + issueId + '/auto-fix', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        
        const result = await response.json();
        
        if (result.success) {
          showToast('修复任务已创建！' + (result.data.message || ''), 'success');
          
          // 显示修复任务信息
          if (result.data.fix_task) {
            const fixTask = result.data.fix_task;
            const confirmMsg = `修复任务已创建:\n\n标题: ${fixTask.title}\n优先级: ${fixTask.priority}\n建议执行者: ${fixTask.suggested_agent}\n\n是否立即执行修复？`;
            
            if (confirm(confirmMsg)) {
              // 调用 sessions_spawn 执行修复
              showToast('正在启动修复 Agent...', 'info');
              // 实际应该调用后端 API 触发 subagent
              // 这里暂时只更新状态
              setTimeout(async function() {
                currentTask = await loadTask(taskId);
                document.getElementById('issue-list').innerHTML = renderIssuesHtml(currentTask);
                showToast('修复任务已分配给 Agent 执行', 'success');
              }, 1000);
            }
          }
        } else {
          showToast('无法自动修复: ' + result.error, 'error');
          if (result.suggestion) {
            alert('建议解决方案:\n\n' + result.suggestion);
          }
        }
      } catch (err) {
        showToast('操作失败: ' + err.message, 'error');
      }
    }
    
    function renderOutputsPanel(task) {
      const panel = document.getElementById('outputs-panel');
      
      if (!task.related_docs || task.related_docs.length === 0) {
        panel.innerHTML = '<div class="empty-state">暂无输出</div>';
        return;
      }
      
      // 异步加载文档名称映射后渲染
      fetch('/api/doc-mapping')
        .then(r => r.json())
        .then(mappingData => {
          const docMapping = mappingData.data?.docs || {};
          renderOutputList(task.related_docs, docMapping);
        })
        .catch(() => {
          renderOutputList(task.related_docs, {});
        });
    }
    
    function renderOutputList(relatedDocs, docMapping) {
      const panel = document.getElementById('outputs-panel');
      
      let html = '<div class="output-list">';
      relatedDocs.forEach(function(doc) {
        // 支持字符串或对象格式
        let path = doc.path || doc;
        let name = doc.title || doc.name || getFileName(path);
        const docType = doc.type || getDocType(path);
        const icon = getDocIcon(docType);
        
        // 尝试获取中文名称
        const fileName = path.split('/').pop();
        if (docMapping[fileName]) {
          name = docMapping[fileName];
        }
        
        // 自动补全路径前缀
        if (path.startsWith('docs/') && !path.startsWith('task-system-v2/')) {
          path = 'task-system-v2/' + path;
        }
        
        // 使用文档详情页面
        const docUrl = 'doc-detail.html?path=' + encodeURIComponent(path);
        
        html += '<a href="' + escapeHtml(docUrl) + '" class="output-item" target="_blank">';
        html += '<span class="output-icon">' + icon + '</span>';
        html += '<div class="output-info">';
        html += '<span class="output-name">' + escapeHtml(name) + '</span>';
        if (docType) {
          html += '<span class="output-type">' + escapeHtml(docType) + '</span>';
        }
        html += '</div>';
        html += '</a>';
      });
      html += '</div>';
      
      panel.innerHTML = html;
    }
    
    function getDocType(path) {
      if (!path) return 'doc';
      const ext = path.split('.').pop().toLowerCase();
      const typeMap = {
        'md': 'doc',
        'txt': 'doc',
        'json': 'data',
        'js': 'code',
        'ts': 'code',
        'html': 'code',
        'css': 'code',
        'py': 'code',
        'pdf': 'pdf',
        'png': 'image',
        'jpg': 'image',
        'jpeg': 'image',
        'gif': 'image'
      };
      return typeMap[ext] || 'doc';
    }
    
    function renderExecutionLogPanel(task) {
      const panel = document.getElementById('execution-log-panel');
      
      if (!task.execution_log || task.execution_log.length === 0) {
        panel.innerHTML = '<div class="empty-state">暂无执行记录</div>';
        return;
      }
      
      let html = '<div class="timeline">';
      task.execution_log.forEach(function(log) {
        html += '<div class="timeline-item">';
        html += '<div class="timeline-time">' + (log.time || formatTime(log.timestamp)) + '</div>';
        html += '<div class="timeline-action">' + getActionText(log.action) + '</div>';
        if (log.detail) {
          html += '<div class="timeline-detail">' + escapeHtml(log.detail) + '</div>';
        }
        if (log.agent) {
          html += '<div class="timeline-detail">🤖 ' + escapeHtml(log.agent) + '</div>';
        }
        html += '</div>';
      });
      html += '</div>';
      
      panel.innerHTML = html;
    }
    
    function bindEvents() {
      // Tab 切换
      document.querySelectorAll('.tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
          document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
          tab.classList.add('active');
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
      });
      
      // 执行日志视图切换
      document.querySelectorAll('.view-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.view-btn').forEach(function(b) { b.classList.remove('active'); });
          document.querySelectorAll('.execution-view').forEach(function(v) { v.classList.remove('active'); });
          btn.classList.add('active');
          document.getElementById('view-' + btn.dataset.view).classList.add('active');
        });
      });
      
      // 区块折叠
      document.querySelectorAll('.section-header').forEach(function(header) {
        header.addEventListener('click', function() {
          header.parentElement.classList.toggle('collapsed');
        });
      });
      
      // 处理 URL 参数中的 tab
      const urlParams = new URLSearchParams(window.location.search);
      const tabParam = urlParams.get('tab');
      if (tabParam) {
        const targetTab = document.querySelector('.tab[data-tab="' + tabParam + '"]');
        if (targetTab) {
          targetTab.click();
        }
      }
    }
    
    function toggleIssue(item) {
      item.classList.toggle('expanded');
    }
    
    function openCreateIssueModal() {
      document.getElementById('create-issue-modal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('create-issue-modal').classList.remove('active');
    }
    
    async function createIssue() {
      const title = document.getElementById('issue-title').value.trim();
      const description = document.getElementById('issue-description').value.trim();
      const priority = document.getElementById('issue-priority').value;
      
      if (!title) {
        alert('请输入问题名称');
        return;
      }
      
      // 调用新的问题创建 API（会自动触发分析）
      try {
        const response = await fetch(API_BASE + '/api/issues/' + taskId, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: title,
            description: description,
            priority: priority,
            discoverer: 'user'
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          // 更新当前任务数据
          currentTask = await loadTask(taskId);
          
          // 重新渲染
          document.getElementById('issue-list').innerHTML = renderIssuesHtml(currentTask);
          closeModal();
          
          // 清空表单
          document.getElementById('issue-title').value = '';
          document.getElementById('issue-description').value = '';
          
          // 显示提示
          showToast('问题已创建，正在自动分析中...', 'success');
          
          // 3秒后刷新以查看分析结果
          setTimeout(async function() {
            currentTask = await loadTask(taskId);
            document.getElementById('issue-list').innerHTML = renderIssuesHtml(currentTask);
          }, 3000);
          
        } else {
          alert('创建失败: ' + (result.error || '未知错误'));
        }
        
      } catch (error) {
        alert('创建失败: ' + error.message);
      }
    }
    
    // 显示提示
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;top:20px;right:20px;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;animation:fadeIn 0.3s;';
      toast.style.background = type === 'success' ? 'rgba(16,185,129,0.9)' : 'rgba(59,130,246,0.9)';
      toast.style.color = 'white';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3000);
    }
    
    // 辅助函数
    function formatTokenCount(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toString();
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    
    function getActionText(action) {
      const map = {
        'CREATE': '📝 任务创建',
        'ASSIGN': '🤖 分配 Agent',
        'START': '▶️ 开始执行',
        'STEP_START': '🔄 开始步骤',
        'STEP_COMPLETE': '✅ 步骤完成',
        'COMPLETE': '🎉 任务完成',
        'PAUSE': '⏸️ 任务暂停',
        'FAIL': '❌ 执行失败',
        'RETRY': '🔄 重试执行'
      };
      return map[action] || action;
    }
    
    function formatTime(time) {
      if (!time) return '-';
      const d = new Date(time);
      return (d.getMonth() + 1).toString().padStart(2, '0') + '-' +
             d.getDate().toString().padStart(2, '0') + ' ' +
             d.getHours().toString().padStart(2, '0') + ':' +
             d.getMinutes().toString().padStart(2, '0');
    }
    
    function formatDateTime(time) {
      if (!time) return '-';
      const d = new Date(time);
      return d.getFullYear() + '-' +
             (d.getMonth() + 1).toString().padStart(2, '0') + '-' +
             d.getDate().toString().padStart(2, '0') + ' ' +
             d.getHours().toString().padStart(2, '0') + ':' +
             d.getMinutes().toString().padStart(2, '0');
    }
    
    function getDocIcon(type) {
      const icons = { 'md': '📄', 'doc': '📘', 'docx': '📘', 'pdf': '📕', 'code': '💻' };
      return icons[type] || '📄';
    }
    
    function getFileName(path) {
      if (!path) return '文档';
      return path.split('/').pop();
    }
    
    function showError(message) {
      document.getElementById('content').innerHTML = 
        '<div class="error-state">' +
        '<p>❌ ' + escapeHtml(message) + '</p>' +
        '<button class="btn btn-primary" onclick="loadTaskData()" style="margin-top: 12px;">重试</button>' +
        '</div>';
    }
    
    // 初始化
    loadTaskData();
    
    // ========== 自动化监控相关函数 ==========
    
    async function pauseAutomation() {
      if (!taskId || !currentTask) return;
      
      try {
        const monitor = currentTask.automation_monitor || {};
        monitor.flow_status = 'paused';
        monitor.enabled = true;
        currentTask.automation_monitor = monitor;
        
        await fetch(API_BASE + '/api/tasks/' + taskId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentTask)
        });
        
        loadTaskData();
      } catch (error) {
        console.error('暂停监控失败:', error);
        alert('暂停监控失败: ' + error.message);
      }
    }
    
    async function resumeAutomation() {
      if (!taskId || !currentTask) return;
      
      try {
        const monitor = currentTask.automation_monitor || {};
        monitor.flow_status = 'running';
        monitor.enabled = true;
        currentTask.automation_monitor = monitor;
        
        await fetch(API_BASE + '/api/tasks/' + taskId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentTask)
        });
        
        loadTaskData();
      } catch (error) {
        console.error('恢复监控失败:', error);
        alert('恢复监控失败: ' + error.message);
      }
    }
    
    function refreshMonitorData() {
      loadTaskData();
    }
