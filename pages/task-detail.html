<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务详情 - Morning 任务管理系统</title>
  
  <!-- 统一框架样式 -->
  <link href="assets/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/frame.css">
  <link rel="stylesheet" href="css/sidebar.css">
      
  <style>
    /* 图标样式 */
    i[class^="ri-"], i[class*=" ri-"] {
      font-size: 1em;
      vertical-align: middle;
      line-height: 1;
    }
    .nav-item i, .tab i, .section-title i {
      margin-right: 4px;
    }
    
    /* ========== 任务详情页面专用样式 ========== */
    
    .nav-section { margin-bottom: 16px; }
    
    .nav-section-title {
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 8px 12px;
      text-transform: uppercase;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.15s;
    }
    
    .nav-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .nav-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: var(--primary);
    }
    
    /* 主内容区 */
    /* 已移除，使用 frame.css */
    
    /* 已移除，使用 frame.css */
    
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    
    .back-btn:hover { color: var(--text-primary); }
    
    .content-wrapper {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    /* 已移除，使用 frame.css */
    
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    /* 右侧边栏 */
    .right-sidebar {
      width: 300px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-section-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-tertiary);
    }
    
    .sidebar-section-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    /* 任务头部 */
    .task-header {
      padding: 20px 24px;
      background: var(--bg-secondary);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .task-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      font-size: 12px;
    }
    
    .status-badge { font-weight: 500; }
    .status-badge.doing { color: var(--primary); }
    .status-badge.pending { color: var(--warning); }
    .status-badge.completed { color: var(--success); }
    .status-badge.paused { color: var(--text-tertiary); }
    
    .priority-badge.p0 { color: var(--danger); }
    .priority-badge.p1 { color: var(--warning); }
    .priority-badge.p2 { color: var(--primary); }
    .priority-badge.p3 { color: var(--text-tertiary); }
    
    /* 进度条 */
    .progress-section {
      margin-bottom: 16px;
    }
    
    .progress-bar {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--success));
      border-radius: 3px;
    }
    
    .progress-text {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    
    /* 描述区 */
    .task-description {
      padding: 16px 20px;
      background: var(--bg-tertiary);
      border-radius: 8px;
    }
    
    .description-label {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    
    .description-text {
      white-space: pre-wrap;
      line-height: 1.8;
      color: var(--text-secondary);
    }
    
    /* Tab 导航 */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .tab {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      transition: all 0.15s;
    }
    
    .tab:hover {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }
    
    .tab.active {
      color: var(--primary);
      background: rgba(59, 130, 246, 0.15);
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* 区块 */
    .section {
      background: var(--bg-secondary);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    
    .section-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .section-header:hover {
      background: var(--bg-tertiary);
    }
    
    .section-title {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section-toggle {
      color: var(--text-tertiary);
      font-size: 12px;
      transition: transform 0.2s;
    }
    
    .section.collapsed .section-toggle {
      transform: rotate(-90deg);
    }
    
    .section.collapsed .section-content {
      display: none;
    }
    
    .section-content {
      padding: 16px 20px;
    }
    
    /* 步骤列表 */
    .steps-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
    }
    
    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }
    
    .step-number.completed {
      background: var(--success);
    }
    
    .step-content {
      flex: 1;
    }
    
    .step-title {
      font-weight: 500;
      font-size: 13px;
    }
    
    .step-meta {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    
    /* 测试区块 */
    .test-section {
      margin-bottom: 16px;
    }
    
    .test-section-header {
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-radius: 8px 8px 0 0;
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    
    .test-section-content {
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 0 0 8px 8px;
    }
    
    .test-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
    }
    
    .test-stat {
      text-align: center;
    }
    
    .test-stat-value {
      font-size: 20px;
      font-weight: 600;
    }
    
    .test-stat-label {
      font-size: 11px;
      color: var(--text-tertiary);
    }
    
    .test-cases {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .test-case {
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .test-case-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .test-case-status.passed {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
    }
    
    .test-case-status.failed {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }
    
    /* 问题列表 */
    .issue-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .issue-item {
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    
    .issue-item:hover {
      background: rgba(59, 130, 246, 0.1);
    }
    
    .issue-item.open {
      border-left-color: var(--warning);
    }
    
    .issue-item.resolved {
      border-left-color: var(--success);
    }
    
    .issue-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    
    .issue-title {
      font-weight: 500;
      font-size: 13px;
    }
    
    .issue-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .issue-status.open {
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
    }
    
    .issue-status.resolved {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
    }
    
    .issue-meta {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    
    .issue-detail {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    
    .issue-item.expanded .issue-detail {
      display: block;
    }
    
    .issue-detail-section {
      margin-bottom: 12px;
    }
    
    .issue-detail-label {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    
    .issue-detail-content {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }
    
    /* 创建问题按钮 */
    .create-issue-btn {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 12px;
    }
    
    .create-issue-btn:hover {
      background: #2563eb;
    }
    
    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--bg-secondary);
      border-radius: 12px;
      width: 500px;
      max-width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-title {
      font-weight: 600;
    }
    
    .modal-close {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 20px;
    }
    
    .modal-body {
      padding: 20px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
    }
    
    .form-textarea {
      min-height: 80px;
      resize: vertical;
    }
    
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: none;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }
    
    /* 输出列表 */
    .output-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .output-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #f8f9fa;
      border-radius: 6px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }
    
    .output-item:hover {
      background: #e9ecef;
      transform: translateX(4px);
    }
    
    .output-icon {
      font-size: 20px;
      width: 24px;
      text-align: center;
    }
    
    .output-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }
    
    .output-name {
      font-size: 14px;
      color: #333;
    }
    
    .output-type {
      font-size: 11px;
      color: #6c757d;
      text-transform: uppercase;
    }
    .output-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .output-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text-primary);
      font-size: 12px;
    }
    
    .output-item:hover {
      background: rgba(59, 130, 246, 0.15);
    }
    
    .output-icon {
      font-size: 14px;
    }
    
    .output-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    /* 执行日志时间线 */
    .timeline {
      position: relative;
      padding-left: 16px;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    
    .timeline-item {
      position: relative;
      padding: 8px 10px;
      margin-bottom: 6px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      font-size: 11px;
    }
    
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -14px;
      top: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid var(--bg-secondary);
    }
    
    .timeline-time {
      color: var(--text-tertiary);
      margin-bottom: 2px;
    }
    
    .timeline-action {
      font-weight: 500;
    }
    
    .timeline-detail {
      color: var(--text-secondary);
      margin-top: 2px;
    }
    
    /* 空状态 */
    .empty-state {
      padding: 20px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
    }
    
    /* 加载状态 */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-tertiary);
    }
    
    .error-state {
      padding: 40px;
      text-align: center;
    }
    
    @media (max-width: 1200px) {
      .right-sidebar {
        width: 260px;
      }
    }
    
    @media (max-width: 900px) {
      .right-sidebar {
        display: none;
      }
    }
  /* 详细分析样式 */
    .analysis-subsection {
      margin-bottom: 20px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #4a90d9;
    }
    
    .subsection-title {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #333;
    }
    
    .subsection-content {
      font-size: 14px;
      line-height: 1.6;
    }
    
    .subsection-content ul {
      margin: 8px 0;
      padding-left: 20px;
    }
    
    .subsection-content li {
      margin: 4px 0;
    }
    
    .advantages-list li {
      color: #28a745;
    }
    
    .concerns-list li {
      color: #dc3545;
    }
    
    .findings-table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 13px;
    }
    
    .findings-table th,
    .findings-table td {
      padding: 8px 12px;
      text-align: left;
      border: 1px solid #ddd;
    }
    
    .findings-table th {
      background: #e9ecef;
      font-weight: 600;
    }
    
    .findings-table tr.priority-p0 {
      background: #fff3cd;
    }
    
    .findings-table tr.priority-p1 {
      background: #f8f9fa;
    }
    
    .priority-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: #6c757d;
      color: white;
    }
    
    .phases-timeline {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 10px 0;
    }
    
    .phase-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: white;
      border-radius: 6px;
      border: 1px solid #e9ecef;
    }
    
    .phase-number {
      font-weight: 600;
      color: #4a90d9;
      min-width: 70px;
    }
    
    .phase-tasks {
      flex: 1;
      color: #555;
    }
    
    .phase-hours {
      font-weight: 600;
      color: #28a745;
    }
    
    .subsection-content code {
      background: #e9ecef;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    
    /* ========== 执行日志 Tab 样式 ========== */
    .execution-log-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px;
      background: var(--bg-tertiary);
      border-radius: 8px;
    }
    
    .view-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    
    .view-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    
    .view-btn.active {
      background: var(--primary);
      color: white;
    }
    
    .execution-view {
      display: none;
    }
    
    .execution-view.active {
      display: block;
    }
    
    /* 时间线样式 */
    .execution-timeline {
      position: relative;
      padding-left: 32px;
    }
    
    .execution-timeline::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    
    .execution-timeline .timeline-item {
      position: relative;
      padding: 12px 16px;
      margin-bottom: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border-left: 3px solid var(--border);
    }
    
    .execution-timeline .timeline-marker {
      position: absolute;
      left: -26px;
      top: 14px;
      width: 24px;
      height: 24px;
      background: var(--bg-primary);
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    
    .execution-timeline .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .execution-timeline .timeline-action {
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .execution-timeline .timeline-time {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    
    .execution-timeline .timeline-detail {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.5;
    }
    
    .execution-timeline .timeline-meta {
    .timeline-changes {
      margin: 8px 0;
      padding: 8px 12px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 6px;
      border-left: 3px solid var(--primary);
    }
    .timeline-changes .change-item {
      font-size: 12px;
      margin: 4px 0;
      font-family: monospace;
    }
    .timeline-changes .change-field {
      color: var(--cyan);
      font-weight: 500;
    }
    .timeline-changes .change-before {
      color: var(--danger);
      text-decoration: line-through;
    }
    .timeline-changes .change-after {
      color: var(--success);
      font-weight: 500;

<body>

  <!-- 创建问题弹窗 -->

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('id');
    const API_BASE = window.location.origin;
    let currentTask = null;
    
    async function loadTaskData() {
      if (!taskId) {
        showError('缺少任务 ID');
        return;
      }
      
      try {
        // 加载任务详情
        const res = await fetch(API_BASE + '/api/tasks/' + taskId);
        const data = await res.json();
        currentTask = data.task || data;
        
        if (!currentTask.id) {
          showError('未找到任务');
          return;
        }
        
        // 加载所有任务用于显示父子关系
        const allTasksRes = await fetch(API_BASE + '/api/tasks?showCompleted=true');
        const allTasksData = await allTasksRes.json();
        const allTasks = allTasksData.tasks || [];
        
        renderTaskDetail(currentTask, allTasks);
        
      } catch (error) {
        console.error('加载失败:', error);
        showError('加载失败: ' + error.message);
      }
    }
    
    function renderTaskDetail(task, allTasks) {
      allTasks = allTasks || [];
      const statusMap = {
        'doing': '进行中',
        'pending': '待办',
        'completed': '已完成',
        'paused': '已暂停'
      };
      
      const statusClass = task.status || 'pending';
      const statusText = statusMap[statusClass] || task.status;
      const priorityClass = (task.priority || 'p3').toLowerCase();
      
      const progress = task.total_steps 
        ? Math.round((task.completed_steps || 0) / task.total_steps * 100) 
        : (task.status === 'completed' ? 100 : 0);
      
      // 构建页面内容
      let html = buildTaskHeader(task, statusText, statusClass, priorityClass, progress, allTasks);
      html += buildTabs();
      html += buildAnalysisTab(task);
      html += buildBreakdownTab(task);
      html += buildAutomationMonitorTab(task);
      html += buildExecutionLogTab(task);
      html += buildTestTab(task);
      html += buildIssuesTab(task);
      html += buildAuditTab(task);
      html += buildToolsTab(task);
      html += buildCollabTab(task);
      html += buildPlanTab(task);
      html += buildReflectTab(task);
      html += buildAcceptanceTab(task);
      
      document.getElementById('content').innerHTML = html;
      
      // 渲染右侧面板
      renderOutputsPanel(task);
      renderExecutionLogPanel(task);
      
      // 绑定事件
      bindEvents();
    }
    
    function buildTaskHeader(task, statusText, statusClass, priorityClass, progress, allTasks) {
      allTasks = allTasks || [];
      let html = '<div class="task-header">';
      html += '<div class="title-with-tips">';
      html += '<h2 class="task-title">' + escapeHtml(task.title || '未命名任务') + '</h2>';
      html += '<i class="ri-question-circle-line tips-icon" onclick="showFieldTips()" title="查看字段说明"></i>';
      html += '</div>';
      
      // Meta 信息
      html += '<div class="task-meta">';
      html += '<span class="meta-item"><span>📊</span><span class="status-badge ' + statusClass + '">' + statusText + '</span></span>';
      html += '<span class="meta-item"><span>🎯</span><span class="priority-badge ' + priorityClass + '">' + (task.priority || 'P3') + '</span></span>';
      html += '<span class="meta-item"><span>📍</span><span>' + (task.quadrant || 'Q1') + '</span></span>';
      
      if (task.projectId) {
        html += '<span class="meta-item"><span>📦</span><span>' + escapeHtml(task.projectId) + '</span></span>';
      }
      if (task.assigned_agent) {
        html += '<span class="meta-item"><span>🤖</span><span>' + escapeHtml(task.assigned_agent) + '</span></span>';
      }
      html += '</div>';
      
      // 时间信息
      html += '<div class="task-meta" style="margin-top: 8px;">';
      if (task.created_at) {
        html += '<span class="meta-item" style="font-size: 11px;"><span>📅</span><span>创建: ' + formatDateTime(task.created_at) + '</span></span>';
      }
      if (task.deadline) {
        const deadlineClass = new Date(task.deadline) < new Date() ? 'style="color: var(--danger);"' : '';
        html += '<span class="meta-item" style="font-size: 11px;" ' + deadlineClass + '><span>⏰</span><span>截止: ' + formatDateTime(task.deadline) + '</span></span>';
      }
      if (task.completed_at) {
        html += '<span class="meta-item" style="font-size: 11px; color: var(--success);"><span>✅</span><span>完成: ' + formatDateTime(task.completed_at) + '</span></span>';
      }
      if (task.duration_human) {
        html += '<span class="meta-item" style="font-size: 11px; color: var(--primary);"><span>⏱️</span><span>耗时: ' + escapeHtml(task.duration_human) + '</span></span>';
      } else if (task.duration_minutes) {
        const hours = Math.floor(task.duration_minutes / 60);
        const mins = task.duration_minutes % 60;
        const durationText = hours > 0 ? hours + '小时' + mins + '分钟' : mins + '分钟';
        html += '<span class="meta-item" style="font-size: 11px; color: var(--primary);"><span>⏱️</span><span>耗时: ' + durationText + '</span></span>';
      } else if (task.completed_at && task.created_at) {
        // 计算耗时
        const durationMs = new Date(task.completed_at).getTime() - new Date(task.created_at).getTime();
        const durationMins = Math.round(durationMs / 60000);
        const hours = Math.floor(durationMins / 60);
        const mins = durationMins % 60;
        const durationText = hours > 0 ? hours + '小时' + mins + '分钟' : mins + '分钟';
        html += '<span class="meta-item" style="font-size: 11px; color: var(--primary);"><span>⏱️</span><span>耗时: ' + durationText + '</span></span>';
      }
      html += '</div>';
      
      // 进度条
      if (task.total_steps) {
        html += '<div class="progress-section">';
        html += '<div class="progress-bar"><div class="progress-fill" style="width: ' + progress + '%"></div></div>';
        html += '<div class="progress-text">进度: ' + (task.completed_steps || 0) + '/' + task.total_steps + ' 步骤 (' + progress + '%)</div>';
        html += '</div>';
      }
      
      // 描述
      if (task.user_description || task.description) {
        html += '<div class="task-description" style="margin-top: 16px;">';
        html += '<div class="description-label">📝 任务描述</div>';
        html += '<div class="description-text">' + escapeHtml(task.user_description || task.description) + '</div>';
        html += '</div>';
      }
      
      // Token消耗 - 使用真实数据，添加统计规则
      const totalTokens = task.tokenUsage || task.total_tokens || 0;
      const inputTokens = task.inputTokens || task.input_tokens || 0;
      const outputTokens = task.outputTokens || task.output_tokens || 0;
      
      html += '<div class="task-description" style="margin-top: 16px; background: rgba(16, 185, 129, 0.1); border-left: 3px solid var(--success);">';
      html += '<div class="description-label" style="color: var(--success);">💎 Token 消耗</div>';
      html += '<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px;">';
      html += '<div style="text-align: center; padding: 12px; background: var(--bg-secondary); border-radius: 6px;">';
      html += '<div style="font-size: 20px; font-weight: 600; color: var(--primary);">' + formatTokenCount(totalTokens) + '</div>';
      html += '<div style="font-size: 11px; color: var(--text-tertiary);">总计消耗</div>';
      html += '</div>';
      html += '<div style="text-align: center; padding: 12px; background: var(--bg-secondary); border-radius: 6px;">';
      html += '<div style="font-size: 20px; font-weight: 600; color: var(--success);">' + formatTokenCount(inputTokens) + '</div>';
      html += '<div style="font-size: 11px; color: var(--text-tertiary);">输入Token</div>';
      html += '</div>';
      html += '<div style="text-align: center; padding: 12px; background: var(--bg-secondary); border-radius: 6px;">';
      html += '<div style="font-size: 20px; font-weight: 600; color: var(--warning);">' + formatTokenCount(outputTokens) + '</div>';
      html += '<div style="font-size: 11px; color: var(--text-tertiary);">输出Token</div>';
      html += '</div>';
      html += '</div>';
      // 添加统计规则说明
      html += '<div style="margin-top: 12px; padding: 8px; background: var(--bg-tertiary); border-radius: 4px; font-size: 11px; color: var(--text-secondary);">';
      html += '<details style="cursor: pointer;">';
      html += '<summary style="font-weight: 600; margin-bottom: 4px;">📊 Token 统计说明</summary>';
      html += '<div style="margin-top: 8px; line-height: 1.6;">';
      html += '<p><strong>计算公式：</strong> 总计 = 输入Token + 输出Token</p>';
      html += '<p><strong>输入Token：</strong> 包含用户提示词、系统提示、上下文历史、文档内容等</p>';
      html += '<p><strong>输出Token：</strong> 包含Agent生成的所有回复内容</p>';
      html += '<p style="color: var(--text-tertiary); font-size: 10px; margin-top: 8px;">💡 数据来源：从OpenClaw Gateway实时获取，按任务执行周期统计</p>';
      html += '</div>';
      html += '</details>';
      html += '</div>';
      html += '</div>';
      
      // 关联任务区域
      html += buildRelatedTasksSection(task, allTasks);
      
      html += '</div>';
      return html;
    }
    
    function buildRelatedTasksSection(task, allTasks) {
      // 查找前置任务和后继任务
      const preTask = task.preTaskId ? allTasks.find(function(t) { return t.id === task.preTaskId; }) : null;
      const nextTask = task.nextTaskId ? allTasks.find(function(t) { return t.id === task.nextTaskId; }) : null;
      
      // 查找子任务（以当前任务为前置任务的任务）
      const childTasks = allTasks.filter(function(t) { return t.preTaskId === task.id; });
      
      // 如果没有任何关联任务，不显示该区域
      if (!preTask && !nextTask && childTasks.length === 0) {
        return '';
      }
      
      let html = '<div class="task-description" style="margin-top: 16px; background: rgba(59, 130, 246, 0.1); border-left: 3px solid var(--primary);">';
      html += '<div class="description-label" style="color: var(--primary);">🔗 关联任务</div>';
      
      // 前置任务
      if (preTask) {
        html += '<div style="margin-bottom: 8px;">';
        html += '<span style="color: var(--text-tertiary); font-size: 12px;">↑ 前置任务:</span> ';
        html += '<a href="task-detail.html?id=' + preTask.id + '" style="color: var(--primary); text-decoration: none;">';
        html += escapeHtml(preTask.title || '未命名');
        html += '</a>';
        html += '<span class="status-badge ' + (preTask.status || 'pending') + '" style="margin-left: 8px; font-size: 10px;">' + getStatusText(preTask.status) + '</span>';
        html += '</div>';
      }
      
      // 后继任务
      if (nextTask) {
        html += '<div style="margin-bottom: 8px;">';
        html += '<span style="color: var(--text-tertiary); font-size: 12px;">↓ 后继任务:</span> ';
        html += '<a href="task-detail.html?id=' + nextTask.id + '" style="color: var(--primary); text-decoration: none;">';
        html += escapeHtml(nextTask.title || '未命名');
        html += '</a>';
        html += '<span class="status-badge ' + (nextTask.status || 'pending') + '" style="margin-left: 8px; font-size: 10px;">' + getStatusText(nextTask.status) + '</span>';
        html += '</div>';
      }
      
      // 子任务列表
      if (childTasks.length > 0) {
        html += '<div style="margin-top: 12px;">';
        html += '<div style="color: var(--text-tertiary); font-size: 12px; margin-bottom: 6px;">📋 子任务 (' + childTasks.length + '):</div>';
        html += '<div style="display: flex; flex-direction: column; gap: 4px;">';
        childTasks.forEach(function(child) {
          html += '<div style="display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: rgba(255,255,255,0.05); border-radius: 4px;">';
          html += '<a href="task-detail.html?id=' + child.id + '" style="color: var(--text-primary); text-decoration: none; flex: 1;">';
          html += escapeHtml(child.title || '未命名');
          html += '</a>';
          html += '<span class="status-badge ' + (child.status || 'pending') + '" style="font-size: 10px;">' + getStatusText(child.status) + '</span>';
          html += '</div>';
        });
        html += '</div>';
        html += '</div>';
      }
      
      html += '</div>';
      return html;
    }
    
    function getStatusText(status) {
      const map = {
        'pending': '待办',
        'doing': '进行中',
        'paused': '已暂停',
        'completed': '已完成',
        'failed': '失败'
      };
      return map[status] || status || '未知';
    }
    
    function buildTabs() {
      return '<div class="tabs">' +
        '<button class="tab active" data-tab="analysis"><i class="ri-search-eye-line"></i> 分析</button>' +
        '<button class="tab" data-tab="breakdown"><i class="ri-list-check-2"></i> 拆解</button>' +
        '<button class="tab" data-tab="automation"><i class="ri-radar-line"></i> 自动化监控</button>' +
        '<button class="tab" data-tab="test"><i class="ri-flask-line"></i> 测试</button>' +
        '<button class="tab" data-tab="issues"><i class="ri-bug-line"></i> 问题</button>' +
        '<button class="tab" data-tab="audit"><i class="ri-history-line"></i> 审计</button>' +
        '<button class="tab" data-tab="tools"><i class="ri-tools-line"></i> 工具</button>' +
        '<button class="tab" data-tab="collab"><i class="ri-team-line"></i> 协作</button>' +
        '<button class="tab" data-tab="plan"><i class="ri-calendar-line"></i> 计划</button>' +
        '<button class="tab" data-tab="reflect"><i class="ri-brain-line"></i> 反思</button>' +
        '</div>';
    }
    
    function buildAnalysisTab(task) {
      let html = '<div class="tab-content active" id="tab-analysis">';
      
      // 初步分析 - analysis 可能是对象或字符串
      let analysisText = '暂无初步分析';
      if (task.analysis) {
        if (typeof task.analysis === 'string') {
          analysisText = task.analysis;
        } else if (task.analysis.thought) {
          analysisText = task.analysis.thought;
        }
      }
      html += buildSection('<i class="ri-lightbulb-line"></i> 初步分析', analysisText);
      
      // 详细分析 - 复杂结构渲染
      html += buildDetailedAnalysisSection(task.analysis_details);
      
      // 分析结论 - analysis.conclusion 或 task.conclusion
      let conclusionText = '暂无分析结论';
      if (task.analysis && task.analysis.conclusion) {
        conclusionText = task.analysis.conclusion;
      } else if (task.conclusion) {
        conclusionText = task.conclusion;
      }
      html += buildSection('<i class="ri-pushpin-line"></i> 分析结论', conclusionText);
      
      html += '</div>';
      return html;
    }
    
    function buildDetailedAnalysisSection(details) {
      if (!details || typeof details !== 'object') {
        return buildSection('<i class="ri-microscope-line"></i> 详细分析', '暂无详细分析');
      }
      
      let html = '<div class="section">' +
        '<div class="section-header">' +
        '<h3 class="section-title"><i class="ri-microscope-line"></i> 详细分析</h3>' +
        '<span class="section-toggle">▼</span>' +
        '</div>' +
        '<div class="section-content">';
      
      // 1. 初步方案
      if (details.initial_proposal) {
        html += '<div class="analysis-subsection">';
        html += '<h4 class="subsection-title">📋 初步方案（评审前）</h4>';
        html += '<div class="subsection-content">';
        
        const proposal = details.initial_proposal;
        html += '<p><strong>' + escapeHtml(proposal.title || '') + '</strong></p>';
        
        if (proposal.approach) {
          html += '<p><em>实现方式：</em>' + escapeHtml(proposal.approach) + '</p>';
        }
        
        if (proposal.interfaces && proposal.interfaces.length > 0) {
          html += '<p><em>标准接口：</em></p><ul>';
          proposal.interfaces.forEach(function(iface) {
            html += '<li><code>' + escapeHtml(iface) + '</code></li>';
          });
          html += '</ul>';
        }
        
        if (proposal.advantages && proposal.advantages.length > 0) {
          html += '<p><em>优点：</em></p><ul class="advantages-list">';
          proposal.advantages.forEach(function(adv) {
            html += '<li class="advantage-item">✅ ' + escapeHtml(adv) + '</li>';
          });
          html += '</ul>';
        }
        
        if (proposal.concerns && proposal.concerns.length > 0) {
          html += '<p><em>担忧：</em></p><ul class="concerns-list">';
          proposal.concerns.forEach(function(con) {
            html += '<li class="concern-item">⚠️ ' + escapeHtml(con) + '</li>';
          });
          html += '</ul>';
        }
        
        html += '</div></div>';
      }
      
      // 2. 评审发现
      if (details.review_findings) {
        html += '<div class="analysis-subsection">';
        html += '<h4 class="subsection-title">🔍 评审发现</h4>';
        html += '<div class="subsection-content">';
        
        const findings = details.review_findings;
        html += '<p><em>评审人员：</em>' + escapeHtml(findings.reviewer || '') + '</p>';
        
        if (findings.must_fix && findings.must_fix.length > 0) {
          html += '<table class="findings-table"><thead><tr><th>问题</th><th>解决方案</th><th>优先级</th></tr></thead><tbody>';
          findings.must_fix.forEach(function(item) {
            html += '<tr class="priority-' + (item.priority || 'p2').toLowerCase() + '">';
            html += '<td>' + escapeHtml(item.issue) + '</td>';
            html += '<td>' + escapeHtml(item.solution) + '</td>';
            html += '<td><span class="priority-badge">' + escapeHtml(item.priority) + '</span></td>';
            html += '</tr>';
          });
          html += '</tbody></table>';
        }
        
        if (findings.should_fix && findings.should_fix.length > 0) {
          html += '<p><em>建议解决：</em></p><ul>';
          findings.should_fix.forEach(function(item) {
            html += '<li><strong>' + escapeHtml(item.issue) + '</strong> → ' + escapeHtml(item.solution) + ' <span class="priority-badge">' + escapeHtml(item.priority) + '</span></li>';
          });
          html += '</ul>';
        }
        
        html += '</div></div>';
      }
      
      // 3. 最终方案
      if (details.final_solution) {
        html += '<div class="analysis-subsection">';
        html += '<h4 class="subsection-title">✅ 最终方案（评审后）</h4>';
        html += '<div class="subsection-content">';
        
        const solution = details.final_solution;
        html += '<p><strong>架构：</strong>' + escapeHtml(solution.architecture || '') + '</p>';
        
        if (solution.components && solution.components.length > 0) {
          html += '<p><em>核心组件：</em></p><ul>';
          solution.components.forEach(function(comp) {
            html += '<li><strong>' + escapeHtml(comp.name) + '</strong>：' + escapeHtml(comp.purpose) + '</li>';
          });
          html += '</ul>';
        }
        
        if (solution.implementation_phases && solution.implementation_phases.length > 0) {
          html += '<p><em>实施阶段：</em></p>';
          html += '<div class="phases-timeline">';
          solution.implementation_phases.forEach(function(phase) {
            html += '<div class="phase-item">';
            html += '<span class="phase-number">Phase ' + phase.phase + '</span>';
            html += '<span class="phase-tasks">' + escapeHtml(phase.tasks) + '</span>';
            html += '<span class="phase-hours">' + phase.hours + 'h</span>';
            html += '</div>';
          });
          html += '</div>';
          html += '<p><strong>总工时：</strong>' + (solution.total_hours || 0) + ' 小时</p>';
        }
        
        html += '</div></div>';
      }
      
      html += '</div></div>';
      return html;
    }
    
    function buildSection(title, content) {
      return '<div class="section">' +
        '<div class="section-header">' +
        '<h3 class="section-title">' + title + '</h3>' +
        '<span class="section-toggle">▼</span>' +
        '</div>' +
        '<div class="section-content">' +
        '<div class="description-text">' + escapeHtml(content) + '</div>' +
        '</div>' +
        '</div>';
    }
    
    function buildBreakdownTab(task) {
      let html = '<div class="tab-content" id="tab-breakdown">';
      html += '<div class="section">';
      html += '<div class="section-header"><h3 class="section-title"><i class="ri-list-check"></i> 任务步骤</h3><span class="section-toggle">▼</span></div>';
      html += '<div class="section-content">';
      
      if (task.breakdown && task.breakdown.length > 0) {
        html += '<div class="steps-list" style="display: flex; flex-direction: column; gap: 12px;">';
        task.breakdown.forEach(function(step, i) {
          const isCompleted = step.status === 'completed';
          const statusClass = isCompleted ? 'completed' : (step.status === 'running' ? 'running' : 'pending');
          const statusIcon = isCompleted ? '✅' : (step.status === 'running' ? '🔄' : '⏳');
          const stepName = step.name || step.title || ('步骤 ' + (step.step || i + 1));
          
          html += '<div class="step-card" style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 16px;">';
          
          // 步骤头部：序号 + 名称 + 状态
          html += '<div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">';
          html += '<div style="width: 32px; height: 32px; border-radius: 50%; background: ' + (isCompleted ? 'var(--success)' : 'var(--bg-tertiary)') + '; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600;">' + (step.step || i + 1) + '</div>';
          html += '<div style="flex: 1;"><div style="font-weight: 600; font-size: 15px;">' + escapeHtml(stepName) + '</div></div>';
          html += '<span style="font-size: 13px; padding: 4px 10px; border-radius: 4px; background: ' + (isCompleted ? 'rgba(16,185,129,0.15)' : 'rgba(245,158,11,0.15)') + '; color: ' + (isCompleted ? 'var(--success)' : 'var(--warning)') + ';">' + statusIcon + ' ' + (isCompleted ? '已完成' : (step.status === 'running' ? '执行中' : '待执行')) + '</span>';
          html += '</div>';
          
          // 步骤描述
          if (step.description) {
            html += '<div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; padding-left: 44px;">' + escapeHtml(step.description) + '</div>';
          }
          
          // 步骤元信息
          html += '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; padding-left: 44px; font-size: 12px; color: var(--text-tertiary);">';
          
          // 阶段
          if (step.phase) {
            html += '<div><span style="color: var(--text-tertiary);">📁 阶段:</span> ' + escapeHtml(step.phase) + '</div>';
          }
          
          // 开发人员
          if (step.assignee) {
            html += '<div><span style="color: var(--text-tertiary);">👤 开发:</span> ' + escapeHtml(step.assignee) + '</div>';
          }
          
          // 创建时间
          if (step.created_at) {
            html += '<div><span style="color: var(--text-tertiary);">📅 创建:</span> ' + formatDateTime(step.created_at) + '</div>';
          }
          
          // 开始时间
          if (step.started_at) {
            html += '<div><span style="color: var(--text-tertiary);">▶️ 开始:</span> ' + formatDateTime(step.started_at) + '</div>';
          }
          
          // 完成时间
          if (step.completed_at) {
            html += '<div><span style="color: var(--text-tertiary);">✅ 完成:</span> ' + formatDateTime(step.completed_at) + '</div>';
          }
          
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
      } else if (task.total_steps) {
        html += '<div class="empty-state">共 ' + task.total_steps + ' 个步骤，已完成 ' + (task.completed_steps || 0) + ' 个</div>';
      } else {
        html += '<div class="empty-state">暂无步骤信息</div>';
      }
      
      html += '</div></div></div>';
      return html;
    }
    
    // P0: 自动化监控 Tab
    function buildAutomationMonitorTab(task) {
      let html = '<div class="tab-content" id="tab-automation">';
      
      const monitor = task.automation_monitor || {};
      
      // 监控流程状态
      html += '<div class="section">';
      html += '<div class="section-header"><h3 class="section-title"><i class="ri-radar-line"></i> 监控流程状态</h3><span class="section-toggle">▼</span></div>';
      html += '<div class="section-content">';
      html += buildMonitorFlowStatus(monitor);
      html += '</div></div>';
      
      // 监控对象
      html += '<div class="section">';
      html += '<div class="section-header"><h3 class="section-title"><i class="ri-focus-3-line"></i> 监控对象</h3><span class="section-toggle">▼</span></div>';
      html += '<div class="section-content">';
      html += buildMonitoredObjects(monitor, task);
      html += '</div></div>';
      
      // 监控日志
      html += '<div class="section">';
      html += '<div class="section-header"><h3 class="section-title"><i class="ri-file-list-3-line"></i> 监控日志</h3><span class="section-toggle">▼</span></div>';
      html += '<div class="section-content">';
      html += buildMonitorLogs(monitor);
      html += '</div></div>';
      
      // 告警记录
      if (monitor.alerts && monitor.alerts.length > 0) {
        html += '<div class="section">';
        html += '<div class="section-header"><h3 class="section-title"><i class="ri-alarm-warning-line"></i> ⚠️ 告警记录</h3><span class="section-toggle">▼</span></div>';
        html += '<div class="section-content">';
        html += buildMonitorAlerts(monitor);
        html += '</div></div>';
      }
      
      html += '</div>';
      return html;
    }
    
    function buildMonitorFlowStatus(monitor) {
      const statusMap = {
        'running': { text: '运行中', icon: '🟢', class: 'status-running' },
        'paused': { text: '已暂停', icon: '🟡', class: 'status-paused' },
        'completed': { text: '已完成', icon: '✅', class: 'status-completed' },
        'failed': { text: '失败', icon: '🔴', class: 'status-failed' },
        'idle': { text: '待机', icon: '⚪', class: 'status-idle' }
      };
      
      const status = monitor.flow_status || 'idle';
      const statusInfo = statusMap[status] || statusMap['idle'];
      const enabled = monitor.enabled !== false;
      
      let html = '<div class="monitor-flow-status">';
      html += '<div class="flow-status-main">';
      html += '<span class="flow-status-icon">' + statusInfo.icon + '</span>';
      html += '<span class="flow-status-text">' + statusInfo.text + '</span>';
      if (!enabled) {
        html += '<span class="flow-status-badge disabled">已禁用</span>';
      }
      html += '</div>';
      
      // 快速操作按钮
      html += '<div class="monitor-actions" style="margin-top: 12px;">';
      if (status === 'running') {
        html += '<button class="btn btn-secondary" onclick="pauseAutomation()"><i class="ri-pause-line"></i> 暂停监控</button>';
      } else if (status === 'paused') {
        html += '<button class="btn btn-primary" onclick="resumeAutomation()"><i class="ri-play-line"></i> 恢复监控</button>';
      }
      html += '<button class="btn btn-secondary" onclick="refreshMonitorData()"><i class="ri-refresh-line"></i> 刷新</button>';
      html += '</div>';
      
      html += '</div>';
      return html;
    }
    
    function buildMonitoredObjects(monitor, task) {
      const objects = monitor.monitored_objects || [];
      const breakdown = task.breakdown || [];
      
      // 如果没有监控对象，从任务步骤自动生成
      const displayObjects = objects.length > 0 ? objects : breakdown.map(function(step, i) {
        return { type: 'step', id: i, status: step.status || 'pending' };
      });
      
      if (displayObjects.length === 0) {
        return '<div class="empty-state">暂无监控对象</div>';
      }
      
      let html = '<div class="monitored-objects-list">';
      
      displayObjects.forEach(function(obj) {
        const statusInfo = getMonitorObjectStatus(obj);
        html += '<div class="monitored-object-item">';
        html += '<div class="object-status-icon">' + statusInfo.icon + '</div>';
        html += '<div class="object-info">';
        html += '<div class="object-title">' + statusInfo.title + '</div>';
        html += '<div class="object-status">' + statusInfo.statusText + '</div>';
        if (obj.duration) {
          html += '<div class="object-duration">运行 ' + obj.duration + '</div>';
        }
        html += '</div>';
        html += '</div>';
      });
      
      html += '</div>';
      
      // 添加样式
      html += '<style>';
      html += '.monitored-objects-list { display: flex; flex-direction: column; gap: 8px; }';
      html += '.monitored-object-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-tertiary); border-radius: 8px; }';
      html += '.object-status-icon { font-size: 20px; }';
      html += '.object-info { flex: 1; }';
      html += '.object-title { font-weight: 500; font-size: 13px; }';
      html += '.object-status { font-size: 12px; color: var(--text-secondary); }';
      html += '.object-duration { font-size: 11px; color: var(--text-tertiary); }';
      html += '.monitor-flow-status { padding: 16px; background: var(--bg-tertiary); border-radius: 8px; }';
      html += '.flow-status-main { display: flex; align-items: center; gap: 12px; font-size: 16px; }';
      html += '.flow-status-icon { font-size: 24px; }';
      html += '.flow-status-text { font-weight: 600; }';
      html += '.flow-status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg-secondary); }';
      html += '.flow-status-badge.disabled { background: rgba(239, 68, 68, 0.2); color: var(--danger); }';
      html += '</style>';
      
      return html;
    }
    
    function getMonitorObjectStatus(obj) {
      const statusMap = {
        'completed': { icon: '✅', text: '已完成' },
        'running': { icon: '🔄', text: '执行中' },
        'pending': { icon: '⏳', text: '等待中' },
        'failed': { icon: '❌', text: '失败' },
        'paused': { icon: '⏸️', text: '已暂停' },
        'skipped': { icon: '⏭️', text: '已跳过' }
      };
      
      const info = statusMap[obj.status] || statusMap['pending'];
      const title = obj.type === 'step' ? '步骤' + obj.id : (obj.name || '监控对象');
      
      return {
        icon: info.icon,
        title: title,
        statusText: info.text
      };
    }
    
    function buildMonitorLogs(monitor) {
      const logs = monitor.logs || [];
      
      if (logs.length === 0) {
        return '<div class="empty-state">暂无监控日志</div>';
      }
      
      let html = '<div class="monitor-logs-container">';
      html += '<div class="monitor-logs-list">';
      
      logs.slice(-20).reverse().forEach(function(log) {
        const time = log.time ? formatTime(log.time) : '-';
        const eventIcon = getMonitorEventIcon(log.event);
        
        html += '<div class="monitor-log-item">';
        html += '<span class="log-time">' + time + '</span>';
        html += '<span class="log-event">' + eventIcon + ' ' + escapeHtml(log.event) + '</span>';
        html += '<span class="log-detail">' + escapeHtml(log.detail || '-') + '</span>';
        html += '</div>';
      });
      
      html += '</div>';
      
      // 样式
      html += '<style>';
      html += '.monitor-logs-container { max-height: 400px; overflow-y: auto; }';
      html += '.monitor-logs-list { display: flex; flex-direction: column; gap: 4px; }';
      html += '.monitor-log-item { display: flex; gap: 12px; padding: 8px 12px; background: var(--bg-tertiary); border-radius: 6px; font-size: 12px; }';
      html += '.log-time { color: var(--text-tertiary); min-width: 70px; }';
      html += '.log-event { color: var(--primary); min-width: 120px; }';
      html += '.log-detail { color: var(--text-secondary); flex: 1; }';
      html += '</style>';
      
      html += '</div>';
      return html;
    }
    
    function getMonitorEventIcon(event) {
      const iconMap = {
        'step_started': '▶️',
        'step_completed': '✅',
        'step_failed': '❌',
        'step_paused': '⏸️',
        'step_resumed': '🔄',
        'timeout_detected': '⏰',
        'error_detected': '⚠️',
        'auto_recovery': '🔧',
        'alert_triggered': '🔔',
        'monitoring_started': '📡',
        'monitoring_stopped': '🛑'
      };
      return iconMap[event] || '📋';
    }
    
    function buildMonitorAlerts(monitor) {
      const alerts = monitor.alerts || [];
      
      if (alerts.length === 0) {
        return '<div class="empty-state">暂无告警</div>';
      }
      
      let html = '<div class="monitor-alerts-list">';
      
      alerts.forEach(function(alert) {

    function buildTestContent(task, type) {
      const ta = task.test_acceptance || {};
      const allCases = ta.cases || [];
      const cases = allCases.filter(function(c) { return c.type === type; });
      
      const passed = cases.filter(function(c) { return c.status === 'passed'; }).length;
      const failed = cases.filter(function(c) { return c.status === 'failed'; }).length;
      
      let html = '<div class="test-stats">';
      html += '<div class="test-stat"><div class="test-stat-value">' + cases.length + '</div><div class="test-stat-label">用例数</div></div>';
      html += '<div class="test-stat"><div class="test-stat-value" style="color: var(--success);">' + passed + '</div><div class="test-stat-label">通过</div></div>';
      html += '<div class="test-stat"><div class="test-stat-value" style="color: var(--danger);">' + failed + '</div><div class="test-stat-label">失败</div></div>';
      html += '</div>';
      
      if (cases.length > 0) {
        html += '<div class="test-cases">';
        cases.forEach(function(c) {
          const name = c.name || c;
          const status = c.status || 'pending';
          const statusText = status === 'passed' ? '✓ 通过' : (status === 'failed' ? '✗ 失败' : '待执行');
          html += '<div class="test-case">';
          html += '<span>' + escapeHtml(name) + '</span>';
          html += '<span class="test-case-status ' + status + '">' + statusText + '</span>';
          html += '</div>';
        });
        html += '</div>';
      } else {
        html += '<div class="empty-state">暂无测试用例</div>';
      }
      
      return html;
    }

      const d = new Date(timestamp);
      return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

      html += '<span class="section-toggle">▼</span>';
      html += '</div>';
      html += '<div class="section-content">';
      
      if (qa && Object.keys(qa).length > 0) {

        // 质量等级
        if (qa.quality_grade) {

        if (qa.passed !== undefined) {

          html += '<span style="color: var(--text-secondary); margin-right: 8px;">✅ 验收结论:</span>';
          html += '<span style="color: ' + (passed ? 'var(--success)' : 'var(--danger)') + '; font-weight: 600;">' + (passed ? '✓ 通过' : '✗ 不通过') + '</span>';

        }

          const totalCount = testCases.length;
          
          html += '<div style="padding: 10px 12px; background: var(--bg-tertiary); border-radius: 6px; font-size: 13px;">';

    function getQualityGradeColor(grade) {
      const colors = {
        'excellent': 'var(--success)',
        'good': '#10b981',
        'fair': '#f59e0b',
        'pass': '#f97316',
        'fail': '#ef4444'
      };
      return colors[grade] || '#6b7280';
    }
    
    function getQualityGradeText(grade) {
      const texts = {
        'excellent': '🌟 卓越',
        'good': '⭐ 优秀',
        'fair': '⭐⭐ 一般',
        'pass': '⚠️ 通过',
        'fail': '❌ 不通过'
      };
      return texts[grade] || grade;
    }
    
    // P1任务：执行日志Tab（事件格式）
    function buildExecutionLogTab(task) {
      let html = '<div class="tab-content" id="tab-execution">';
      
      // 视图切换按钮
      html += '<div class="execution-log-controls">';
      html += '<button class="view-btn active" data-view="timeline"><i class="ri-time-line"></i> 时间线</button>';
      html += '<button class="view-btn" data-view="table"><i class="ri-table-line"></i> 表格</button>';
      html += '<button class="view-btn" data-view="raw"><i class="ri-code-line"></i> 原始日志</button>';
      html += '</div>';
      
      // 执行日志内容
      if (!task.execution_log || task.execution_log.length === 0) {
        html += '<div class="empty-state"><i class="ri-flashlight-line"></i><p>暂无执行记录</p></div>';
      } else {
        // 时间线视图
        html += '<div class="execution-view active" id="view-timeline">';
        html += buildExecutionTimeline(task.execution_log);
        html += '</div>';
        
        // 表格视图
        html += '<div class="execution-view" id="view-table">';
        html += buildExecutionTable(task.execution_log);
        html += '</div>';
        
        // 原始日志视图
        html += '<div class="execution-view" id="view-raw">';
        html += '<pre class="raw-log">' + JSON.stringify(task.execution_log, null, 2) + '</pre>';
        html += '</div>';
      }
      
      html += '</div>';
      return html;
