<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 统一框架样式 -->
  <link rel="stylesheet" href="css/frame.css">
  <link rel="stylesheet" href="css/sidebar.css">
  
  <style>
    /* ========== 页面专用样式 ========== */
    .page-content {
      padding: 24px;
    }
    
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }
    
    .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .tree-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
    }
    
    .tree-module {
      margin-bottom: 16px;
    }
    
    .module-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }
    
    .module-header:hover {
      background: var(--bg-hover);
    }
    
    .module-icon {
      font-size: 18px;
    }
    
    .module-name {
      font-weight: 600;
      flex: 1;
    }
    
    .module-count {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-primary);
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .module-toggle {
      transition: transform 0.2s;
    }
    
    .module-header.collapsed .module-toggle {
      transform: rotate(-90deg);
    }
    
    .module-children {
      margin-left: 20px;
      margin-top: 8px;
      border-left: 2px solid var(--border);
      padding-left: 12px;
    }
    
    .module-children.hidden {
      display: none;
    }
    
    .page-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    
    .page-item:hover {
      background: var(--bg-hover);
    }
    
    .page-icon {
      font-size: 14px;
    }
    
    .page-name {
      flex: 1;
      font-size: 14px;
    }
    
    .page-file {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: monospace;
    }
    
    .page-status {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
    }
    
    .page-status.active {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }
    
    .page-status.legacy {
      background: rgba(234, 179, 8, 0.2);
      color: #eab308;
    }
    
    .page-status.deprecated {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    
    /* 未分类页面区域 */
    .unassigned-section {
      margin-top: 24px;
      padding: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    
    .unassigned-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .unassigned-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--warning);
    }
    
    .unassigned-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px;
    }
    
    .unassigned-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border-radius: 4px;
    }
    
    .unassigned-item .filename {
      font-family: monospace;
      font-size: 13px;
    }
    
    /* 图例 */
    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }
    
    .legend-dot.active { background: #22c55e; }
    .legend-dot.legacy { background: #eab308; }
    .legend-dot.deprecated { background: #ef4444; }
  </style>
<script src="js/field-tips.js"></script></head>

    // 加载页面结构
    function loadPageStructure() {
      const container = document.getElementById('tree-container');
      
      let totalAssigned = 0;
      
      let html = modules.map(mod => {
        const activeCount = mod.pages.filter(p => p.status === 'active').length;
        totalAssigned += mod.pages.length;
        
        return `
          <div class="tree-module">
            <div class="module-header" onclick="toggleModule(this)">
              <i class="ri-arrow-down-s-line module-toggle"></i>
              <span class="module-icon">${mod.icon}</span>
              <span class="module-name">${mod.name}</span>
              <span class="module-count">${mod.pages.length} 页面 · ${activeCount} 活跃</span>
            </div>
            <div class="module-children">
              ${mod.pages.map(page => `
                <div class="page-item">
                  <span class="page-icon">${page.icon || '📄'}</span>
                  <a href="${page.file}" class="page-name" target="_blank">${page.name}</a>
                  <span class="page-file">${page.file}</span>
                  <span class="page-status ${page.status}">${page.status === 'active' ? '活跃' : page.status === 'legacy' ? '旧版' : '废弃'}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
      
      container.innerHTML = html;
      
      // 更新统计
      document.getElementById('stat-total').textContent = totalAssigned + unassignedPages.length;
      document.getElementById('stat-modules').textContent = modules.length;
      document.getElementById('stat-assigned').textContent = totalAssigned;
      document.getElementById('stat-unassigned').textContent = unassignedPages.length;
      
      // 渲染未分类页面
      if (unassignedPages.length > 0) {
        document.getElementById('unassigned-section').style.display = 'block';
        document.getElementById('unassigned-grid').innerHTML = unassignedPages.map(page => `
          <div class="unassigned-item">
            <i class="ri-file-line" style="color: var(--warning);"></i>
            <a href="${page.file}" class="filename" target="_blank">${page.file}</a>
            <span style="color: var(--text-secondary); font-size: 12px;">${page.desc || ''}</span>
          </div>
        `).join('');
      }
    }
    
    // 切换模块展开/折叠
    function toggleModule(header) {
      header.classList.toggle('collapsed');
      const children = header.nextElementSibling;
      children.classList.toggle('hidden');
    }
    
    // 展开全部
    function expandAll() {
      document.querySelectorAll('.module-header').forEach(h => {
        h.classList.remove('collapsed');
        h.nextElementSibling.classList.remove('hidden');
      });
    }
    
    // 折叠全部
    function collapseAll() {
      document.querySelectorAll('.module-header').forEach(h => {
        h.classList.add('collapsed');
        h.nextElementSibling.classList.add('hidden');
      });
    }
