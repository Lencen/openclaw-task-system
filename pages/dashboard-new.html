<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="assets/fonts/remixicon.css" rel="stylesheet">
  <title>仪表盘 - 任务系统</title>
  <link rel="stylesheet" href="css/frame.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <style>
    .page-content {
      padding: 24px;
      max-width: 1200px;
    }
    
    .page-header {
      margin-bottom: 24px;
    }
    
    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    
    /* 统计卡片 */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    
    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .stat-icon.blue { background: rgba(59, 130, 246, 0.15); }
    .stat-icon.green { background: rgba(16, 185, 129, 0.15); }
    .stat-icon.orange { background: rgba(245, 158, 11, 0.15); }
    .stat-icon.purple { background: rgba(139, 92, 246, 0.15); }
    
    .stat-content h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }
    
    .stat-content p {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    
    /* 两栏布局 */
    .two-columns {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    
    /* 卡片 */
    .card {
      background: var(--bg-secondary);
      border-radius: 10px;
      overflow: hidden;
    }
    
    .card-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .card-action {
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
    }
    
    .card-action:hover {
      text-decoration: underline;
    }
    
    .card-body {
      padding: 12px 16px;
    }
    
    /* 任务列表 */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    
    .task-item:hover {
      border-left-color: var(--primary);
    }
    
    .task-item.priority-P0 { border-left-color: #ef4444; }
    .task-item.priority-P1 { border-left-color: #f59e0b; }
    
    .task-status-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    
    .task-status-icon.doing { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .task-status-icon.pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .task-status-icon.completed { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    
    .task-info {
      flex: 1;
      min-width: 0;
    }
    
    .task-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .task-meta {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    
    .task-priority {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    
    .task-priority.P0 { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .task-priority.P1 { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .task-priority.P2 { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .task-priority.P3 { background: rgba(100, 116, 139, 0.15); color: #94a3b8; }
    
    /* 快捷入口 */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    
    .quick-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .quick-link:hover {
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary);
    }
    
    .quick-link i {
      font-size: 16px;
    }
    
    /* 活动列表 */
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .activity-item {
      display: flex;
      gap: 10px;
      font-size: 12px;
    }
    
    .activity-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    
    .activity-text {
      color: var(--text-primary);
      line-height: 1.4;
    }
    
    .activity-time {
      color: var(--text-tertiary);
      font-size: 11px;
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--text-tertiary);
      font-size: 13px;
    }
    
    @media (max-width: 900px) {
      .two-columns {
        grid-template-columns: 1fr;
      }
      
      .stats-row {
        flex-wrap: wrap;
      }
      
      .stat-card {
        flex: 1;
        min-width: 140px;
      }
    }
  </style>
<script src="js/field-tips.js"></script></head>
<body>
  <div class="layout">
    <div id="sidebar-container"></div>

    <main class="main">
      <header class="header">
        <div class="header-left">
          <div class="breadcrumb">
            <span>仪表盘</span>
          </div>
        </div>
        <div class="header-right">
          <button class="header-btn" title="刷新" onclick="loadData()">
            <i class="ri-refresh-line"></i>
          </button>
        </div>
      </header>

      <div class="content">
        <div class="page-content">
          <!-- 页面标题 -->
          <div class="page-header">
            <h1 class="page-title">工作台</h1>
            <p class="page-subtitle" id="dateText"></p>
          </div>

          <!-- 统计卡片 -->
          <div class="stats-row" id="statsRow">
            <div class="stat-card">
              <div class="stat-icon blue"><i class="ri-list-check"></i></div>
              <div class="stat-content"><h3>--</h3><p>任务总数</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon orange"><i class="ri-play-line"></i></div>
              <div class="stat-content"><h3>--</h3><p>进行中</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon purple"><i class="ri-time-line"></i></div>
              <div class="stat-content"><h3>--</h3><p>待处理</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon green"><i class="ri-check-line"></i></div>
              <div class="stat-content"><h3>--</h3><p>已完成</p></div>
            </div>
          </div>

          <!-- 两栏布局 -->
          <div class="two-columns">
            <!-- 左栏：任务列表 -->
            <div style="display: flex; flex-direction: column; gap: 16px;">
              <!-- 优先任务 P0/P1 -->
              <div class="card">
                <div class="card-header">
                  <span class="card-title"><i class="ri-fire-line" style="color: #ef4444;"></i> 优先任务</span>
                  <a href="tasks-v2.html" class="card-action">查看全部</a>
                </div>
                <div class="card-body">
                  <div class="task-list" id="priorityTasks">
                    <div class="empty-state">加载中...</div>
                  </div>
                </div>
              </div>
              
              <!-- 最近任务 -->
              <div class="card">
                <div class="card-header">
                  <span class="card-title"><i class="ri-history-line"></i> 最近任务</span>
                  <a href="tasks-v2.html" class="card-action">查看全部</a>
                </div>
                <div class="card-body">
                  <div class="task-list" id="recentTasks">
                    <div class="empty-state">加载中...</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 右栏 -->
            <div style="display: flex; flex-direction: column; gap: 16px;">
              <!-- 快捷入口 -->
              <div class="card">
                <div class="card-header">
                  <span class="card-title"><i class="ri-flashlight-line"></i> 快捷入口</span>
                </div>
                <div class="card-body">
                  <div class="quick-links">
                    <a href="tasks-v2.html" class="quick-link">
                      <i class="ri-list-check-2"></i> 任务列表
                    </a>
                    <a href="projects-new.html" class="quick-link">
                      <i class="ri-folder-line"></i> 项目管理
                    </a>
                    <a href="agents-new.html" class="quick-link">
                      <i class="ri-robot-line"></i> Agent
                    </a>
                    <a href="calendar-new.html" class="quick-link">
                      <i class="ri-calendar-line"></i> 日历
                    </a>
                    <a href="quadrant-new.html" class="quick-link">
                      <i class="ri-focus-3-line"></i> 四象限
                    </a>
                    <a href="war-room-v3.html" class="quick-link">
                      <i class="ri-tv-line"></i> War Room
                    </a>
                  </div>
                </div>
              </div>

              <!-- 最近活动 -->
              <div class="card">
                <div class="card-header">
                  <span class="card-title"><i class="ri-file-list-3-line"></i> 最近活动</span>
                </div>
                <div class="card-body">
                  <div class="activity-list" id="activityList">
                    <div class="empty-state">加载中...</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let allTasks = [];

    document.addEventListener('DOMContentLoaded', function() {
      Sidebar.init({ activePage: 'dashboard' });
      updateDate();
      loadData();
    });

    function updateDate() {
      const now = new Date();
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('dateText').textContent = now.toLocaleDateString('zh-CN', options);
    }

    async function loadData() {
      try {
        const res = await fetch(`${API_BASE}/api/tasks?limit=100`);
        const data = await res.json();
        allTasks = data.success && data.data ? (data.data.tasks || []) : [];

        renderStats();
        renderPriorityTasks();
        renderRecentTasks();
        renderActivities();
      } catch (error) {
        console.error('加载失败:', error);
      }
    }

    function renderStats() {
      const stats = {
        total: allTasks.length,
        doing: allTasks.filter(t => t.status === 'doing').length,
        pending: allTasks.filter(t => t.status === 'pending').length,
        completed: allTasks.filter(t => t.status === 'completed').length
      };

      const values = document.querySelectorAll('.stat-content h3');
      values[0].textContent = stats.total;
      values[1].textContent = stats.doing;
      values[2].textContent = stats.pending;
      values[3].textContent = stats.completed;
    }

    function renderPriorityTasks() {
      const priorityTasks = allTasks
        .filter(t => (t.priority === 'P0' || t.priority === 'P1') && t.status !== 'completed')
        .sort((a, b) => {
          if (a.priority === 'P0' && b.priority !== 'P0') return -1;
          if (a.priority !== 'P0' && b.priority === 'P0') return 1;
          return 0;
        })
        .slice(0, 5);

      if (priorityTasks.length === 0) {
        document.getElementById('priorityTasks').innerHTML = `
          <div class="empty-state">暂无优先任务</div>
        `;
        return;
      }

      const html = priorityTasks.map(task => renderTaskItem(task)).join('');
      document.getElementById('priorityTasks').innerHTML = html;
    }

    function renderRecentTasks() {
      const recent = allTasks
        .filter(t => t.updated_at || t.created_at)
        .sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at))
        .slice(0, 6);

      if (recent.length === 0) {
        document.getElementById('recentTasks').innerHTML = `
          <div class="empty-state">暂无任务</div>
        `;
        return;
      }

      const html = recent.map(task => renderTaskItem(task)).join('');
      document.getElementById('recentTasks').innerHTML = html;
    }

    function renderTaskItem(task) {
      const statusIcon = task.status === 'doing' ? 'ri-play-line' : 
                         task.status === 'completed' ? 'ri-check-line' : 'ri-time-line';
      
      return `
        <div class="task-item priority-${task.priority || 'P2'}" onclick="goToTask('${task.id}')">
          <div class="task-status-icon ${task.status}"><i class="${statusIcon}"></i></div>
          <div class="task-info">
            <div class="task-title">${escapeHtml(task.title)}</div>
            <div class="task-meta">${task.assignedAgent || '未分配'} · ${formatDate(task.updated_at || task.created_at)}</div>
          </div>
          <span class="task-priority ${task.priority || 'P2'}">${task.priority || 'P2'}</span>
        </div>
      `;
    }

    function renderActivities() {
      const recent = allTasks
        .filter(t => t.updated_at || t.created_at)
        .sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at))
        .slice(0, 6);

      if (recent.length === 0) {
        document.getElementById('activityList').innerHTML = `
          <div class="empty-state">暂无活动</div>
        `;
        return;
      }

      const html = recent.map(task => {
        const icon = task.status === 'completed' ? '✓' : task.status === 'doing' ? '▶' : '○';
        const action = task.status === 'completed' ? '完成了' : task.status === 'doing' ? '开始执行' : '创建了';
        const time = formatTime(task.updated_at || task.created_at);

        return `
          <div class="activity-item">
            <div class="activity-icon">${icon}</div>
            <div>
              <div class="activity-text">${task.assignedAgent || '系统'} ${action} "${escapeHtml(task.title.substring(0, 20))}${task.title.length > 20 ? '...' : ''}"</div>
              <div class="activity-time">${time}</div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('activityList').innerHTML = html;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return dateStr.split('T')[0];
    }

    function formatTime(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = now - d;
      
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
      return dateStr.split('T')[0];
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function goToTask(id) {
      window.location.href = `task-detail.html?id=${encodeURIComponent(id)}`;
    }
  </script>

  <script src="js/sidebar.js"></script>
<script>FieldTips.init({pageType:"dashboard"});</script></body>
</html>
