<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IM 渠道管理 - 任务系统</title>
  
  <!-- 统一框架样式 -->
  <link rel="stylesheet" href="css/frame.css">
  <link rel="stylesheet" href="css/sidebar.css">
  
  <style>
    /* ========== 页面专用样式 ========== */
    .page-content {
      padding: 24px;
    }
    
    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .page-title {
      font-size: 24px;
      font-weight: 700;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .channels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .channel-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      transition: all 0.2s;
    }
    
    .channel-card:hover {
      border-color: var(--primary);
    }
    
    .channel-card.active {
      border-color: var(--success);
    }
    
    .channel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .channel-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-tertiary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .channel-icon.active {
      background: linear-gradient(135deg, var(--primary), #00c6ff);
    }
    
    .channel-info {
      flex: 1;
    }
    
    .channel-name {
      font-size: 16px;
      font-weight: 600;
    }
    
    .channel-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .status-dot.online {
      background: var(--success);
    }
    
    .status-dot.offline {
      background: var(--danger);
    }
    
    .channel-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    
    .meta-item {
      text-align: center;
    }
    
    .meta-value {
      font-size: 18px;
      font-weight: 600;
    }
    
    .meta-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    
    .channel-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    
    .btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    
    .btn-success {
      background: var(--success);
      color: #fff;
    }
    
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .health-bar {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .health-bar h3 {
      margin: 0 0 16px 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .health-status {
      display: flex;
      gap: 16px;
    }
    
    .health-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .health-label {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .provider-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }
    
    .provider-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      font-size: 14px;
    }
    
    .provider-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: var(--primary);
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
    }
    
    .channel-log {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: var(--text-secondary);
      max-height: 200px;
      overflow-y: auto;
    }
    
    .log-entry {
      margin-bottom: 4px;
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    .log-entry.info {
      background: rgba(0, 198, 255, 0.1);
      color: #00c6ff;
    }
    
    .log-entry.success {
      background: rgba(0, 255, 136, 0.1);
      color: #008866;
    }
    
    .log-entry.error {
      background: rgba(255, 69, 58, 0.1);
      color: var(--danger);
    }
    
    .log-entry.warn {
      background: rgba(255, 165, 0, 0.1);
      color: orange;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }
    
    .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
<script src="js/field-tips.js"></script></head>
<body>
  <div class="layout">
    <div id="sidebar-container"></div>
    
    <main class="main">
      <header class="header">
        <div class="header-left">
          <div class="breadcrumb">
            <a href="dashboard-new.html">首页</a>
            <span>/</span>
            <span>IM 渠道管理</span>
          </div>
        </div>
        <div class="header-right">
          <button class="header-btn" title="刷新" onclick="refreshStatus()">
            <i class="ri-refresh-line"></i>
          </button>
        </div>
      </header>
      
      <div class="content">
        <div class="page-content">
          <div class="page-header">
            <h1 class="page-title">IM 渠道管理</h1>
          </div>
          
          <!-- 状态统计 -->
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value" id="stat-channels">0</div>
              <div class="stat-label">已加载渠道</div>
            </div>
            <div class="stat-card success">
              <div class="stat-value" id="stat-providers">0</div>
              <div class="stat-label">Provider 实例</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-tokens">0</div>
              <div class="stat-label">Token 管理器</div>
            </div>
          </div>
          
          <!-- 健康状态 -->
          <div class="health-bar">
            <h3>
              <i class="ri-health-book-line"></i>
              系统健康状态
            </h3>
            <div class="health-status">
              <div class="health-item">
                <span class="status-dot online"></span>
                <span class="health-label">服务状态</span>
                <strong id="service-status">未知</strong>
              </div>
              <div class="health-item">
                <span class="status-dot online"></span>
                <span class="health-label">渠道服务</span>
                <strong id="channel-service">未知</strong>
              </div>
              <div class="health-item">
                <span class="status-dot online"></span>
                <span class="health-label">LLM 接口</span>
                <strong id="llm-status">未知</strong>
              </div>
            </div>
          </div>
          
          <!-- Provider 列表 -->
          <div class="section-title">
            <i class="ri-brain-line"></i>
            Provider 实例列表
          </div>
          <div class="provider-list" id="provider-list">
            <!-- 由 JS 动态渲染 -->
          </div>
          
          <!-- 渠道列表 -->
          <div class="section-title">
            <i class="ri-broadcast-line"></i>
            可用渠道
          </div>
          <div class="channels-grid" id="channels-grid">
            <!-- 由 JS 动态渲染 -->
          </div>
          
          <!-- 日志 -->
          <div class="section-title" style="margin-top: 24px;">
            <i class="ri-terminal-box-line"></i>
            操作日志
          </div>
          <div class="channel-log" id="channel-log">
            <div class="log-entry info">[系统] IM 渠道服务已启动</div>
          </div>
          
          <!-- 操作按钮 -->
          <div class="channel-actions" style="margin-top: 24px;">
            <button class="btn btn-success" onclick="loadChannels()">
              <i class="ri-play-line"></i>
              启用所有渠道
            </button>
            <button class="btn btn-primary" onclick="checkStatus()">
              <i class="ri-refresh-line"></i>
              检查状态
            </button>
            <button class="btn btn-secondary" onclick="clearLog()">
              <i class="ri-eraser-line"></i>
              清空日志
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script>
    // 渠道配置
    const channelConfigs = {
      feishu: {
        id: 'feishu',
        name: '飞书',
        icon: '🪽',
        type: 'IM',
        enabled: true,
        connectionMode: 'websocket'
      },
      dingtalk: {
        id: 'dingtalk',
        name: '钉钉',
        icon: '🔔',
        type: 'IM',
        enabled: false,
        connectionMode: 'webhook'
      },
      wechat: {
        id: 'wechat',
        name: '微信',
        icon: 'wechat', // 使用微信图标
        type: 'IM',
        enabled: false,
        connectionMode: 'websocket'
      }
    };
    
    // Provider 列表
    let providers = [];
    
    // 日志
    const logs = [];
    
    // 添加日志
    function addLog(message, type = 'info') {
      const time = new Date().toLocaleTimeString();
      logs.unshift({ time, message, type });
      renderLog();
      
      if (logs.length > 50) {
        logs.pop();
      }
    }
    
    // 渲染日志
    function renderLog() {
      const container = document.getElementById('channel-log');
      container.innerHTML = logs.map(log => 
        `<div class="log-entry ${log.type}">[${log.time}] ${log.message}</div>`
      ).join('');
    }
    
    // 清空日志
    function clearLog() {
      logs.length = 0;
      addLog('[系统] 日志已清空', 'warn');
      renderLog();
    }
    
    // 加载渠道
    async function loadChannels() {
      addLog('[IM] 正在加载渠道...', 'info');
      
      try {
        const response = await fetch('/api/im-channel/load');
        const data = await response.json();
        
        if (data.success) {
          addLog(`[IM] ✅ 成功加载 ${data.results.filter(r => r.status === 'success').length} 个渠道`, 'success');
          
          // 渲染 Provider
          await checkStatus();
        } else {
          addLog(`[IM] ❌ 加载失败: ${data.error}`, 'error');
        }
      } catch (error) {
        addLog(`[IM] ❌ 加载失败: ${error.message}`, 'error');
      }
    }
    
    // 检查状态
    async function checkStatus() {
      try {
        // 检查服务状态
        const healthResponse = await fetch('/api/im-channel/status');
        const healthData = await healthResponse.json();
        
        if (healthData.success) {
          document.getElementById('service-status').textContent = '正常';
          document.getElementById('service-status').style.color = 'var(--success)';
          document.getElementById('channel-service').textContent = healthData.channels.length + ' 个';
          document.getElementById('channel-service').style.color = 'var(--success)';
          
          // 检查 Providers
          const providerResponse = await fetch('/api/im-channel/providers');
          const providerData = await providerResponse.json();
          
          if (providerData.success) {
            providers = providerData.providers;
            document.getElementById('llm-status').textContent = providers.length + ' 个';
            document.getElementById('llm-status').style.color = 'var(--success)';
            
            renderProviders();
          }
          
          // 更新统计
          document.getElementById('stat-channels').textContent = healthData.channels.length;
          document.getElementById('stat-providers').textContent = healthData.providerCount || 0;
        }
      } catch (error) {
        addLog(`[状态] ❌ 检查失败: ${error.message}`, 'error');
      }
    }
    
    // 渲染 Provider
    function renderProviders() {
      const container = document.getElementById('provider-list');
      container.innerHTML = providers.map(p => `
        <div class="provider-item">
          <div class="provider-badge">${p.channel.charAt(0).toUpperCase()}</div>
          <span>${p.channel}</span>
          <span style="margin-left: auto;">
            ${p.hasToken ? '✅ Token 管理' : '⚠️ 未初始化'}
          </span>
        </div>
      `).join('');
    }
    
    // 渲染渠道
    function renderChannels() {
      const container = document.getElementById('channels-grid');
      container.innerHTML = Object.entries(channelConfigs).map(([name, config]) => {
        // 检查是否已加载
        const isLoaded = false; // TODO: 从后端获取
        const isActive = config.enabled && isLoaded;
        
        return `
          <div class="channel-card ${isActive ? 'active' : ''}">
            <div class="channel-header">
              <div class="channel-icon ${isActive ? 'active' : ''}">
                ${config.icon === 'wechat' ? '💬' : config.icon}
              </div>
              <div class="channel-info">
                <div class="channel-name">${config.name}</div>
                <div class="channel-status">
                  <span class="status-dot ${isActive ? 'online' : 'offline'}"></span>
                  ${isActive ? '已激活' : '未启用'}
                </div>
              </div>
            </div>
            
            <div class="channel-meta">
              <div class="meta-item">
                <div class="meta-value">${config.type}</div>
                <div class="meta-label">类型</div>
              </div>
              <div class="meta-item">
                <div class="meta-value">${config.connectionMode}</div>
                <div class="meta-label">连接模式</div>
              </div>
              <div class="meta-item">
                <div class="meta-value">${config.enabled ? '是' : '否</div>
                <div class="meta-label">已启用</div>
              </div>
            </div>
            
            <div class="channel-actions">
              ${config.enabled ? `
                <button class="btn ${isActive ? 'btn-success' : 'btn-primary'}" onclick="enableChannel('${name}', ${config.enabled})">
                  ${isActive ? '运行中' : '启用'}
                </button>
              ` : `
                <button class="btn btn-primary" onclick="enableChannel('${name}', true)">
                  启用
                </button>
              `}
              <button class="btn btn-secondary" onclick="viewChannelConfig('${name}')">
                <i class="ri-settings-3-line"></i> 配置
              </button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // 启用渠道
    function enableChannel(name, enabled) {
      addLog(`[渠道] ${enabled ? '启用' : '禁用'} ${name}`, enabled ? 'success' : 'warn');
      
      if (enabled) {
        loadChannels();
      }
    }
    
    // 查看渠道配置
    function viewChannelConfig(name) {
      const config = channelConfigs[name];
      alert(`渠道配置\n\nID: ${name}\n名称: ${config.name}\n类型: ${config.type}\n连接模式: ${config.connectionMode}`);
    }
    
    // 刷新
    function refreshStatus() {
      checkStatus();
    }
    
    // 初始化
    renderChannels();
    checkStatus();
  </script>
  
  <script src="js/sidebar.js"></script>
  <script>
    Sidebar.init({ activePage: 'im-channel' });
  </script>
<script>FieldTips.init({pageType:"general"});</script></body>
</html>
